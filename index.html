<title>Kiwi Mayhem</title>
<script type="module">
  // Trystero — free P2P WebRTC over public signaling (no server needed).
  // Powers online multiplayer. Try multiple CDNs in case one is blocked/slow.
  const CDNS=[
    'https://esm.sh/trystero@0.21.5/torrent',
    'https://cdn.jsdelivr.net/npm/trystero@0.21.5/+esm',
    'https://esm.sh/trystero/torrent',
    'https://esm.sh/trystero@0.20.0/torrent'
  ];
  let loaded=null,lastErr=null;
  for(const url of CDNS){
    try{
      const m=await import(url);
      if(m&&m.joinRoom){loaded=m;console.log('[MP] Trystero loaded from',url);break;}
    }catch(e){lastErr=e;console.warn('[MP] CDN failed:',url,e&&e.message);}
  }
  if(loaded){
    window.MP={joinRoom:loaded.joinRoom,selfId:loaded.selfId,ready:true};
  } else {
    console.warn('[MP] All Trystero CDNs failed — online multiplayer disabled.',lastErr);
    window.MP={ready:false,error:(lastErr&&lastErr.message)||'all CDNs failed'};
  }
  window.dispatchEvent(new Event('mp-ready'));
</script>

<body>
<canvas id="gameCanvas"></canvas>
<script>
'use strict';
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');
// Virtual design resolution — game UI was authored for ~1920x1080.
// We render at this fixed internal size and CSS-scale the canvas to fit
// the device viewport, so the layout is identical on phone and desktop.
const VIRTUAL_W=1920, VIRTUAL_H=1080;
canvas.width=VIRTUAL_W;canvas.height=VIRTUAL_H;
function _fitCanvas(){
  const vw=window.innerWidth, vh=window.innerHeight;
  const s=Math.min(vw/VIRTUAL_W, vh/VIRTUAL_H);
  canvas.style.width=(VIRTUAL_W*s)+'px';
  canvas.style.height=(VIRTUAL_H*s)+'px';
}
_fitCanvas();
// Convert client (CSS pixel) coords to canvas (virtual pixel) coords
function _toCanvas(cx,cy){
  const r=canvas.getBoundingClientRect();
  return {
    x:(cx-r.left)*(canvas.width/r.width),
    y:(cy-r.top)*(canvas.height/r.height)
  };
}

if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=Math.min(r,w/2,h/2);this.beginPath();
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this;
  };
}

// ─── CONSTANTS ─────────────────────────────────────────────────
const ARENA=3200, GRID=64; // bigger arena (was 2400)
const P_R=30;        // player radius (visual/draw scale)
const PHYS_R=20;     // physics collision radius
const BULL_R=4, BULL_S=520;
const RESP_T=4;

// Irregular arena polygon (8 vertices, asymmetric)
const POLY=[
  [380,0],[1900,0],[2400,420],[2400,1700],
  [2100,2400],[520,2400],[0,1980],[0,460]
];
const POLY_CENTER={x:ARENA/2,y:ARENA/2};

function polyContains(x,y){
  let inside=false;
  for(let i=0,j=POLY.length-1;i<POLY.length;j=i++){
    const xi=POLY[i][0],yi=POLY[i][1],xj=POLY[j][0],yj=POLY[j][1];
    if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi)+xi))inside=!inside;
  }
  return inside;
}
function clampPoly(x,y,r){
  if(polyContains(x,y))return{x,y};
  // push to center
  const dx=POLY_CENTER.x-x,dy=POLY_CENTER.y-y,d=Math.sqrt(dx*dx+dy*dy)||1;
  let nx=x,ny=y,steps=0;
  while(!polyContains(nx,ny)&&steps<60){nx+=dx/d*4;ny+=dy/d*4;steps++;}
  return{x:nx,y:ny};
}

// Map obstacles (generated)
const OBSTACLES=[];
function generateObstacles(){
  OBSTACLES.length=0;
  const groups=14;
  for(let i=0;i<groups;i++){
    let x,y,tries=0;
    do{x=300+Math.random()*(ARENA-600);y=300+Math.random()*(ARENA-600);tries++;}
    while((!polyContains(x,y)||((x-ARENA/2)**2+(y-ARENA/2)**2)<360*360)&&tries<25);
    if(tries>=25)continue;
    const w=42+Math.random()*38, h=42+Math.random()*38;
    OBSTACLES.push({x,y,w,h,kind:Math.random()<0.5?'crate':'barrier'});
  }
}
function collideObstacle(x,y,r){
  for(const o of OBSTACLES){
    const nx=Math.max(o.x-o.w/2,Math.min(x,o.x+o.w/2));
    const ny=Math.max(o.y-o.h/2,Math.min(y,o.y+o.h/2));
    const dx=x-nx,dy=y-ny;
    if(dx*dx+dy*dy<r*r)return o;
  }
  return null;
}

// ─── CAMERA ────────────────────────────────────────────────────
const Camera={
  // ZOOM<1 = more area visible (zoomed out). Renders world → screen via *zoom
  x:0,y:0,smooth:7,shakeT:0,shakeMag:0,zoom:0.82,
  update(tx,ty,dt){
    const t=Math.min(1,this.smooth*dt);
    // Camera (x,y) is top-left of view in world coords. Account for zoom.
    this.x+=((tx-(canvas.width/2)/this.zoom)-this.x)*t;
    this.y+=((ty-(canvas.height/2)/this.zoom)-this.y)*t;
    if(this.shakeT>0){this.shakeT-=dt;this.x+=(Math.random()-.5)*this.shakeMag;this.y+=(Math.random()-.5)*this.shakeMag;}
  },
  shake(mag,dur){this.shakeMag=mag;this.shakeT=dur;},
  sx(wx){return (wx-this.x)*this.zoom;},
  sy(wy){return (wy-this.y)*this.zoom;},
  wx(sx){return sx/this.zoom+this.x;},
  wy(sy){return sy/this.zoom+this.y;}
};

// ─── INPUT ─────────────────────────────────────────────────────
const Input={
  keys:{},mouse:{x:0,y:0,down:false},justPressed:new Set(),mouseJustPressed:false,clickPos:null,
  init(){
    if(this._inited)return;this._inited=true;
    window.addEventListener('keydown',e=>{
      if(!this.keys[e.code])this.justPressed.add(e.code);
      this.keys[e.code]=true;
      if(e.code==='Escape'){
        if(typeof Game!=='undefined'){
          if(Game.state==='playing'){Game.state='paused';AudioManager.play('pause');}
          else if(Game.state==='paused'){Game.state='playing';AudioManager.play('resume');}
        }
        e.preventDefault();
      }
      // F11 = toggle fullscreen
      if(e.code==='F11'){
        if(document.fullscreenElement){document.exitFullscreen?.();}
        else {document.documentElement.requestFullscreen?.().catch(_=>{});}
        e.preventDefault();
      }
      if(['KeyW','KeyA','KeyS','KeyD','KeyQ','KeyE','KeyF','KeyR','Space'].includes(e.code))e.preventDefault();
    });
    window.addEventListener('keyup',e=>{this.keys[e.code]=false;});
    canvas.addEventListener('mousemove',e=>{const p=_toCanvas(e.clientX,e.clientY);this.mouse.x=p.x;this.mouse.y=p.y;});
    canvas.addEventListener('mousedown',e=>{if(e.button===0){const p=_toCanvas(e.clientX,e.clientY);this.mouse.down=true;this.mouseJustPressed=true;this.clickPos=p;}});
    canvas.addEventListener('mouseup',e=>{if(e.button===0)this.mouse.down=false;});
    canvas.addEventListener('contextmenu',e=>e.preventDefault());
  },
  wasPressed(c){return this.justPressed.has(c);},
  consumeClick(){const p=this.clickPos;this.clickPos=null;return p;},
  flush(){this.justPressed.clear();this.mouseJustPressed=false;Gamepads.flush();}
};

// ─── GAMEPADS (PS5 / generic) ──────────────────────────────────
// Standard mapping:
//   axes: 0=LX, 1=LY, 2=RX, 3=RY
//   buttons: 0=X(Cross), 1=Circle, 2=Square, 3=Triangle,
//            4=L1, 5=R1, 6=L2, 7=R2, 8=Share, 9=Options,
//            10=L3, 11=R3, 12=Up, 13=Down, 14=Left, 15=Right
const Gamepads={
  pads:[null,null],         // up to 2 controllers (index = slot)
  _prevBtn:[{},{}],         // previous frame's button state per slot
  _justPressed:[new Set(),new Set()],
  _detectedIds:['',''],     // gamepad.id for each slot (for HUD diagnostics)
  _lastSeen:0,              // timestamp of last connected pad
  DEAD:0.18,
  init(){
    if(this._inited)return;this._inited=true;
    window.addEventListener('gamepadconnected',e=>{
      const i=e.gamepad.index;
      console.log('🎮 Connected:',e.gamepad.id,'idx',i);
      for(let s=0;s<2;s++){if(this.pads[s]==null){this.pads[s]=i;this._detectedIds[s]=e.gamepad.id;this._lastSeen=performance.now();break;}}
    });
    window.addEventListener('gamepaddisconnected',e=>{
      console.log('🎮 Disconnected:',e.gamepad.id);
      for(let s=0;s<2;s++){if(this.pads[s]===e.gamepad.index){this.pads[s]=null;this._detectedIds[s]='';}}
    });
  },
  get(slot){
    if(this.pads[slot]==null)return null;
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    return gps[this.pads[slot]]||null;
  },
  axis(slot,a){const g=this.get(slot);if(!g)return 0;const v=g.axes[a]||0;return Math.abs(v)<this.DEAD?0:v;},
  btn(slot,b){const g=this.get(slot);if(!g||!g.buttons[b])return false;return g.buttons[b].pressed;},
  // returns true once when pressed
  wasPressed(slot,b){return this._justPressed[slot].has(b);},
  // ── D-PAD HELPERS ── robust across mappings (standard buttons 12-15, axes[6/7], HID axes[9])
  // Returns -1, 0, +1 for left/right
  dpadX(slot){
    const g=this.get(slot);if(!g)return 0;
    // standard mapping (buttons)
    if(this.btn(slot,14))return -1;
    if(this.btn(slot,15))return 1;
    // axes[6] is sometimes the D-pad X
    if(g.axes[6]!==undefined&&Math.abs(g.axes[6])>0.5)return g.axes[6]>0?1:-1;
    // HID axes[9]: 8-direction pad coded as values [-1..1] = N, NE, E, SE, S, SW, W, NW
    // commonly: -1=N (up), -0.71=NE, -0.43=E, -0.14=SE, 0.14=S, 0.43=SW, 0.71=W, 1.0=NW (varies)
    const a9=g.axes[9];
    if(a9!==undefined&&Math.abs(a9)<1.1){
      // Convert axes[9] approximate angle to dir
      // many DualSense impls use values: -1 (N), -5/7 (NE), -3/7 (E), -1/7 (SE), 1/7 (S), 3/7 (SW), 5/7 (W), 7/7 (NW), idle ≈ 1.286 or 3.286
      if(a9>-0.6&&a9<-0.2)return 1;       // E
      if(a9>0.6&&a9<1.0)return -1;        // W
      if(a9>-0.2&&a9<0.2)return 1;        // SE-ish → right bias
      if(a9>-1.05&&a9<-0.85)return 0;     // N — no horizontal
    }
    return 0;
  },
  dpadY(slot){
    const g=this.get(slot);if(!g)return 0;
    if(this.btn(slot,12))return -1;
    if(this.btn(slot,13))return 1;
    if(g.axes[7]!==undefined&&Math.abs(g.axes[7])>0.5)return g.axes[7]>0?1:-1;
    const a9=g.axes[9];
    if(a9!==undefined&&Math.abs(a9)<1.1){
      if(a9>-1.05&&a9<-0.85)return -1;    // N
      if(a9>0.0&&a9<0.3)return 1;         // S
    }
    return 0;
  },
  // update per frame — auto-assign newly-connected pads + track press transitions
  update(){
    // Poll the live gamepad list every frame (some browsers require this each frame for fresh data)
    const gps=navigator.getGamepads?navigator.getGamepads():[];
    // 2P signal: either an active 2P game OR the main-menu toggle set to 2 players
    const is2P=(typeof Game!=='undefined'&&(Game.numPlayers===2||Game.coopPlayers===2));
    if(gps){
      // FORCE-MIGRATE: in 2P mode, if a pad is in slot 0 but slot 1 is empty, move it.
      if(is2P&&this.pads[0]!=null&&this.pads[1]==null){
        this.pads[1]=this.pads[0];this._detectedIds[1]=this._detectedIds[0]||'gamepad';
        this.pads[0]=null;this._detectedIds[0]='';
        console.log('🎮 Migrated controller from slot 0 → slot 1 (2P mode)');
      }
      // FORCE-MIGRATE other way: 1P mode + pad sitting in slot 1 only
      if(!is2P&&this.pads[1]!=null&&this.pads[0]==null){
        this.pads[0]=this.pads[1];this._detectedIds[0]=this._detectedIds[1]||'gamepad';
        this.pads[1]=null;this._detectedIds[1]='';
        console.log('🎮 Migrated controller from slot 1 → slot 0 (1P mode)');
      }
      for(let i=0;i<gps.length;i++){
        const gp=gps[i];if(!gp||!gp.connected)continue;
        // already assigned?
        if(this.pads[0]===i||this.pads[1]===i)continue;
        // Claim into slot: in 2P, prefer slot 1 (P2) first
        const order=is2P?[1,0]:[0,1];
        for(const s of order){if(this.pads[s]==null){this.pads[s]=i;this._detectedIds[s]=gp.id||'gamepad';this._lastSeen=performance.now();console.log('🎮 Auto-claimed slot',s,gp.id);break;}}
      }
      // unassign disconnected pads
      for(let s=0;s<2;s++){
        if(this.pads[s]!=null){const g=gps[this.pads[s]];if(!g||!g.connected){this.pads[s]=null;this._detectedIds[s]='';}}
      }
    }
    for(let s=0;s<2;s++){
      const g=this.get(s);if(!g){this._prevBtn[s]={};continue;}
      for(let b=0;b<g.buttons.length;b++){
        const cur=g.buttons[b].pressed,prev=!!this._prevBtn[s][b];
        if(cur&&!prev)this._justPressed[s].add(b);
        this._prevBtn[s][b]=cur;
      }
    }
  },
  // Diagnostic: any pad detected? (used for HUD indicator)
  anyConnected(){return this.pads[0]!=null||this.pads[1]!=null;},
  // Friendly ID string for diagnostic
  diagString(){
    const ids=[];
    if(this.pads[0]!=null)ids.push('P1: '+(this._detectedIds[0]||'connected'));
    if(this.pads[1]!=null)ids.push('P2: '+(this._detectedIds[1]||'connected'));
    return ids.length?ids.join('  ·  '):'NO CONTROLLER DETECTED — press any button on your DualSense after connecting via BT';
  },
  flush(){this._justPressed[0].clear();this._justPressed[1].clear();},
  isConnected(slot){return this.get(slot)!=null;},
  vibrate(slot,duration=120,strong=0.5,weak=0.3){
    const g=this.get(slot);if(!g||!g.vibrationActuator)return;
    try{g.vibrationActuator.playEffect('dual-rumble',{startDelay:0,duration,strongMagnitude:strong,weakMagnitude:weak});}catch(e){}
  },
};

// ─── ONLINE MULTIPLAYER (P2P via Trystero) ─────────────────────
const Net={
  // Lifecycle
  enabled:false,           // true once room is joined
  isHost:false,
  roomCode:'',
  selfId:'',
  status:'',               // status text for UI
  // Connection
  room:null,
  // Wire actions (set up after room is joined)
  _sendInput:null,         // client → host: player input
  _sendState:null,         // host → clients: world snapshot
  _sendStart:null,         // host → clients: signal to start game with seed
  _sendLobby:null,         // host → clients: lobby state (char picks, etc)
  _sendPick:null,          // client → host: my char + weapon pick
  _sendChat:null,          // anyone → all: chat / ping
  // Inbound buffers (latest only)
  inputs:{},               // by peerId: {mx,my,aim,sh,q,r,f,t}
  lastSnapshot:null,       // for clients: last world snapshot
  lobbyState:null,         // for clients: latest lobby state
  // Player roster: array of {peerId, charId, weaponId, slot, isLocal, isHost}
  roster:[],
  // Selected char + weapon (mirrors for outbound pick)
  myCharId:null, myWeaponId:null,
  // Send tick throttle
  _stateAccum:0, _inputAccum:0,
  STATE_HZ:12,  // host broadcast rate
  INPUT_HZ:24,  // client input rate
  // Generate a short alphanumeric room code
  newCode(){
    const C='ABCDEFGHJKMNPQRSTUVWXYZ23456789';let s='';
    for(let i=0;i<6;i++)s+=C[Math.floor(Math.random()*C.length)];
    return s;
  },
  ready(){return !!(window.MP&&window.MP.ready);},
  errorMessage(){return window.MP&&window.MP.error?window.MP.error:null;},
  // Create or join a room. Returns true on success (room object created).
  async connect(code,asHost){
    if(!this.ready()){this.status='Network library not loaded';return false;}
    if(this.room){try{this.room.leave();}catch(_){}}
    this.enabled=false;this.isHost=asHost;this.roomCode=code;this.roster=[];this.inputs={};this.lastSnapshot=null;this.lobbyState=null;
    try{
      this.room=window.MP.joinRoom({appId:'kiwi-mayhem-v1'},code);
      this.selfId=window.MP.selfId;
      [this._sendInput,this._getInput]=this.room.makeAction('inp');
      [this._sendState,this._getState]=this.room.makeAction('st');
      [this._sendStart,this._getStart]=this.room.makeAction('go');
      [this._sendLobby,this._getLobby]=this.room.makeAction('lb');
      [this._sendPick,this._getPick]=this.room.makeAction('pk');
      [this._sendChat,this._getChat]=this.room.makeAction('ch');
      this._getInput((data,pid)=>{this.inputs[pid]=data;});
      this._getState(data=>{if(!this.isHost)this.lastSnapshot=data;});
      this._getStart(data=>{if(!this.isHost)Game._onlineStart(data);});
      this._getLobby(data=>{if(!this.isHost)this.lobbyState=data;});
      this._getPick((data,pid)=>{
        if(!this.isHost)return;
        // host updates roster from a client's pick
        const r=this.roster.find(p=>p.peerId===pid);
        if(r){r.charId=data.charId;r.weaponId=data.weaponId;}
        this._broadcastLobby();
      });
      this.room.onPeerJoin(pid=>{
        if(this.isHost){
          // Add to roster (next free slot)
          const slot=this._nextSlot();
          this.roster.push({peerId:pid,charId:'octane',weaponId:'r301',slot,isLocal:false,isHost:false});
          this._broadcastLobby();
        }
      });
      this.room.onPeerLeave(pid=>{
        delete this.inputs[pid];
        if(this.isHost){
          this.roster=this.roster.filter(p=>p.peerId!==pid);
          this._broadcastLobby();
        } else {
          // If host left, drop us back to menu
          if(this.lobbyState&&this.lobbyState.hostId===pid){
            this.disconnect();
            if(typeof Game!=='undefined')Game.state='main_menu';
          }
        }
      });
      // Host registers itself first
      if(this.isHost){
        this.roster.push({peerId:this.selfId,charId:'octane',weaponId:'r301',slot:0,isLocal:true,isHost:true});
        this._broadcastLobby();
      }
      this.enabled=true;
      this.status=asHost?`Room ${code} · waiting for players`:`Joined ${code} · waiting for host`;
      return true;
    }catch(e){
      this.status='Connection failed: '+(e&&e.message||'unknown');
      console.error('[MP] connect failed',e);
      return false;
    }
  },
  disconnect(){
    if(this.room){try{this.room.leave();}catch(_){}}
    this.room=null;this.enabled=false;this.isHost=false;this.roomCode='';this.roster=[];this.inputs={};this.lastSnapshot=null;this.lobbyState=null;this.status='';
  },
  _nextSlot(){
    const used=new Set(this.roster.map(r=>r.slot));
    for(let i=0;i<4;i++)if(!used.has(i))return i;
    return 0;
  },
  _broadcastLobby(){
    if(!this.isHost||!this._sendLobby)return;
    const state={hostId:this.selfId,roster:this.roster.map(r=>({peerId:r.peerId,charId:r.charId,weaponId:r.weaponId,slot:r.slot,isHost:r.isHost}))};
    this.lobbyState=state;
    try{this._sendLobby(state);}catch(_){}
  },
  // Client updates its own char/weapon pick and tells host
  setMyPick(charId,weaponId){
    this.myCharId=charId;this.myWeaponId=weaponId;
    if(this.isHost){
      const r=this.roster.find(p=>p.peerId===this.selfId);
      if(r){r.charId=charId;r.weaponId=weaponId;}
      this._broadcastLobby();
    } else if(this._sendPick){
      try{this._sendPick({charId,weaponId});}catch(_){}
    }
  },
  // Host begins game, broadcasting roster + seed
  hostStart(){
    if(!this.isHost)return null;
    const seed=Math.floor(Math.random()*0xffffffff);
    const payload={
      roster:this.roster.map((r,i)=>({peerId:r.peerId,charId:r.charId,weaponId:r.weaponId,slot:i,isHost:r.isHost})),
      seed,hostId:this.selfId,startAt:Date.now()
    };
    // Re-slot in order
    payload.roster.forEach((r,i)=>r.slot=i);
    try{this._sendStart(payload);}catch(_){}
    return payload;
  },
  // Roster getter for whoever needs it (always reflects local view)
  currentRoster(){
    if(this.isHost)return this.roster;
    return (this.lobbyState&&this.lobbyState.roster)||[];
  },
  playerCount(){return this.currentRoster().length;},
  // Host: ingest peer input, returns {peerId: latestInput}
  consumeInputs(){return this.inputs;},
  // Client: send our input
  sendInput(input,dt){
    if(!this.enabled||this.isHost||!this._sendInput)return;
    this._inputAccum+=dt;
    if(this._inputAccum<1/this.INPUT_HZ)return;
    this._inputAccum=0;
    try{this._sendInput(input);}catch(_){}
  },
  // Host: broadcast world snapshot
  broadcast(snap,dt){
    if(!this.enabled||!this.isHost||!this._sendState)return;

    }
  }
};

// ─── MUSIC MANAGER · procedural synthwave ──────────────────────
const MusicManager={
  _trackName:null,_step:0,_t:0,_bar:0,_fadeT:0,_fadeTo:null,
  // A-minor progression: i-VI-III-VII (Am-F-C-G) — classic synthwave/cyberpunk
  _chordRoots:[55,43.65,65.41,49],
  setTrack(name){if(this._trackName===name&&this._fadeTo==null)return;if(this._fadeTo===name)return;this._fadeTo=name;this._fadeT=0.4;},
  stop(){if(!this._trackName&&!this._fadeTo)return;this._fadeTo=null;this._fadeT=0.3;},
  _swap(name){this._trackName=name;this._step=0;this._t=0;this._bar=0;},
  update(dt){
    if(this._fadeT>0){this._fadeT-=dt;if(this._fadeT<=0){this._swap(this._fadeTo);this._fadeTo=null;}}
    if(!this._trackName)return;
    if(!AudioManager._ctx||!AudioManager._musicGain)return;
    if(AudioManager._ctx.state==='suspended')return; // wait for user gesture
    // tempo per track — V/S-style is upbeat and driving
    const bpm=this._trackName==='boss'?162:this._trackName==='gameplay'?142:88;
    const stepDur=15/bpm; // 16th-note duration
    this._t-=dt;
    if(this._t<=0){
      this._playStep();
      this._step=(this._step+1)%16;
      if(this._step===0)this._bar=(this._bar+1)%4;
      this._t+=stepDur;
    }
  },
  _playStep(){
    const ctx=AudioManager._ctx;const out=AudioManager._musicGain;
    const t=this._trackName,step=this._step,root=this._chordRoots[this._bar];
    // V/S-style: D minor chord progression i-VI-III-VII (Dm-Bb-F-C) for that epic feel
    // We treat _chordRoots as our chord progression already (A-minor based)
    if(t==='menu'){
      // MENU — gentle but melodic — like V/S title screen
      // sustained pad chord (3 notes)
      if(step===0){
        this._tone(root,'triangle',2.0,0.08,out);
        this._tone(root*1.5,'sine',2.0,0.06,out);
        this._tone(root*2,'sine',2.0,0.05,out);
      }
      // soft bass note on quarters
      if(step%4===0){this._tone(root*0.5,'sine',0.6,0.10,out);}
      // melodic top line — simple lullaby phrase
      const menuMel=[
        [root*4,0,0,root*5, 0,root*4,0,root*3, root*4,0,0,0, 0,0,0,0],
        [0,0,root*4,0, root*3,0,root*4,0, 0,root*5,0,0, 0,0,0,0],
        [root*5,0,0,root*4, 0,root*3,0,root*4, root*5,0,root*6,0, 0,0,0,0],
        [root*4,0,root*3,0, 0,root*4,0,0, root*5,0,0,0, 0,0,0,0],
      ][this._bar];
      if(menuMel[step]){this._tone(menuMel[step],'sine',0.5,0.07,out);this._tone(menuMel[step]*2,'sine',0.5,0.04,out);}
    } else if(t==='gameplay'){
      // === V/S GAMEPLAY: epic & exciting, varied per THEME ===
      const theme=(typeof Themes!=='undefined')?Themes.current:'default';
      // 4-on-floor kick (drive)
      if(step%4===0)this._kick(out);
      // SNARE 2 & 4
      if(step===4||step===12){this._snare(out);this._tone(root*0.25,'sine',0.08,0.10,out);}
      // === THEME-SPECIFIC SOUND PALETTE ===
      if(theme==='jungle'){
        // tribal: bongo-like tom on offbeats + flute lead
        if(step%2===0)this._tone(180+(step%4)*40,'triangle',0.05,0.05,out); // tom
        if(step===6||step===14)this._noise(0.06,0.018,2500,out); // shaker
        // flute-y top line
        if(step%2===0){const fluteN=[root*4,root*5,root*6,root*5][step>>2];this._tone(fluteN,'sine',0.15,0.06,out);this._tone(fluteN*1.5,'sine',0.10,0.025,out);}
        // soft bass
        if(step%4===0)this._tone(root*0.5,'sine',0.20,0.13,out);
      } else if(theme==='ice'){
        // crystalline: bells + cold pad + slow sub
        if(step%2===0)this._tone(root*6+step*30,'sine',0.18,0.045,out); // glass bell
        if(step===0)this._tone(root*2,'triangle',1.0,0.06,out); // sustained pad
        if(step%4===0)this._tone(root*0.5,'sine',0.30,0.14,out); // sub
        // sparkly arp
        const iceArp=[root*4,root*5,root*7,root*5,root*4,root*7,root*5,root*4,root*4,root*5,root*7,root*5,root*4,root*7,root*5,root*4];
        this._tone(iceArp[step],'sine',0.08,0.03,out);
      } else if(theme==='cyber'){
        // synthwave: pumping sub + bright square lead
        if(step%2===0){this._tone(root*0.5,'sawtooth',0.18,0.18,out);this._tone(root,'square',0.16,0.08,out);}
        if(step===6||step===14)this._noise(0.12,0.028,4500,out);
        if(step%2===0)this._noise(0.025,0.022,8500,out);
        const cyberLead=[root*4,0,root*5,0,root*6,root*5,root*4,0,root*5,0,root*4,0,root*3,0,root*4,root*5];
        if(cyberLead[step]){this._tone(cyberLead[step],'square',0.18,0.09,out);this._tone(cyberLead[step]*2,'square',0.18,0.05,out);}
      } else if(theme==='volcano'){
        // taiko-style: heavy low drums + brassy lead
        if(step%2===0)this._kick(out); // double kick
        if(step===0||step===4||step===8||step===12)this._tone(80,'sine',0.15,0.18,out); // big low boom
        // brass lead (sawtooth low octave)
        const volLead=[root*3,0,0,root*4, root*5,0,root*4,0, root*3,0,root*4,0, root*5,0,0,0];
        if(volLead[step]){this._tone(volLead[step],'sawtooth',0.16,0.10,out);this._tone(volLead[step]*0.5,'square',0.14,0.07,out);}
        // crackle/ember
        if(step%4===1)this._noise(0.04,0.018,1500,out);
      } else if(theme==='space'){
        // ethereal: long pad + slow ostinato + occasional bell
        if(step===0){this._tone(root*2,'sine',2.0,0.07,out);this._tone(root*2.5,'sine',2.0,0.05,out);this._tone(root*3,'sine',2.0,0.04,out);}
        if(step%4===0)this._tone(root*0.5,'sine',0.4,0.10,out);
        // shimmery arp
        const spArp=[root*5,root*6,root*8,root*6,root*5,root*6,root*8,root*6,root*5,root*6,root*8,root*6,root*5,root*6,root*8,root*6];
        this._tone(spArp[step],'triangle',0.10,0.03,out);
        // soft chime
        if(step===8)this._tone(root*8,'sine',0.5,0.04,out);
      } else {
        // default: original synthwave anthem
        if(step%2===0)this._noise(0.025,0.022,8500,out);
        if(step===6||step===14)this._noise(0.12,0.028,4500,out);
        if(step%2===0){this._tone(root*0.5,'sawtooth',0.18,0.18,out);this._tone(root,'square',0.16,0.08,out);}
        const lead=[
          [root*4,0,root*5,0, root*6,root*5,root*4,0, root*5,0,root*4,0, root*3,0,root*4,root*5],
          [root*4,0,root*4,0, root*5,0,root*6,root*5, root*4,root*3,root*4,0, 0,root*4,0,root*5],
          [root*6,0,root*8,0, root*6,0,root*5,0, root*6,root*8,root*9,root*8, root*6,0,root*5,0],
          [root*5,root*4,root*5,root*6, 0,root*5,0,root*4, root*3,0,root*4,0, root*5,root*6,0,0],
        ][this._bar];
        if(lead[step]){const f=lead[step];this._tone(f,'square',0.18,0.09,out);this._tone(f*2,'square',0.18,0.05,out);}
      }
    } else if(t==='boss'){
      // === BOSS: epic, ominous, fast ===
      // double-time kick (driving)
      if(step%2===0)this._kick(out);
      // SNARE 1/8 syncopation
      if(step===4||step===12||step===15)this._snare(out);
      // HI-HATS 16ths (faster)
      this._noise(0.022,0.024,9000,out);
      // CRASH on bar transition
      if(step===0)this._noise(0.4,0.06,2200,out);
      // HUGE pulsing sub-bass on every 16th (creates urgency)
      this._tone(root*0.25,'sine',0.10,0.20,out);
      // sawtooth bass riff
      if(step%4===0){this._tone(root,'sawtooth',0.15,0.18,out);this._tone(root*0.5,'square',0.15,0.10,out);}
      if(step===6||step===14){this._tone(root*1.2,'sawtooth',0.10,0.10,out);} // dissonant push
      // === MENACING LEAD ARP ===
      const bossArp=[root*4,root*5,root*7,root*5, root*4,root*5,root*7,root*8, root*7,root*5,root*4,root*3, root*4,root*5,root*7,root*9];
      this._tone(bossArp[step],'sawtooth',0.10,0.06,out);
      this._tone(bossArp[step]*0.5,'triangle',0.10,0.04,out);
      // Choir-like pad (sustains across bar)
      if(step===0){
        this._tone(root*2,'sine',2.0,0.05,out);
        this._tone(root*2.4,'sine',2.0,0.04,out); // minor 2nd for tension
        this._tone(root*3,'sine',2.0,0.04,out);
      }
      // hero melody every other bar
      if(this._bar%2===0){
        const heroMel=[root*4,0,0,root*5, root*6,0,root*8,0, root*9,0,root*8,root*6, root*5,0,0,0];
        if(heroMel[step]){this._tone(heroMel[step],'square',0.16,0.07,out);this._tone(heroMel[step]*2,'triangle',0.16,0.04,out);}
      }
    }
  },
  _tone(freq,type,dur,vol,gain){
    const ctx=AudioManager._ctx;if(!ctx)return;
    const osc=ctx.createOscillator(),env=ctx.createGain();

    env.gain.linearRampToValueAtTime(vol,ctx.currentTime+0.008);
    env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
    osc.connect(env);env.connect(gain);osc.start();osc.stop(ctx.currentTime+dur+0.02);
  },
  _noise(dur,vol,filter,gain){

    src.buffer=buf;src.connect(flt);flt.connect(env);env.connect(gain);
    env.gain.setValueAtTime(vol,ctx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);

  },
  _kick(gain){
    const ctx=AudioManager._ctx;if(!ctx)return;
    const osc=ctx.createOscillator(),env=ctx.createGain();
    osc.type='sine';
    osc.frequency.setValueAtTime(120,ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40,ctx.currentTime+0.10);
    env.gain.setValueAtTime(0.22,ctx.currentTime);
    env.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.15);
    osc.connect(env);env.connect(gain);osc.start();osc.stop(ctx.currentTime+0.16);
  },
  _snare(gain){
    this._noise(0.12,0.10,1800,gain);
    this._tone(220,'triangle',0.08,0.06,gain);
  }
};

// ─── PARTICLES ─────────────────────────────────────────────────
const Particles={
  list:[],MAX:300,
  spawn(x,y,o={}){
    // when at cap, drop oldest particle (front of array)
    if(this.list.length>=this.MAX)this.list.shift();
    this.list.push({x,y,vx:o.vx??0,vy:o.vy??0,life:o.life??0.5,maxLife:o.life??0.5,r:o.r??3,color:o.color??'#fff'});
  },
  burst(x,y,n,o={}){
    // Scale burst count down if list is filling up to keep perf smooth
    const room=Math.max(0,this.MAX-this.list.length);
    const actual=Math.min(n,Math.max(4,Math.floor(room/3)));
    for(let i=0;i<actual;i++){const a=Math.random()*Math.PI*2,s=(o.speed??90)*(0.4+Math.random()*.6);this.spawn(x,y,{...o,vx:Math.cos(a)*s,vy:Math.sin(a)*s});}
  },
  update(dt){for(let i=this.list.length-1;i>=0;i--){const p=this.list[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=0.88;p.vy*=0.88;p.life-=dt;if(p.life<=0)this.list.splice(i,1);}},
  draw(){
    // batch: cull offscreen particles before any expensive ops
    const cw=canvas.width,ch=canvas.height;
    for(const p of this.list){
      const sx=Camera.sx(p.x),sy=Camera.sy(p.y);
      if(sx<-20||sy<-20||sx>cw+20||sy>ch+20)continue;
      ctx.globalAlpha=Math.max(0,p.life/p.maxLife);
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(sx,sy,p.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
};

// ─── DAMAGE NUMBERS ─────────────────────────────────────────────

  update(dt){for(let i=this.list.length-1;i>=0;i--){const n=this.list[i];n.y+=n.vy*dt;n.vy*=0.94;n.life-=dt;if(n.life<=0)this.list.splice(i,1);}},
  draw(){
    this.list.forEach(n=>{
      const sx=Camera.sx(n.x),sy=Camera.sy(n.y),f=n.life/n.maxLife;
      const alpha=Math.min(1,f*2.5);

      const scl=n.crit?(0.7+Math.min(1,(1-f)*8)*0.6):(0.85+Math.min(1,(1-f)*6)*0.3);
      ctx.save();ctx.translate(sx,sy);ctx.scale(scl,scl);ctx.globalAlpha=alpha;

        // bright fill

        ctx.font='bold 7px monospace';ctx.fillStyle='#ffaa00';

      } else {
        const sz=typeof n.dmg==='string'?13:12;
        ctx.font=`bold ${sz}px monospace`;ctx.textAlign='center';
        ctx.strokeStyle='rgba(0,0,0,0.8)';ctx.lineWidth=2.5;ctx.strokeText(n.dmg,0,0);

};

// ─── EFFECTS ───────────────────────────────────────────────────
const Effects={
  list:[],MAX:55,
  add(e){
    // when at cap, drop oldest non-persistent effect to make room
    if(this.list.length>=this.MAX){
      // prefer to drop one with shortest life remaining
      let oi=0,olife=Infinity;
      for(let i=0;i<this.list.length;i++){if(this.list[i].life<olife){olife=this.list[i].life;oi=i;}}
      this.list.splice(oi,1);
    }
    this.list.push(e);
  },
  update(dt,enemies,player){
    for(let i=this.list.length-1;i>=0;i--){
      const e=this.list[i];e.life-=dt;
      if(e.update)e.update(dt,enemies,player);
      if(e.life<=0){if(e.onExpire)e.onExpire(enemies,player);this.list.splice(i,1);}
    }
  },
  draw(){
    // viewport cull effects with x/y position
    const cw=canvas.width,ch=canvas.height;
    for(let i=0;i<this.list.length;i++){
      const e=this.list[i];if(!e.draw)continue;
      if(typeof e.x==='number'&&typeof e.y==='number'){
        const sx=Camera.sx(e.x),sy=Camera.sy(e.y),margin=(e.r||80)+80;
        if(sx<-margin||sy<-margin||sx>cw+margin||sy>ch+margin)continue;
      }
      e.draw();
    }
  },
  clear(){this.list=[];}
};

// ─── BULLETS ───────────────────────────────────────────────────
const Bullets={
  list:[],
  MAX:200,
  fire(x,y,angle,ownerId,color,dmg=1,opts={}){
    // cap: drop oldest non-boomerang bullet to make room
    if(this.list.length>=this.MAX){
      for(let i=0;i<this.list.length;i++){if(!this.list[i].boomerang){this.list.splice(i,1);break;}}
    }
    const speed=(opts.speed??BULL_S)*(opts.weaponSpeed??1)*(1+(opts.speedBonus??0));
    const r=BULL_R*(opts.weaponSize??1)*(1+(opts.sizeBonus??0));
    this.list.push({x,y,prevX:x,prevY:y,startX:x,startY:y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,
      ownerId,color:color??'#ffe066',dmg,r,trailHistory:[],
      poison:opts.poison??false,explosive:opts.explosive??false,freeze:opts.freeze??false,
      pierce:opts.pierce??0,hitIds:[],trail:opts.trail??0,
      boomerang:opts.boomerang??false,boomerangT:0,boomerangPhase:'out',
      homing:opts.homing??false,
      silly:opts.silly,knockback:opts.knockback||0,wiggleT:Math.random()*Math.PI*2,
      life:opts.boomerang?2.4:1.6,maxLife:opts.boomerang?2.4:1.6,bounces:opts.bounces??0});
  },
  update(dt,entities){
    outer:for(let i=this.list.length-1;i>=0;i--){
      const b=this.list[i];b.prevX=b.x;b.prevY=b.y;
      // boomerang: outward 0.55s, then curve back to owner ALL THE WAY
      if(b.boomerang){
        b.boomerangT+=dt;
        b.life=Math.max(b.life,0.5); // don't expire while returning
        if(b.boomerangT>0.55){
          const owner=entities.find(e=>e.id===b.ownerId);
          if(owner){
            const dx=owner.x-b.x,dy=owner.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;
            // ramp speed toward target so it accelerates home
            const baseSpeed=BULL_S*(b.weaponSpeed??1);
            const targetSpeed=baseSpeed*(b.boomerangPhase==='back'?1.3:1);
            const tx=dx/d*targetSpeed,ty=dy/d*targetSpeed;
            b.vx+=(tx-b.vx)*dt*5;b.vy+=(ty-b.vy)*dt*5;
            if(b.boomerangPhase==='out'){b.boomerangPhase='back';b.hitIds=[];}
            // burst particles when banana returns home
            if(d<P_R+6&&b.boomerangPhase==='back'){
              Particles.burst(b.x,b.y,8,{color:b.color,speed:90,life:0.35,r:3});
              this.list.splice(i,1);continue;
            }
          }
        }
      }
      // fish wiggle
      if(b.silly==='fish'){b.wiggleT+=dt*8;const wd=Math.sin(b.wiggleT)*0.4;const ang=Math.atan2(b.vy,b.vx)+wd*0.3;const s=Math.sqrt(b.vx*b.vx+b.vy*b.vy);b.vx=Math.cos(ang)*s;b.vy=Math.sin(ang)*s;}
      // homing (slipper, vacuum) - steer toward nearest enemy
      if(b.homing){
        let near=null,bd=Infinity;
        for(const e of entities){if(!e.isEnemy||!e.alive||b.hitIds.includes(e.id))continue;const dx=e.x-b.x,dy=e.y-b.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;near=e;}}
        if(near){const dx=near.x-b.x,dy=near.y-b.y,d=Math.sqrt(dx*dx+dy*dy)||1;const s=Math.sqrt(b.vx*b.vx+b.vy*b.vy);const tx=dx/d*s,ty=dy/d*s;b.vx+=(tx-b.vx)*dt*6;b.vy+=(ty-b.vy)*dt*6;}
      }
      b.x+=b.vx*dt;b.y+=b.vy*dt;b.life-=dt;
      // shorter trail (was 8*trail, now 5*trail) for perf
      if(b.trail>0){b.trailHistory.push([b.x,b.y]);if(b.trailHistory.length>Math.ceil(5*b.trail))b.trailHistory.shift();}
      // boomerangs never die from life expiry - they only despawn on return
      if(b.boomerang&&b.life<=0)b.life=0.5;
      // out of arena (allow boomerangs slightly outside to curve back)
      if((!polyContains(b.x,b.y)&&!b.boomerang)||b.life<=0){
        Particles.burst(b.x,b.y,3,{color:b.color,speed:35,life:0.18,r:1.4});
        this.list.splice(i,1);continue;
      }
      // obstacle bounce/destroy
      const obs=collideObstacle(b.x,b.y,b.r);
      if(obs){
        if(b.bounces>0){b.bounces--;
          // simple bounce: reverse based on closest axis
          const ndx=b.x-obs.x,ndy=b.y-obs.y;
          if(Math.abs(ndx/obs.w)>Math.abs(ndy/obs.h))b.vx=-b.vx;else b.vy=-b.vy;
        } else {
          Particles.burst(b.x,b.y,4,{color:'#ccaa66',speed:40,life:0.2,r:1.5});
          this.list.splice(i,1);continue;
        }
      }
      for(const e of entities){
        if(e.id===b.ownerId||!e.alive)continue;
        // NO FRIENDLY FIRE: bullets from one player skip the other player
        if(typeof Game!=='undefined'&&Game.numPlayers===2&&e===Game.player2&&b.ownerId===Game.player?.id)continue;
        if(typeof Game!=='undefined'&&Game.numPlayers===2&&e===Game.player&&b.ownerId===Game.player2?.id)continue;
        if(b.hitIds.includes(e.id))continue;
        const dx=e.x-b.x,dy=e.y-b.y,hr=(e.r??PHYS_R)+b.r;
        if(dx*dx+dy*dy<hr*hr){
          let dmg=b.dmg;

          if(shooter?.predator){const ang=Math.atan2(e.moveDy??0,e.moveDx??0);const bullAng=Math.atan2(b.vy,b.vx);const diff=Math.abs(((ang-bullAng+Math.PI*3)%(Math.PI*2))-Math.PI);if(diff<Math.PI/3)dmg*=1+shooter.predator;}

          e.takeDamage(finalDmg,b.ownerId);
          DmgNumbers.spawn(e.x,e.y,finalDmg,isCrit);
          // Hit flash + spark particles (drastically reduced in perfMode)

          const _crowded=Game.enemies&&Game.enemies.length>40;

          if((isCrit&&!_perf)||(!_crowded&&!_perf)){

          if(b.silly==null&&shooter?.id===Game.player?.id&&b.dmg>=35&&Math.random()<0.10){
            // 10% to arc lightning to nearby enemy
            for(const e2 of Game.enemies){if(!e2.alive||e2===e)continue;const dx=e2.x-e.x,dy=e2.y-e.y;if(dx*dx+dy*dy<140*140){e2.takeDamage(Math.round(b.dmg*0.5),b.ownerId);Effects.add({sx:e.x,sy:e.y,ex:e2.x,ey:e2.y,life:0.2,maxLife:0.2,draw(){const ax=Camera.sx(this.sx),ay=Camera.sy(this.sy),bx=Camera.sx(this.ex),by=Camera.sy(this.ey),f=this.life/this.maxLife;ctx.save();ctx.globalCompositeOperation='lighter';ctx.globalAlpha=f*0.9;ctx.strokeStyle='#ffee44';ctx.lineWidth=3;ctx.shadowColor='#fff';ctx.shadowBlur=18;ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(bx,by);ctx.stroke();ctx.restore();ctx.shadowBlur=0;ctx.globalAlpha=1;}});break;}}
          }
          // BLACKHOLE - MUCH bigger black hole with damage-over-time + collapse implosion
          if(b.silly==='blackhole'){
            Effects.add({x:b.x,y:b.y,r:200,life:4,maxLife:4,_tick:0,
              update(dt){
                this._tick=(this._tick||0)-dt;
                for(const e of Game.enemies){if(!e.alive)continue;const dx=this.x-e.x,dy=this.y-e.y,d=Math.sqrt(dx*dx+dy*dy);if(d<this.r&&d>5){
                  // stronger pull
                  e.x+=dx/d*280*dt;e.y+=dy/d*280*dt;
                  // tick damage near center
                  if(this._tick<=0&&d<this.r*0.6){e.takeDamage(4,b.ownerId);}
                }}
                if(this._tick<=0)this._tick=0.3;
              },
              onExpire(){
                // MASSIVE collapse explosion
                for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-this.x,dy=e.y-this.y;const d2=dx*dx+dy*dy;if(d2<this.r*this.r){e.takeDamage(45,b.ownerId);if(e.alive&&e.applyStun)e.applyStun(1.0);}}
                Particles.burst(this.x,this.y,50,{color:'#8844ff',speed:340,life:1.0,r:7});
                Particles.burst(this.x,this.y,28,{color:'#fff',speed:200,life:0.6,r:4});
                Camera.shake(10,0.4);AudioManager.play('explosion');
                // 3 shockwave rings
                for(let _r=0;_r<3;_r++){
                  Effects.add({x:this.x,y:this.y,r:0,life:0.5+_r*0.1,maxLife:0.5+_r*0.1,_d:_r*40,
                    draw(){const ssx=Camera.sx(this.x),ssy=Camera.sy(this.y),p=1-this.life/this.maxLife;
                      ctx.save();ctx.globalCompositeOperation='lighter';
                      ctx.globalAlpha=(1-p)*0.85;ctx.strokeStyle='#aa66ff';ctx.lineWidth=4;ctx.shadowColor='#8844ff';ctx.shadowBlur=22;
                      ctx.beginPath();ctx.arc(ssx,ssy,(this.r+this._d+200)*p,0,Math.PI*2);ctx.stroke();
                      ctx.restore();ctx.shadowBlur=0;ctx.globalAlpha=1;}});
                }
              },
              draw(){const sx=Camera.sx(this.x),sy=Camera.sy(this.y),f=this.life/this.maxLife,t=performance.now()/180;
                ctx.save();ctx.translate(sx,sy);
                // outer event horizon (4 rotating arcs)

                for(let k=0;k<4;k++){const a=t+k*Math.PI/2;
                  ctx.strokeStyle=`rgba(180,100,255,${0.7*f})`;ctx.lineWidth=4;
                  ctx.beginPath();ctx.arc(0,0,this.r,a,a+Math.PI*0.6);ctx.stroke();}
                // accretion disc
                ctx.rotate(t);
                ctx.strokeStyle=`rgba(200,140,255,${0.9*f})`;ctx.lineWidth=3;
                ctx.beginPath();ctx.arc(0,0,this.r*0.75,0,Math.PI*1.6);ctx.stroke();
                ctx.strokeStyle=`rgba(255,220,255,${f})`;ctx.lineWidth=2;ctx.shadowBlur=14;
                ctx.beginPath();ctx.arc(0,0,this.r*0.55,Math.PI*0.4,Math.PI*1.8);ctx.stroke();
                // inner dark singularity
                ctx.shadowBlur=0;ctx.fillStyle='rgba(8,3,20,0.95)';ctx.beginPath();ctx.arc(0,0,38,0,Math.PI*2);ctx.fill();
                // bright core point
                ctx.fillStyle=`rgba(255,200,255,${f*0.9})`;ctx.shadowColor='#fff';ctx.shadowBlur=16;
                ctx.beginPath();ctx.arc(0,0,5+Math.sin(t*4)*2,0,Math.PI*2);ctx.fill();
                ctx.restore();ctx.shadowBlur=0;}});
          }
          // Emotional damage cannon - text effect (silly dice doesn't use this but kept for future)
          if(b.poison&&e.applyPoison)e.applyPoison(1+(shooter?.poisonPower??0),3);
          if(b.freeze&&e.applySlow)e.applySlow(0.4,1+0.3*(shooter?.cryoRounds??0));
          if(b.explosive){
            Particles.burst(b.x,b.y,14,{color:'#ff6600',speed:130,life:0.55,r:5});
            let hits=0;
            for(const e2 of entities){if(!e2.alive||e2.id===b.ownerId||e2.id===e.id)continue;const dx2=e2.x-b.x,dy2=e2.y-b.y;if(dx2*dx2+dy2*dy2<70*70){e2.takeDamage(Math.ceil(dmg*0.6),b.ownerId);hits++;if(shooter?.cascade&&hits>(shooter.cascade??0))break;}}
          }
          // chain lightning
          if(shooter?.chainLightning){
            let lastE=e;
            for(let k=0;k<shooter.chainLightning;k++){
              let next=null,bestD=140*140;
              for(const e2 of entities){if(!e2.alive||e2.id===b.ownerId||e2.id===lastE.id||e2.chained)continue;const dx2=e2.x-lastE.x,dy2=e2.y-lastE.y,d2=dx2*dx2+dy2*dy2;if(d2<bestD){bestD=d2;next=e2;}}
              if(!next)break;
              next.chained=true;next.takeDamage(Math.ceil(dmg*0.5),b.ownerId);
              // lightning particle
              Particles.burst(next.x,next.y,4,{color:'#eeff44',speed:60,life:0.2,r:2});
              lastE=next;
            }
            // reset chained markers
            for(const e2 of entities)e2.chained=false;
          }
          // lifesteal
          if(shooter?.lifesteal&&shooter.hp<shooter.maxHp)shooter.hp=Math.min(shooter.maxHp,shooter.hp+finalDmg*shooter.lifesteal);
          if(shooter?.onDealDamage)shooter.onDealDamage(dmg,e);
          if(wasAlive&&!e.alive&&shooter?.onKill){shooter.onKill(e);
            // rampage stacks on kill
            if(shooter.rampageBonus){shooter.rampageStacks=Math.min(shooter.rampageMax||10,(shooter.rampageStacks||0)+1);shooter.rampageT=5;}}
          Particles.burst(b.x,b.y,5,{color:e.color??'#ff5533',speed:70,life:0.25,r:2.5});
          if(b.pierce>0){b.pierce--;b.hitIds.push(e.id);continue;}
          this.list.splice(i,1);continue outer;
        }
      }
    }
  },
  draw(){
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    const cw=canvas.width,ch=canvas.height;
    // detect high-load mode and reduce per-bullet draw cost
    const heavy=this.list.length>70||(Game.enemies&&Game.enemies.length>40);
    for(let bi=0;bi<this.list.length;bi++){
      const b=this.list[bi];
      const sx=Camera.sx(b.x),sy=Camera.sy(b.y);
      // off-screen cull
      if(sx<-40||sy<-40||sx>cw+40||sy>ch+40)continue;
      // trail — only render if not heavy load
      if(!heavy&&b.trail>0&&b.trailHistory.length>1){
        // outer glow trail (single pass)
        ctx.strokeStyle=b.color;ctx.lineCap='round';ctx.shadowColor=b.color;ctx.shadowBlur=10;
        const n=b.trailHistory.length;
        for(let i=1;i<n;i++){
          const tn=i/n;
          ctx.globalAlpha=tn*0.9*b.trail*0.55;
          ctx.lineWidth=b.r*2.2*tn;
          ctx.beginPath();ctx.moveTo(Camera.sx(b.trailHistory[i-1][0]),Camera.sy(b.trailHistory[i-1][1]));ctx.lineTo(Camera.sx(b.trailHistory[i][0]),Camera.sy(b.trailHistory[i][1]));ctx.stroke();
        }
        ctx.shadowBlur=0;
        ctx.globalAlpha=1;
      } else if(b.trail>0&&b.trailHistory.length>1){
        // heavy load: simple single-line trail, no glow
        ctx.strokeStyle=b.color;ctx.shadowBlur=0;
        ctx.globalAlpha=0.4;ctx.lineWidth=b.r*1.2;
        const last=b.trailHistory[b.trailHistory.length-1];
        ctx.beginPath();ctx.moveTo(Camera.sx(b.trailHistory[0][0]),Camera.sy(b.trailHistory[0][1]));ctx.lineTo(Camera.sx(last[0]),Camera.sy(last[1]));ctx.stroke();
        ctx.globalAlpha=1;
      }
      // glow halo (skip in heavy mode)
      if(!heavy){
        ctx.shadowColor=b.color;ctx.shadowBlur=b.explosive?22:14;
        ctx.globalAlpha=0.5;ctx.fillStyle=b.color;
        ctx.beginPath();ctx.arc(sx,sy,b.r*1.5,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      }
      // main body
      ctx.globalAlpha=1;ctx.fillStyle=b.explosive?'#ffcc44':b.color;
      ctx.beginPath();ctx.arc(sx,sy,b.r,0,Math.PI*2);ctx.fill();
      // hot core
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(sx,sy,b.r*0.55,0,Math.PI*2);ctx.fill();
    }
    ctx.globalCompositeOperation='source-over';
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    ctx.restore();
  },
  clear(){this.list=[];}
};

// ─── XP ORBS ───────────────────────────────────────────────────
const XpOrbs={
  list:[],
  spawn(x,y,v=1){for(let i=0;i<v;i++)this.list.push({x:x+(Math.random()-.5)*22,y:y+(Math.random()-.5)*22,bobT:Math.random()*Math.PI*2,life:25,value:1});},
  update(dt,player){
    // Collect for BOTH players (P1 + P2). Falls back to P1 only when no P2.
    const players=[player,Game.player2].filter(p=>p&&p.alive);
    if(players.length===0)return;
    for(let i=this.list.length-1;i>=0;i--){
      const o=this.list[i];o.bobT+=dt*2.5;o.life-=dt;
      let claimed=false;
      // Find nearest player and pull / pickup for that one
      let nearest=null,bd=Infinity;
      for(const p of players){const dx=p.x-o.x,dy=p.y-o.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;nearest=p;}}
      if(nearest){
        const dx=nearest.x-o.x,dy=nearest.y-o.y;
        const pickR=nearest.pickupRadius??PHYS_R+18;
        const magR=nearest.magnetRadius??160;
        if(nearest.xpMagnet&&bd<magR*magR){const d=Math.sqrt(bd)||1;o.x+=dx/d*240*dt;o.y+=dy/d*240*dt;}
        if(bd<pickR*pickR){nearest.collectXp(o.value);claimed=true;}
      }
      if(claimed||o.life<=0){
        Particles.burst(o.x,o.y,4,{color:'#44ffff',speed:50,life:0.22,r:1.4});
        this.list.splice(i,1);
      }
    }
  },
  draw(){
    this.list.forEach(o=>{
      const sx=Camera.sx(o.x),sy=Camera.sy(o.y)+Math.sin(o.bobT)*2.5;
      const r=5.5;
      // outer glow ring
      ctx.strokeStyle='rgba(68,255,255,0.35)';ctx.lineWidth=3;
      ctx.beginPath();ctx.arc(sx,sy,r+3,0,Math.PI*2);ctx.stroke();
      // gem body (diamond shape)
      ctx.shadowColor='#44ffff';ctx.shadowBlur=12;ctx.fillStyle='#44ffff';
      ctx.beginPath();
      ctx.moveTo(sx,sy-r);        // top
      ctx.lineTo(sx+r*0.7,sy);    // right
      ctx.lineTo(sx,sy+r*0.6);    // bottom
      ctx.lineTo(sx-r*0.7,sy);    // left
      ctx.closePath();ctx.fill();
      ctx.shadowBlur=0;
      // gem facets
      ctx.strokeStyle='rgba(180,255,255,0.5)';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.moveTo(sx,sy-r);ctx.lineTo(sx+r*0.7,sy);ctx.lineTo(sx-r*0.7,sy);ctx.closePath();ctx.stroke();
      // shine spot
      ctx.fillStyle='rgba(255,255,255,0.75)';
      ctx.beginPath();ctx.ellipse(sx-1,sy-r*0.4,1.5,2,0,0,Math.PI*2);ctx.fill();
    });
  },
  clear(){this.list=[];}
};

    feathers:0,        // Kiwi Feathers — 5 → 1 bird auto-convert
    chars:['octane'],weapons:['r301'],
    tree:{},           // Evolution tree: { pathId: level }
    stats:{highestWave:0,bossesKilled:0,runsCompleted:0,totalKills:0},
    lastDailyBonus:0,  // timestamp of last daily bonus
  },
  load(){
    try{const s=localStorage.getItem('apex_arena_save');if(s)this.data={...this.data,...JSON.parse(s)};}catch(e){}
    if(!this.data.chars||!this.data.chars.length)this.data.chars=['octane'];
    if(!this.data.weapons||!this.data.weapons.length)this.data.weapons=['r301'];
    if(typeof this.data.kiwis!=='number')this.data.kiwis=0;
    if(typeof this.data.birds!=='number')this.data.birds=0;
    if(typeof this.data.feathers!=='number')this.data.feathers=0;
    if(!this.data.tree||typeof this.data.tree!=='object')this.data.tree={};
    if(!this.data.stats)this.data.stats={highestWave:0,bossesKilled:0,runsCompleted:0,totalKills:0};
    if(typeof this.data.lastDailyBonus!=='number')this.data.lastDailyBonus=0;
  },
  save(){try{localStorage.setItem('apex_arena_save',JSON.stringify(this.data));}catch(e){}},
  addKiwis(n){this._frac=(this._frac||0)+n*1.05;const w=Math.floor(this._frac);this._frac-=w;this.data.kiwis+=w;this.save();},
  addBirds(n){this.data.birds+=n;this.save();},
  addFeather(n=1){
    this.data.feathers=(this.data.feathers||0)+n;
    while(this.data.feathers>=5){this.data.feathers-=5;this.data.birds+=1;UI.announce('+1 KIWI BIRD 🐦',1.6,'#ffdd66');}
    this.save();
  },
  spendBirds(n){if(this.data.birds>=n){this.data.birds-=n;this.save();return true;}return false;},
  unlockChar(id){if(!this.data.chars.includes(id)){this.data.chars.push(id);this.save();}},
  unlockWeapon(id){if(!this.data.weapons.includes(id)){this.data.weapons.push(id);this.save();}},
  isCharUnlocked(id){return this.data.chars.includes(id);},
  isWeaponUnlocked(id){return this.data.weapons.includes(id);},
  // Evolution tree
  getTreeLvl(pathId){return this.data.tree[pathId]||0;},
  setTreeLvl(pathId,lvl){this.data.tree[pathId]=lvl;this.save();},
  // Stats
  bumpStat(key,n=1){this.data.stats[key]=(this.data.stats[key]||0)+n;this.save();},
  setMaxStat(key,n){if(n>(this.data.stats[key]||0)){this.data.stats[key]=n;this.save();}},
  // Daily bonus: returns true if granted this session start
  tryDailyBonus(){
    const now=Date.now();const last=this.data.lastDailyBonus||0;

      this.data.lastDailyBonus=now;this.data.birds+=2;this.save();return true;
    }
    return false;
  },
  reset(){this.data={kiwis:0,birds:0,feathers:0,chars:['octane'],weapons:['r301'],tree:{},stats:{highestWave:0,bossesKilled:0,runsCompleted:0,totalKills:0},lastDailyBonus:0,pets:{unlocked:{},selected:null},achievements:{}};this.save();},
};

    r.push({type:'relic',id:Relics.pickRandom().id});
    // Always: kiwi fruit
    r.push({type:'kiwi',amount:20+Math.floor(Math.random()*30)});
    // Small chance for Kiwi Bird
    if(Math.random()<0.30)r.push({type:'bird',amount:1});
    return r;
  },
  clear(){this.list=[];},
  update(dt,player){
    for(let i=this.list.length-1;i>=0;i--){
      const c=this.list[i];c.t+=dt;c.bobT+=dt*4;c.life-=dt;
      if(c.life<=0){this.list.splice(i,1);continue;}
      // jump arc
      if(c.t<0.8){c.y+=c.vy*dt;c.vy+=600*dt;}
      // Check player interaction (any player nearby)
      if(!c.opened){
        const players=[Game.player,Game.player2].filter(p=>p&&p.alive);
        for(const pl of players){
          const dx=pl.x-c.x,dy=pl.y-c.y;
          if(dx*dx+dy*dy<(P_R+24)*(P_R+24)){this.open(c,pl);break;}
        }
      } else {
        c.openT+=dt;
        if(c.openT>1.5){this.list.splice(i,1);}
      }
    }
  },
  open(chest,player){
    chest.opened=true;chest.openT=0;
    AudioManager.play('level_up');Camera.shake(5,0.3);
    // burst particles
    Particles.burst(chest.x,chest.y,32,{color:'#ffdd66',speed:200,life:0.9,r:5});
    Particles.burst(chest.x,chest.y-8,18,{color:'#fff',speed:140,life:0.6,r:3});
    // Apply each reward
    for(const r of chest.rewards){
      if(r.type==='relic'){Relics.giveTo(player,r.id);}
      else if(r.type==='kiwi'){Save.addKiwis(r.amount);UI.announce(`+${r.amount} 🥝`,1.8,'#88ff44');}
      else if(r.type==='bird'){Save.addBirds(r.amount);UI.announce(`+${r.amount} 🐦`,1.8,'#ffdd66');}
    }
  },
  draw(){
    for(const c of this.list){
      const sx=Camera.sx(c.x),sy=Camera.sy(c.y);
      const wobble=Math.sin(c.bobT)*3;
      ctx.save();ctx.translate(sx,sy);
      if(!c.opened){
        // Closed chest: brown wood + gold trim, pulsing glow
        const pulse=0.6+Math.sin(c.bobT*1.5)*0.4;
        ctx.shadowColor='#ffdd66';ctx.shadowBlur=14*pulse;
        ctx.fillStyle='#7a5022';ctx.beginPath();ctx.roundRect(-20,-8+wobble*0.3,40,24,3);ctx.fill();
        ctx.fillStyle='#5c3818';ctx.beginPath();ctx.roundRect(-20,-14+wobble*0.3,40,8,3);ctx.fill();
        // gold band
        ctx.fillStyle='#ffcc44';ctx.fillRect(-20,-5+wobble*0.3,40,3);
        // lock
        ctx.fillStyle='#ffdd66';ctx.beginPath();ctx.arc(0,0+wobble*0.3,3,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
        // "OPEN" hint when player is close
        const players=[Game.player,Game.player2].filter(p=>p&&p.alive);
        let close=false;for(const pl of players){const dx=pl.x-c.x,dy=pl.y-c.y;if(dx*dx+dy*dy<(P_R+60)*(P_R+60)){close=true;break;}}
        if(close){
          ctx.fillStyle='#ffee88';ctx.font='bold 11px monospace';ctx.textAlign='center';ctx.shadowColor='#000';ctx.shadowBlur=4;
          ctx.fillText('WALK INTO TO OPEN',0,-28);ctx.shadowBlur=0;ctx.textAlign='left';
        }
      } else {
        // Opened chest: lid flies up, golden burst
        const p=Math.min(1,c.openT*2);
        ctx.shadowColor='#ffdd66';ctx.shadowBlur=22;
        ctx.fillStyle='#7a5022';ctx.beginPath();ctx.roundRect(-20,-8,40,24,3);ctx.fill();
        ctx.fillStyle='#ffcc44';ctx.fillRect(-20,-5,40,3);
        // lid lifted up
        ctx.save();ctx.translate(0,-20-p*30);ctx.rotate(-p*0.5);
        ctx.fillStyle='#5c3818';ctx.beginPath();ctx.roundRect(-20,-4,40,8,3);ctx.fill();
        ctx.restore();
        // light beam
        ctx.globalAlpha=(1-p)*0.7;
        ctx.fillStyle='#ffee88';ctx.beginPath();ctx.moveTo(-18,-8);ctx.lineTo(-30,-60);ctx.lineTo(30,-60);ctx.lineTo(18,-8);ctx.closePath();ctx.fill();
        ctx.globalAlpha=1;ctx.shadowBlur=0;
      }
      ctx.restore();
    }
  }
};

// ─── COMPANIONS · permanent buddies ───────────────────────────
const COMPANION_DEFS=[
  // free starter pets
  {id:'dog',name:'Dog',color:'#cc8844',icon:'🐕',effect:'Bites nearby enemies · +5 dmg/bite',cost:0,rarity:'common'},
  {id:'chicken',name:'Chicken',color:'#ffee88',icon:'🐓',effect:'Drops random eggs · heal or AoE',cost:0,rarity:'common'},
  // unlockable pets (kiwi birds)
  {id:'hummingbird',name:'Hummingbird',color:'#44eecc',icon:'🐦',effect:'+200 pickup range',cost:3,rarity:'rare'},
  {id:'horse',name:'Horse',color:'#8866aa',icon:'🐎',effect:'+15% speed aura',cost:5,rarity:'rare'},
  {id:'cat',name:'Cat',color:'#ffaa44',icon:'🐈',effect:'+10% crit chance',cost:5,rarity:'rare'},
  {id:'bunny',name:'Bunny',color:'#ffddee',icon:'🐰',effect:'+15% movement',cost:8,rarity:'epic'},
  {id:'fox',name:'Fox',color:'#ff7733',icon:'🦊',effect:'Steals kiwi from enemies',cost:10,rarity:'epic'},
  // NEW: panda - high tier
  {id:'panda',name:'Panda',color:'#fafafa',icon:'🐼',effect:'Tank · absorbs 1 hit / 8s + bamboo slam',cost:15,rarity:'legendary'},
];
const Companions={
  defs:COMPANION_DEFS,
  PET_R:22, // bigger pets — was 8
  isUnlocked(id){
    const def=COMPANION_DEFS.find(c=>c.id===id);if(!def)return false;
    if(def.cost===0)return true;
    return !!(Save.data.pets&&Save.data.pets.unlocked&&Save.data.pets.unlocked[id]);
  },
  tryUnlock(id){
    const def=COMPANION_DEFS.find(c=>c.id===id);if(!def||def.cost===0)return false;
    if(this.isUnlocked(id))return false;
    if(!Save.spendBirds(def.cost))return false;
    if(!Save.data.pets)Save.data.pets={unlocked:{},selected:null};
    if(!Save.data.pets.unlocked)Save.data.pets.unlocked={};
    Save.data.pets.unlocked[id]=true;Save.save();
    AudioManager.play('ult_ready');UI.announce(`🐾 PET UNLOCKED · ${def.name.toUpperCase()}`,2.5,def.color);
    return true;
  },
  setSelected(id){
    if(!this.isUnlocked(id))return false;
    if(!Save.data.pets)Save.data.pets={unlocked:{},selected:null};
    Save.data.pets.selected=id;Save.save();return true;
  },
  getSelected(){return Save.data.pets?.selected||null;},
  pickRandom(){return COMPANION_DEFS[Math.floor(Math.random()*COMPANION_DEFS.length)];},
  // Auto-equip selected pet at game start
  spawnSelected(player){
    const sel=this.getSelected();if(!sel)return;
    this.giveTo(player,sel,true);
  },
  giveTo(player,id,silent){
    if(!player.companions)player.companions=[];
    const def=COMPANION_DEFS.find(c=>c.id===id);if(!def)return;
    if(player.companions.find(c=>c.id===id)){if(!silent)UI.announce('COMPANION ALREADY WITH YOU',1.5,'#ffaa44');return false;}
    player.companions.push({id,def,x:player.x,y:player.y,angle:0,level:1,xp:0,dmgT:0,attackT:0,bobT:Math.random()*Math.PI*2,_anim:0,_shieldT:0});
    // Passive bonuses
    if(id==='hummingbird')player.magnetR=(player.magnetR||60)+200;
    if(id==='horse')player.speedMult*=1.15;
    if(id==='cat')player.critChance=(player.critChance||0)+0.10;
    if(id==='bunny')player.speedMult*=1.15;
    if(id==='panda'){player.maxHp+=20;player.hp+=20;player.damageResist=(player.damageResist||0)+0.05;}
    if(!silent){UI.announce(`🐾 COMPANION · ${def.name.toUpperCase()}`,2.5,def.color);AudioManager.play('ult_ready');}
    return true;
  },
  update(dt,player){
    if(!player.companions)return;
    for(const c of player.companions){
      c.bobT+=dt*3;c._anim+=dt;
      const idx=player.companions.indexOf(c);
      const targetAngle=c.bobT*0.35+idx*Math.PI*0.6;
      const orbR=P_R+44+Math.sin(c.bobT)*5;
      const tx=player.x+Math.cos(targetAngle)*orbR;
      const ty=player.y+Math.sin(targetAngle)*orbR;
      c.x+=(tx-c.x)*dt*4;c.y+=(ty-c.y)*dt*4;
      c.dmgT-=dt;c.attackT-=dt;if(c._shieldT>0)c._shieldT-=dt;
      // Dog: bite nearest enemy (BIGGER bite now)
      if(c.id==='dog'&&c.dmgT<=0){
        let near=null,bd=160*160;
        for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-c.x,dy=e.y-c.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;near=e;}}
        if(near){near.takeDamage(12+c.level*3);DmgNumbers.spawn(near.x,near.y,12+c.level*3,false);c.dmgT=1.0;
          Particles.burst(near.x,near.y,8,{color:'#cc8844',speed:120,life:0.4,r:3});}
      }
      // Chicken: drops eggs
      if(c.id==='chicken'&&c.attackT<=0){
        c.attackT=6;
        Particles.burst(c.x,c.y,6,{color:'#ffee88',speed:50,life:0.4,r:4});
        if(Math.random()<0.5){player.hp=Math.min(player.maxHp,player.hp+5);UI.announce('🥚 HEAL EGG +5',1.2,'#88ff88');}
        else {for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-c.x,dy=e.y-c.y;if(dx*dx+dy*dy<100*100)e.takeDamage(14+c.level*2);}Particles.burst(c.x,c.y,16,{color:'#ffaa44',speed:160,life:0.5,r:4});}
      }
      // Fox: steal from enemy
      if(c.id==='fox'&&c.attackT<=0){
        c.attackT=5;
        let near=null,bd=240*240;
        for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-c.x,dy=e.y-c.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;near=e;}}
        if(near){near.takeDamage(6);Save.addKiwis(2);Particles.burst(near.x,near.y,8,{color:'#ff7733',speed:120,life:0.4,r:3});}
      }
      // PANDA: bamboo slam aoe + auto-shield
      if(c.id==='panda'&&c.attackT<=0){
        c.attackT=5;
        // bamboo slam — slow + dmg in big radius
        let hit=false;
        for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-c.x,dy=e.y-c.y,d2=dx*dx+dy*dy;if(d2<140*140){e.takeDamage(18+c.level*4);if(e.alive&&e.applySlow)e.applySlow(0.5,2);hit=true;}}
        if(hit){Particles.burst(c.x,c.y,22,{color:'#aaffaa',speed:180,life:0.6,r:5});Particles.burst(c.x,c.y,12,{color:'#fff',speed:100,life:0.4,r:3});Camera.shake(2,0.1);}
      }
      // PANDA: shield charge (give player an absorption ~every 8s)
      if(c.id==='panda'){
        c._shieldChargeT=(c._shieldChargeT||0)-dt;
        if(c._shieldChargeT<=0&&player.hp<player.maxHp*0.9){player.shieldT=Math.max(player.shieldT||0,0.8);c._shieldChargeT=8;Particles.burst(player.x,player.y,8,{color:'#aaffaa',speed:60,life:0.5,r:3});}
      }
    }
  },
  draw(player){
    if(!player.companions)return;
    for(const c of player.companions){
      const sx=Camera.sx(c.x),sy=Camera.sy(c.y);
      const bob=Math.sin(c.bobT)*3;
      ctx.save();ctx.translate(sx,sy+bob);
      this._drawPet(c);
      ctx.restore();
    }
  },
  // Each pet has a detailed silhouette drawn at PET_R scale
  _drawPet(c){
    const R=this.PET_R;
    const id=c.id;
    // Multi-layered aura behind pet for a "premium" magical look
    const t=performance.now()/1000;
    const pulse=0.5+0.5*Math.sin(t*2);
    // Soft ground shadow ellipse
    const grdShadow=ctx.createRadialGradient(0,R*0.85,R*0.2,0,R*0.85,R*1.0);
    grdShadow.addColorStop(0,'rgba(0,0,0,0.55)');
    grdShadow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grdShadow;
    ctx.beginPath();ctx.ellipse(0,R*0.85,R*0.95,R*0.25,0,0,Math.PI*2);ctx.fill();
    // Outer faint radial aura (large, breathing)
    const auraR=R*1.55+pulse*6;
    const aura=ctx.createRadialGradient(0,0,R*0.6,0,0,auraR);
    aura.addColorStop(0,c.def.color+'66');
    aura.addColorStop(0.6,c.def.color+'22');
    aura.addColorStop(1,c.def.color+'00');
    ctx.fillStyle=aura;
    ctx.beginPath();ctx.arc(0,0,auraR,0,Math.PI*2);ctx.fill();
    // Sparkles orbiting (4 small dots rotating)
    for(let i=0;i<4;i++){
      const a=t*1.2+i*Math.PI*0.5;
      const sxp=Math.cos(a)*R*1.25, syp=Math.sin(a)*R*1.25;
      const sparkA=0.4+0.4*Math.sin(t*4+i);
      ctx.fillStyle=c.def.color;ctx.globalAlpha=sparkA;
      ctx.shadowColor=c.def.color;ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(sxp,syp,2.2,0,Math.PI*2);ctx.fill();
    }
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    // Inner halo (close to pet, gives the pet a clear color signature)
    ctx.shadowColor=c.def.color;ctx.shadowBlur=18;
    ctx.fillStyle=c.def.color;ctx.globalAlpha=0.28;
    ctx.beginPath();ctx.arc(0,0,R*1.18,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    if(id==='dog'){
      // brown dog
      ctx.fillStyle='#cc8844';ctx.shadowColor='#aa6622';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(0,2,R*0.85,R*0.65,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.55,-R*0.3,R*0.5,0,Math.PI*2);ctx.fill();
      // ears
      ctx.fillStyle='#7a4422';
      ctx.beginPath();ctx.ellipse(R*0.78,-R*0.55,R*0.18,R*0.32,-0.4,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.35,-R*0.6,R*0.16,R*0.28,0.3,0,Math.PI*2);ctx.fill();
      // eye + nose
      ctx.fillStyle='#000';ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(R*0.7,-R*0.35,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.95,-R*0.2,2.5,0,Math.PI*2);ctx.fill();
      // tail
      ctx.strokeStyle='#cc8844';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-R*0.7,-R*0.1);ctx.quadraticCurveTo(-R*1.1,-R*0.4,-R*1.0,-R*0.8);ctx.stroke();
    } else if(id==='chicken'){
      // yellow chicken
      ctx.fillStyle='#ffee88';ctx.shadowColor='#ffcc44';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(0,2,R*0.85,R*0.75,0,0,Math.PI*2);ctx.fill();
      // head
      ctx.beginPath();ctx.arc(0,-R*0.5,R*0.55,0,Math.PI*2);ctx.fill();
      // comb
      ctx.fillStyle='#ff4444';ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(-R*0.15,-R*0.9,R*0.18,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.15,-R*0.95,R*0.16,0,Math.PI*2);ctx.fill();
      // beak
      ctx.fillStyle='#ffaa22';
      ctx.beginPath();ctx.moveTo(R*0.5,-R*0.45);ctx.lineTo(R*0.85,-R*0.35);ctx.lineTo(R*0.5,-R*0.25);ctx.closePath();ctx.fill();
      // eye
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(R*0.3,-R*0.55,2.5,0,Math.PI*2);ctx.fill();
    } else if(id==='hummingbird'){
      // teal hummingbird
      ctx.fillStyle='#44eecc';ctx.shadowColor='#22aacc';ctx.shadowBlur=10;
      ctx.beginPath();ctx.ellipse(0,0,R*0.7,R*0.5,0,0,Math.PI*2);ctx.fill();
      // head
      ctx.beginPath();ctx.arc(R*0.55,-R*0.25,R*0.4,0,Math.PI*2);ctx.fill();
      // wings (rapidly flapping)
      const wing=Math.sin(c._anim*40)*0.6;
      ctx.fillStyle='rgba(170,255,238,0.7)';
      ctx.beginPath();ctx.ellipse(-R*0.1,-R*0.4,R*0.55,R*0.2,wing,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-R*0.1,R*0.4,R*0.55,R*0.2,-wing,0,Math.PI*2);ctx.fill();
      // beak (long)
      ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(R*0.9,-R*0.25);ctx.lineTo(R*1.4,-R*0.2);ctx.stroke();
      // eye
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(R*0.7,-R*0.35,2,0,Math.PI*2);ctx.fill();
    } else if(id==='horse'){
      // purple horse
      ctx.fillStyle='#8866aa';ctx.shadowColor='#6644aa';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(0,3,R*0.95,R*0.55,0,0,Math.PI*2);ctx.fill();
      // head + neck
      ctx.beginPath();ctx.moveTo(R*0.5,-R*0.1);ctx.quadraticCurveTo(R*0.95,-R*0.5,R*1.1,-R*0.4);ctx.quadraticCurveTo(R*0.95,-R*0.1,R*0.7,R*0.05);ctx.closePath();ctx.fill();
      // mane
      ctx.fillStyle='#332244';
      ctx.beginPath();ctx.moveTo(R*0.65,-R*0.35);ctx.lineTo(R*0.4,-R*0.6);ctx.lineTo(R*0.5,-R*0.1);ctx.closePath();ctx.fill();
      // tail
      ctx.strokeStyle='#332244';ctx.lineWidth=5;ctx.lineCap='round';ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(-R*0.8,0);ctx.quadraticCurveTo(-R*1.2,R*0.4,-R*1.1,R*0.7);ctx.stroke();
      // legs (4 short)
      ctx.strokeStyle='#8866aa';ctx.lineWidth=4;
      for(let l=-1;l<=1;l+=2)for(let k=-1;k<=1;k+=2){ctx.beginPath();ctx.moveTo(R*0.4*l,R*0.4*k+R*0.2);ctx.lineTo(R*0.4*l,R*0.7);ctx.stroke();}
      // eye
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(R*0.95,-R*0.35,2,0,Math.PI*2);ctx.fill();
    } else if(id==='cat'){
      // orange cat
      ctx.fillStyle='#ffaa44';ctx.shadowColor='#cc7722';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(0,2,R*0.8,R*0.6,0,0,Math.PI*2);ctx.fill();
      // head
      ctx.beginPath();ctx.arc(R*0.45,-R*0.3,R*0.45,0,Math.PI*2);ctx.fill();
      // ears (pointy triangles)
      ctx.beginPath();ctx.moveTo(R*0.15,-R*0.55);ctx.lineTo(R*0.3,-R*0.95);ctx.lineTo(R*0.4,-R*0.55);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(R*0.55,-R*0.55);ctx.lineTo(R*0.7,-R*0.95);ctx.lineTo(R*0.8,-R*0.55);ctx.closePath();ctx.fill();
      // stripes
      ctx.strokeStyle='#cc7722';ctx.lineWidth=1.5;ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(-R*0.5,-R*0.05);ctx.lineTo(-R*0.7,-R*0.2);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-R*0.3,R*0.1);ctx.lineTo(-R*0.55,R*0.05);ctx.stroke();
      // eyes (slits)
      ctx.fillStyle='#22cc44';
      ctx.beginPath();ctx.ellipse(R*0.32,-R*0.32,2.5,4,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.55,-R*0.32,2.5,4,0,0,Math.PI*2);ctx.fill();
      // tail (curly)
      ctx.strokeStyle='#ffaa44';ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-R*0.7,-R*0.1);ctx.quadraticCurveTo(-R*1.2,-R*0.5,-R*0.9,-R*0.9);ctx.stroke();
    } else if(id==='bunny'){
      // pink bunny
      ctx.fillStyle='#ffddee';ctx.shadowColor='#ffaadd';ctx.shadowBlur=10;
      ctx.beginPath();ctx.ellipse(0,2,R*0.75,R*0.6,0,0,Math.PI*2);ctx.fill();
      // head
      ctx.beginPath();ctx.arc(0,-R*0.45,R*0.45,0,Math.PI*2);ctx.fill();
      // long ears
      ctx.beginPath();ctx.ellipse(-R*0.18,-R*1.0,R*0.13,R*0.45,-0.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.18,-R*1.0,R*0.13,R*0.45,0.1,0,Math.PI*2);ctx.fill();
      // inner ears (red/pink)
      ctx.fillStyle='#ff88aa';ctx.shadowBlur=0;
      ctx.beginPath();ctx.ellipse(-R*0.18,-R*1.0,R*0.06,R*0.32,-0.1,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.18,-R*1.0,R*0.06,R*0.32,0.1,0,Math.PI*2);ctx.fill();
      // eyes
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(-R*0.15,-R*0.5,2.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.15,-R*0.5,2.5,0,Math.PI*2);ctx.fill();
      // nose (pink)
      ctx.fillStyle='#ff66aa';
      ctx.beginPath();ctx.arc(0,-R*0.32,2,0,Math.PI*2);ctx.fill();
      // tail puff
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-R*0.8,R*0.1,R*0.2,0,Math.PI*2);ctx.fill();
    } else if(id==='fox'){
      // orange fox
      ctx.fillStyle='#ff7733';ctx.shadowColor='#cc4422';ctx.shadowBlur=8;
      ctx.beginPath();ctx.ellipse(0,3,R*0.85,R*0.55,0,0,Math.PI*2);ctx.fill();
      // head (triangular)
      ctx.beginPath();ctx.moveTo(R*0.2,-R*0.1);ctx.lineTo(R*0.95,-R*0.4);ctx.lineTo(R*0.95,R*0.0);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.arc(R*0.45,-R*0.35,R*0.4,0,Math.PI*2);ctx.fill();
      // ears (pointy)
      ctx.beginPath();ctx.moveTo(R*0.2,-R*0.55);ctx.lineTo(R*0.3,-R*1.0);ctx.lineTo(R*0.4,-R*0.5);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(R*0.55,-R*0.55);ctx.lineTo(R*0.65,-R*1.0);ctx.lineTo(R*0.75,-R*0.5);ctx.closePath();ctx.fill();
      // white face mask
      ctx.fillStyle='#fff';ctx.shadowBlur=0;
      ctx.beginPath();ctx.moveTo(R*0.45,-R*0.1);ctx.lineTo(R*0.95,-R*0.1);ctx.lineTo(R*0.7,R*0.15);ctx.closePath();ctx.fill();
      // big bushy tail (white tip)
      ctx.strokeStyle='#ff7733';ctx.lineWidth=8;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-R*0.7,-R*0.1);ctx.quadraticCurveTo(-R*1.2,-R*0.5,-R*1.1,-R*0.9);ctx.stroke();
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-R*1.1,-R*0.9,R*0.18,0,Math.PI*2);ctx.fill();
      // eye
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(R*0.55,-R*0.4,2.5,0,Math.PI*2);ctx.fill();
    } else if(id==='panda'){
      // panda — white body + black ears/eyes/legs
      // body
      ctx.fillStyle='#fafafa';ctx.shadowColor='#fff';ctx.shadowBlur=10;
      ctx.beginPath();ctx.ellipse(0,4,R*0.95,R*0.75,0,0,Math.PI*2);ctx.fill();
      // head
      ctx.beginPath();ctx.arc(0,-R*0.45,R*0.6,0,Math.PI*2);ctx.fill();
      // black ears
      ctx.fillStyle='#1a1a1a';ctx.shadowBlur=0;
      ctx.beginPath();ctx.arc(-R*0.45,-R*0.9,R*0.22,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.45,-R*0.9,R*0.22,0,Math.PI*2);ctx.fill();
      // black eye patches
      ctx.beginPath();ctx.ellipse(-R*0.22,-R*0.5,R*0.16,R*0.22,-0.2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.22,-R*0.5,R*0.16,R*0.22,0.2,0,Math.PI*2);ctx.fill();
      // eyes inside patches
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-R*0.20,-R*0.50,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.20,-R*0.50,3,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.arc(-R*0.20,-R*0.48,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(R*0.20,-R*0.48,1.5,0,Math.PI*2);ctx.fill();
      // nose
      ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(0,-R*0.30,R*0.10,R*0.07,0,0,Math.PI*2);ctx.fill();
      // mouth
      ctx.strokeStyle='#000';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(0,-R*0.22);ctx.lineTo(-R*0.07,-R*0.15);ctx.moveTo(0,-R*0.22);ctx.lineTo(R*0.07,-R*0.15);ctx.stroke();
      // black limbs (4 paws visible)
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath();ctx.ellipse(-R*0.55,R*0.1,R*0.22,R*0.30,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.55,R*0.1,R*0.22,R*0.30,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(-R*0.35,R*0.55,R*0.20,R*0.18,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(R*0.35,R*0.55,R*0.20,R*0.18,0,0,Math.PI*2);ctx.fill();
      // bamboo leaf
      ctx.fillStyle='#44cc44';ctx.shadowColor='#22aa22';ctx.shadowBlur=6;
      ctx.beginPath();ctx.ellipse(-R*0.55,R*0.05,R*0.10,R*0.04,-0.4,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;
    } else {
      // generic fallback
      ctx.fillStyle=c.def.color;
      ctx.beginPath();ctx.arc(0,0,R*0.8,0,Math.PI*2);ctx.fill();
      ctx.font='16px monospace';ctx.fillStyle='#000';ctx.textAlign='center';
      ctx.fillText(c.def.icon,0,5);
    }
    ctx.textAlign='left';
  }
};

const WeaponEvo={
  defs:WEAPON_EVOS,
  // Try evolve player's weapon when an upgrade is picked (called from applyChoice)
  tryEvolve(player,upgradeId){
    if(player._evolved)return false;
    const evo=WEAPON_EVOS[player.weaponId];if(!evo)return false;
    // Match req tag against upgrade id (fireRate / damage)
    const tag=this._tagForUpgrade(upgradeId);
    if(tag!==evo.req)return false;
    // Apply evolution
    evo.apply(player.weapon);
    player._evolved=evo.evoId;
    UI.announce(`⚡ EVOLVED · ${evo.name} ⚡`,3.5,player.weapon.color||'#ffaa44');
    AudioManager.play('ult_ready');
    Camera.shake(8,0.5);
    Particles.burst(player.x,player.y,40,{color:'#ffaa44',speed:220,life:0.9,r:6});
    return true;
  },
  _tagForUpgrade(id){
    // Maps upgrade ids -> 'damage' | 'fireRate'
    const dmgIds=['damage','heavyrounds','dmgBoost','dmgUp','damageUp','rampage','warMachine','berserker'];
    const rofIds=['fireRate','rof','rofUp','autoSpray','bulletStorm','attackSpeed','speedShot'];
    const lc=(id||'').toLowerCase();
    if(dmgIds.some(s=>lc.includes(s.toLowerCase())))return 'damage';
    if(rofIds.some(s=>lc.includes(s.toLowerCase())))return 'fireRate';
    // Fallback: roll based on string
    if(lc.includes('dmg')||lc.includes('damage'))return 'damage';
    if(lc.includes('rof')||lc.includes('fire')||lc.includes('rate'))return 'fireRate';
    return null;
  }
};

const BossEvo={
  mods:BOSS_EVO_MODS,
  apply(boss,wave){
    if(wave<30)return;
    // 1 modifier at wave 30, 2 at wave 50, 3 at wave 70+
    const count=Math.min(3,1+Math.floor((wave-30)/20));
    const pool=[...BOSS_EVO_MODS].sort(()=>Math.random()-0.5);
    boss._evoMods=[];
    for(let i=0;i<count&&i<pool.length;i++){pool[i].apply(boss);boss._evoMods.push(pool[i]);}
    if(boss._evoMods.length){
      const names=boss._evoMods.map(m=>m.name).join(' · ');
      UI.announce(`★ ${names.toUpperCase()} BOSS ★`,3,boss._evoMods[0].color);
    }
  }
};

// Find evolution offers for the player at level-up time
function findEvolutionOffers(player){
  if((player.vsEvolveCount||0)>=3)return [];
  if(!player.vsAbilities)return [];
  const evolved=player.vsEvolved||new Set();
  const offers=[];
  for(const id in player.vsAbilities){
    if(evolved.has(id))continue;
    if(!EVOLUTIONS[id])continue;
    const baseUpg=UPGRADES.find(u=>u.id===id);
    if(!baseUpg)continue;
    if((player.vsAbilities[id]||0)<baseUpg.maxStacks)continue;
    const evo=EVOLUTIONS[id];
    offers.push({
      id:'evo_'+id,isEvolution:true,originalId:id,
      name:'✨ '+evo.name,icon:evo.icon,color:evo.color,
      maxStacks:1,rarity:'mythic',
      desc:_=>'EVOLUTION · '+evo.desc,
      apply:p=>{
        p.vsEvolved=p.vsEvolved||new Set();p.vsEvolved.add(id);
        p.vsEvolveCount=(p.vsEvolveCount||0)+1;
        // Boost effective level beyond max — existing engine formulas scale up
        p.vsAbilities[id]=(baseUpg.maxStacks||6)+6;
      }
    });
  }
  return offers;
}

// ─── V/S ABILITY ENGINE ─────────────────────────────────────────
// Drives all level-up auto-weapons every frame using p.vsAbilities[id]=level
const VSEngine={
  // Find nearest alive enemy to a point
  _nearest(x,y,maxR){
    let best=null,bd=(maxR||9999)*(maxR||9999);
    for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-x,dy=e.y-y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;best=e;}}
    return best;
  },
  update(dt,p){
    if(!p||!p.alive||!p.vsAbilities)return;
    if(!p._vs)p._vs={timers:{},state:{}};
    const T=p._vs.timers,S=p._vs.state;
    const A=p.vsAbilities;
    // HOLY AURA — pulsing damage ring

        T.holy=0.5;
        for(const e of Game.enemies){if(!e.alive)continue;const dx=e.x-p.x,dy=e.y-p.y;if(dx*dx+dy*dy<r*r)e.takeDamage(dmg,p.id);}
        Effects.add({x:p.x,y:p.y,owner:p,r,life:0.4,maxLife:0.4,
          draw(){const sx=Camera.sx(this.owner.x),sy=Camera.sy(this.owner.y),f=1-this.life/this.maxLife;
            ctx.save();ctx.globalCompositeOperation='lighter';
            ctx.globalAlpha=(1-f)*0.5;ctx.strokeStyle='#ffee44';ctx.lineWidth=4;ctx.shadowColor='#ffee44';ctx.shadowBlur=18;
            ctx.beginPath();ctx.arc(sx,sy,this.r*(0.6+f*0.4),0,Math.PI*2);ctx.stroke();
            ctx.restore();ctx.shadowBlur=0;ctx.globalAlpha=1;}});
      }
    }
    // ORBITING DAGGERS — N daggers rotate around player
    if(A.orbit_dagger){
      const n=A.orbit_dagger+1,r=P_R+38;const speed=2.2;
      S.orbAng=(S.orbAng||0)+dt*speed;
      // hit cooldown per dagger
      S.orbHit=S.orbHit||new WeakMap();
      for(let k=0;k<n;k++){
        const ang=S.orbAng+k*(Math.PI*2/n);
        const dx=p.x+Math.cos(ang)*r,dy=p.y+Math.sin(ang)*r;
        for(const e of Game.enemies){
          if(!e.alive)continue;
          const ddx=e.x-dx,ddy=e.y-dy;
          if(ddx*ddx+ddy*ddy<(e.r+12)*(e.r+12)){
            const last=S.orbHit.get(e)||0;const now=performance.now();
            if(now-last>250){S.orbHit.set(e,now);e.takeDamage(18+A.orbit_dagger*2,p.id);Particles.spawn(e.x,e.y,{vx:0,vy:-20,life:0.3,r:2,color:'#88ccff'});}
          }
        }
      }
      // draw daggers
      Effects.add({x:p.x,y:p.y,owner:p,ang:S.orbAng,n,r,life:0.06,maxLife:0.06,
        draw(){const sx=Camera.sx(this.owner.x),sy=Camera.sy(this.owner.y);
          ctx.save();ctx.globalCompositeOperation='lighter';
          for(let k=0;k<this.n;k++){const a=this.ang+k*(Math.PI*2/this.n);
            const dx=sx+Math.cos(a)*this.r,dy=sy+Math.sin(a)*this.r;
            ctx.save();ctx.translate(dx,dy);ctx.rotate(a+Math.PI/2);
            ctx.fillStyle='#88ccff';ctx.shadowColor='#88ccff';ctx.shadowBlur=10;
            ctx.beginPath();ctx.moveTo(0,-10);ctx.lineTo(3,5);ctx.lineTo(-3,5);ctx.closePath();ctx.fill();
            ctx.fillStyle='#fff';ctx.fillRect(-1,-9,2,12);
            ctx.restore();}
          ctx.restore();ctx.shadowBlur=0;}});
    }
    // MAGIC WAND — homing bolt at nearest
    if(A.magic_wand){
      const cd=Math.max(0.3,1.2-A.magic_wand*0.12);
      T.wand=(T.wand||0)-dt;
      if(T.wand<=0){T.wand=cd;
        const tgt=this._nearest(p.x,p.y,800);
        if(tgt){const a=Math.atan2(tgt.y-p.y,tgt.x-p.x);
          Bullets.fire(p.x,p.y,a,p.id,'#aaffff',25+A.magic_wand*3,{weaponSize:1.4,weaponSpeed:1.3,trail:0.9,pierce:1,homing:true});}
      }
    }
    // WHIP — sweep in facing direction
    if(A.whip){
      const lvl=A.whip;const cd=1.5;
      T.whip=(T.whip||0)-dt;
      if(T.whip<=0){T.whip=cd;
        const range=160,arc=Math.PI*0.7;

              const ea=Math.atan2(dy,dx);

        Effects.add({x:p.x,y:p.y,owner:p,r,life:0.35,maxLife:0.35,
          draw(){const sx=Camera.sx(this.owner.x),sy=Camera.sy(this.owner.y),f=this.life/this.maxLife;
            ctx.save();ctx.globalAlpha=f*0.18;ctx.fillStyle='#aaffaa';ctx.shadowColor='#88ff66';ctx.shadowBlur=12;
            ctx.beginPath();ctx.arc(sx,sy,this.r,0,Math.PI*2);ctx.fill();

          ctx.beginPath();ctx.arc(sx,sy,P_R+12,-Math.PI/2,-Math.PI/2+Math.PI*2*pct);ctx.stroke();
          ctx.restore();ctx.shadowBlur=0;
