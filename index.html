      UI.drawSettings(click);
      // ESC exits settings cleanly
      if(Input.wasPressed('Escape')){AudioManager.play('click');this.state=this._prevState||'main_menu';}
      if(click){
        const a=UI.getSettingsClick(click.x,click.y);
        if(a==='back'){AudioManager.play('click');this.state=this._prevState||'main_menu';}
      }
    } else if(this.state==='paused'){
      this.draw();
      UI.drawPauseMenu();
      if(click){
        const btn=UI.getPauseMenuClick(click.x,click.y);
        if(btn==='resume'){AudioManager.play('resume');this.state='playing';}
        else if(btn==='settings'){AudioManager.play('click');this._prevState='paused';this.state='settings';}
        else if(btn==='quit'){AudioManager.play('click');this.state='main_menu';}
      }
    } else if(this.state==='char_select'){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      UI.drawCharSelect();
      // cheat bar input
      if(UI._cheatFocus){
        // process digit/letter keys via justPressed (numpad + main row)
        ['Digit0','Digit1','Digit2','Digit3','Digit4','Digit5','Digit6','Digit7','Digit8','Digit9','Numpad0','Numpad1','Numpad2','Numpad3','Numpad4','Numpad5','Numpad6','Numpad7','Numpad8','Numpad9','KeyA','KeyB','KeyC','KeyD','KeyE','KeyF','KeyG','KeyH','KeyI','KeyJ','KeyK','KeyL','KeyM','KeyN','KeyO','KeyP','KeyQ','KeyR','KeyS','KeyT','KeyU','KeyV','KeyW','KeyX','KeyY','KeyZ'].forEach(k=>{
          if(Input.wasPressed(k)){
            const ch=k.startsWith('Digit')?k.slice(5):k.startsWith('Numpad')?k.slice(6):k.slice(3).toLowerCase();
            if(UI._cheatInput.length<12)UI._cheatInput+=ch;
          }
        });
        if(Input.wasPressed('Backspace'))UI._cheatInput=UI._cheatInput.slice(0,-1);
        if(Input.wasPressed('Enter')){UI.tryCheat(UI._cheatInput);UI._cheatInput='';}
        if(Input.wasPressed('Escape')){UI._cheatFocus=false;UI._cheatInput='';this.state='main_menu';}
      }
      if(click){
        // cheat bar click → focus
        if(UI.hitCheatBar(click.x,click.y)){UI._cheatFocus=true;UI._cheatInput='';}
        else {
          UI._cheatFocus=false;
          const c=UI.getCharSelectClick(click.x,click.y);
          if(c==='__back__'){AudioManager.play('click');this.state='main_menu';}
          else if(c){
            if(Save.isCharUnlocked(c)){this.selectedChar=c;this.state='weapon_select';AudioManager.play('select_char');VoiceManager.play(c,'select');}
            else {
              const cost=RARITY_COST[CHAR_DEFS[c].rarity||'common'];
              if(Save.data.kiwis>=cost){Save.data.kiwis-=cost;Save.unlockChar(c);Save.save();AudioManager.play('click');UI.announce(`UNLOCKED ${CHAR_DEFS[c].name}`,2,'#88ff44');}
              else {AudioManager.play('click');UI.announce('NOT ENOUGH KIWIS',1.5,'#ff4444');}
            }
          }
        }
      }
      // draw announce on top
      if(UI._announce)UI._drawAnnounce();
    } else if(this.state==='weapon_select'){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      UI.drawWeaponSelect(this.selectedChar);
      if(click){
        const w=UI.getWeaponSelectClick(click.x,click.y);
        if(w==='__back__'){AudioManager.play('click');this.state='char_select';}
        else if(w){
          if(Save.isWeaponUnlocked(w)){
            AudioManager.play('select_weapon');
            if(this.coopPlayers===2&&!this._p2SelectingP2){
              // Just picked P1; now go pick P2
              this.selectedChar1=this.selectedChar;this.selectedWeapon1=w;
              this._p2SelectingP2=true;
              this.state='char_select';
              UI.announce('NOW SELECT PLAYER 2',2.5,'#ffaa44');
            } else if(this.coopPlayers===2&&this._p2SelectingP2){
              // Just picked P2; start co-op
              this.startGame(this.selectedChar1,this.selectedWeapon1,this.selectedChar,w);
            } else {
              this.startGame(this.selectedChar,w);
            }
          }
          else {
            const cost=RARITY_COST[WEAPON_DEFS[w].rarity||'common'];
            if(Save.data.kiwis>=cost){Save.data.kiwis-=cost;Save.unlockWeapon(w);Save.save();AudioManager.play('click');UI.announce(`UNLOCKED ${WEAPON_DEFS[w].name}`,2,'#88ff44');}
            else {AudioManager.play('click');UI.announce('NOT ENOUGH KIWIS',1.5,'#ff4444');}
          }
        }
      }
      // draw announcement on top
      if(UI._announce)UI._drawAnnounce();
    } else if(this.state==='playing'){
      this.update(dt);
      // ── ONLINE MULTIPLAYER SYNC ──
      // Everyone (host + clients) broadcasts their local player state.
      // Everyone receives others' states and renders them as ghost allies.
      if(this.online&&this.player){
        const myState={
          x:this.player.x,y:this.player.y,
          angle:this.player.angle,aimAngle:this.player.aimAngle,
          hp:this.player.hp,maxHp:this.player.maxHp,
          alive:this.player.alive,
          charId:this.player.charId,weaponId:this.player.weaponId,
          walkT:this.player.walkT,moving:this.player.moving,
          shooting:!!this.player._netShooting,
          t:performance.now()
        };
        // Host uses 'state' channel; clients use 'input' (just a name, same effect)
        if(Net.isHost){
          Net.broadcast(myState,dt);
        } else {
          Net.sendInput(myState,dt);
        }
        // Apply received states from peers → update remotePlayers ghosts
        const incoming=Net.isHost?Net.consumeInputs():{};
        // Host: peer inputs come via 'inp' channel (Net.inputs)
        for(const pid in incoming){
          const s=incoming[pid];if(!s)continue;
          if(!this.remotePlayers[pid]){
            this.remotePlayers[pid]={peerId:pid,x:s.x,y:s.y,angle:0,aimAngle:0,hp:100,maxHp:100,alive:true,walkT:0,moving:false,charId:s.charId||'octane',weaponId:s.weaponId||'r301',charDef:CHAR_DEFS[s.charId]||CHAR_DEFS.octane};
          }
          const g=this.remotePlayers[pid];
          // Smooth interpolation toward incoming pos
          const lerp=0.45;
          g.x+=(s.x-g.x)*lerp;g.y+=(s.y-g.y)*lerp;
          g.angle=s.angle;g.aimAngle=s.aimAngle;
          g.hp=s.hp;g.maxHp=s.maxHp;g.alive=s.alive;
          g.walkT=s.walkT;g.moving=s.moving;
          if(s.charId&&s.charId!==g.charId){g.charId=s.charId;g.charDef=CHAR_DEFS[s.charId]||CHAR_DEFS.octane;}
          if(s.weaponId)g.weaponId=s.weaponId;
        }
        // Clients: snapshot from host
        if(!Net.isHost&&Net.lastSnapshot){
          const s=Net.lastSnapshot;
          const pid=this.onlineHostId;
          if(s&&pid){
            if(!this.remotePlayers[pid]){
              this.remotePlayers[pid]={peerId:pid,x:s.x,y:s.y,angle:0,aimAngle:0,hp:100,maxHp:100,alive:true,walkT:0,moving:false,charId:s.charId||'octane',weaponId:s.weaponId||'r301',charDef:CHAR_DEFS[s.charId]||CHAR_DEFS.octane};
            }
            const g=this.remotePlayers[pid];
            const lerp=0.45;
            g.x+=(s.x-g.x)*lerp;g.y+=(s.y-g.y)*lerp;
            g.angle=s.angle;g.aimAngle=s.aimAngle;
            g.hp=s.hp;g.maxHp=s.maxHp;g.alive=s.alive;
            g.walkT=s.walkT;g.moving=s.moving;
            if(s.charId&&s.charId!==g.charId){g.charId=s.charId;g.charDef=CHAR_DEFS[s.charId]||CHAR_DEFS.octane;}
            if(s.weaponId)g.weaponId=s.weaponId;
          }
        }
      }
      this.draw();
      // pause button click (top-right corner)
      if(click&&this.player){
        const pbx=canvas.width-48,pby=14;
        if(click.x>=pbx&&click.x<=pbx+36&&click.y>=pby&&click.y<=pby+30){
          AudioManager.play('pause');this.state='paused';
        }
      }
    } else if(this.state==='level_up'){
      // freeze game
      this.draw();
      // Initialize controller selection index if not set yet
      if(this._luSel==null)this._luSel=0;
      // Guard: choices might be null if we just confirmed → bail out (next frame state is 'playing')
      if(!this.levelUpChoices){Input.flush();requestAnimationFrame(t=>this.loop(t));return;}
      const n=this.levelUpChoices.length;
      // Controller navigation — D-pad (via robust dpadX/dpadY helpers) + left stick, X to confirm
      let _applied=false;
      if(!this._luDpadLatch)this._luDpadLatch=[{x:0,y:0},{x:0,y:0}];
      for(let s=0;s<2&&!_applied;s++){
        if(!Gamepads.isConnected(s))continue;
        // D-PAD horizontal — latched so a held press only fires once
        const dx=Gamepads.dpadX(s),dy=Gamepads.dpadY(s);
        if(dx===-1&&this._luDpadLatch[s].x!==-1){this._luSel=(this._luSel-1+n)%n;this._luDpadLatch[s].x=-1;AudioManager.play('click');}
        else if(dx===1&&this._luDpadLatch[s].x!==1){this._luSel=(this._luSel+1)%n;this._luDpadLatch[s].x=1;AudioManager.play('click');}
        else if(dx===0)this._luDpadLatch[s].x=0;
        // D-PAD vertical also navigates (treat up=prev, down=next)
        if(dy===-1&&this._luDpadLatch[s].y!==-1){this._luSel=(this._luSel-1+n)%n;this._luDpadLatch[s].y=-1;AudioManager.play('click');}
        else if(dy===1&&this._luDpadLatch[s].y!==1){this._luSel=(this._luSel+1)%n;this._luDpadLatch[s].y=1;AudioManager.play('click');}
        else if(dy===0)this._luDpadLatch[s].y=0;
        // LEFT STICK X — same latch behavior
        const sx=Gamepads.axis(s,0);
        if(!this._luStickLatch)this._luStickLatch=[0,0];
        if(sx<-0.6&&this._luStickLatch[s]!==-1){this._luSel=(this._luSel-1+n)%n;this._luStickLatch[s]=-1;AudioManager.play('click');}
        else if(sx>0.6&&this._luStickLatch[s]!==1){this._luSel=(this._luSel+1)%n;this._luStickLatch[s]=1;AudioManager.play('click');}
        else if(Math.abs(sx)<0.3)this._luStickLatch[s]=0;
        // CONFIRM: X (button 0)
        if(Gamepads.wasPressed(s,0)){
          this.applyChoice(this._luSel);
          this._luSel=null;_applied=true;
        }
      }
      // If a choice was just applied this frame, draw the underlying game once more and end the frame cleanly
      if(_applied){Input.flush();requestAnimationFrame(t=>this.loop(t));return;}
      // Mouse hover takes priority; otherwise show controller selection
      const mouseIdx=UI.getLevelUpClick(Input.mouse.x,Input.mouse.y,n);
      const showSel=mouseIdx>=0?mouseIdx:this._luSel;
      UI.drawLevelUp(this.levelUpChoices,showSel,this.player,this.lastUpgrade);
      this.levelUpHover=showSel;
      if(click&&this.levelUpChoices){
        const idx=UI.getLevelUpClick(click.x,click.y,n);
        if(idx>=0){this.applyChoice(idx);this._luSel=null;}
      }
    } else if(this.state==='event'){
      // freeze game, show event modal
      this.draw();
      UI.drawEvent(this.activeEvent);
      if(click&&this.activeEvent){
        const idx=UI.getEventClick(click.x,click.y,this.activeEvent);
        if(idx>=0){
          AudioManager.play('click');
          try{this.activeEvent.options[idx].action(this.player);}catch(e){}
          this.activeEvent=null;this.state='playing';
        }
      }
    } else if(this.state==='game_over'){
      this.draw();
      UI.drawGameOver(this.player,Spawner.wave);
      if(click){this.state='main_menu';}
    }
    TouchControls.draw();
    Input.flush();
    requestAnimationFrame(t=>this.loop(t));
  },
  start(){this.init();requestAnimationFrame(t=>{this.last=t;this.loop(t);});}
};

function _resizeCanvas(){_fitCanvas();}
window.addEventListener('resize',_resizeCanvas);
window.addEventListener('orientationchange',()=>{setTimeout(_resizeCanvas,100);});
document.addEventListener('fullscreenchange',()=>{setTimeout(_resizeCanvas,50);});

// ─── MOBILE ROOM-CODE KEYBOARD (online multiplayer) ────────────
(function(){
  const el=document.createElement('input');
  el.type='text';
  el.autocomplete='off';el.autocapitalize='characters';
  el.setAttribute('autocorrect','off');el.setAttribute('spellcheck','false');
  el.maxLength=6;
  el.style.cssText='position:fixed;left:8px;bottom:38px;width:120px;height:24px;opacity:0;border:none;background:transparent;font-size:16px;z-index:9999;pointer-events:none;';
  document.body.appendChild(el);
  window._codeInputEl=el;
  el.addEventListener('input',e=>{
    if(typeof Game!=='undefined'){
      // Filter to allowed chars only (matches Net.newCode alphabet)
      const C='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
      let v=(e.target.value||'').toUpperCase();
      let f='';for(const ch of v){if(C.indexOf(ch)>=0&&f.length<6)f+=ch;}
      el.value=f;
      Game._onlineJoinCode=f;
    }
  });
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      if(typeof Game!=='undefined'&&Game.state==='online_menu'&&Game._onlineSub==='join_input'){
        const c=(Game._onlineJoinCode||'').toUpperCase();
        if(c.length===6){
          el.blur();
          (async()=>{
            const ok=await Net.connect(c,false);
            if(ok)Game._onlineSub='lobby';
          })();
        }
      }
    } else if(e.key==='Escape'){el.blur();}
  });
})();

// ─── MOBILE CHEAT-CODE KEYBOARD ────────────────────────────────
// Hidden <input> that lives off-screen. We focus it programmatically when the
// user taps the cheat bar so the device's soft keyboard pops up. The value is
// synced to UI._cheatInput so the on-canvas bar reflects what's typed.
(function(){
  const el=document.createElement('input');
  el.type='text';
  el.autocomplete='off';
  el.autocapitalize='characters';
  el.setAttribute('autocorrect','off');
  el.setAttribute('spellcheck','false');
  el.maxLength=12;
  // Tiny, transparent, off to the side — but NOT display:none (iOS won't focus it then)
  // font-size:16px prevents iOS from auto-zooming when focused.
  el.style.cssText='position:fixed;left:8px;bottom:8px;width:120px;height:24px;opacity:0;border:none;background:transparent;font-size:16px;z-index:9999;pointer-events:none;';
  document.body.appendChild(el);
  window._cheatInputEl=el;
  el.addEventListener('input',e=>{
    if(typeof UI!=='undefined'){
      UI._cheatInput=(e.target.value||'').toUpperCase().slice(0,12);
      UI._cheatFocus=true;
    }
  });
  el.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      e.preventDefault();
      if(typeof UI!=='undefined'){
        UI.tryCheat(UI._cheatInput||'');
        UI._cheatInput='';UI._cheatFocus=false;
      }
      el.value='';el.blur();
    } else if(e.key==='Escape'){
      if(typeof UI!=='undefined'){UI._cheatInput='';UI._cheatFocus=false;}
      el.value='';el.blur();
    }
  });
  el.addEventListener('blur',()=>{
    // Auto-submit whatever was typed when the user dismisses the keyboard
    if(typeof UI!=='undefined'&&UI._cheatFocus){
      if(UI._cheatInput)UI.tryCheat(UI._cheatInput);
      UI._cheatInput='';UI._cheatFocus=false;
    }
  });
})();

// ─── PWA MANIFEST ──────────────────────────────────────────────
(function(){
  const manifest={
    name:'Kiwi Mayhem',short_name:'Kiwi Mayhem',
    description:'Tank rush arena – survive endless waves',
    start_url:'./',display:'fullscreen',orientation:'landscape-primary',
    background_color:'#06060c',theme_color:'#cc2222',
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2306060c'/%3E%3Ctext y='.9em' font-size='82'%3E%F0%9F%8E%AE%3C/text%3E%3C/svg%3E",sizes:'any',type:'image/svg+xml'}]
  };
  try{
    const link=document.createElement('link');
    link.rel='manifest';
    link.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:'application/json'}));
    document.head.appendChild(link);
  }catch(e){}

  // Auto-fullscreen on first user gesture (phones + tablets)
  let _fsTriggered=false;
  function _tryFS(){
    if(_fsTriggered||document.fullscreenElement)return;
    _fsTriggered=true;
    document.documentElement.requestFullscreen?.().catch(()=>{});
  }
  document.addEventListener('touchstart',_tryFS,{once:true,passive:true});
  document.addEventListener('click',_tryFS,{once:true});
})();

Game.start();
