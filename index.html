    }
  },
};
// ─── ENEMIES ───────────────────────────────────────────────────
let _eid=1000;
// Global wave-difficulty scalar — applied on TOP of each enemy's existing
// per-wave scaling, so late waves get exponentially nastier without breaking early game.
// Returns multipliers for {hp, dmg, speed} based on current wave.
function _waveDifficulty(wave){
  const w=Math.max(1,wave||1);
  return {
    // Brutal scaling — enemies get tanky and hit hard fast
    hp:    1 + (w-1)*0.12 + Math.max(0,w-10)*0.08 + Math.max(0,w-20)*0.10 + Math.max(0,w-30)*0.14,
    dmg:   1 + (w-1)*0.09 + Math.max(0,w-10)*0.07 + Math.max(0,w-25)*0.10,
    speed: 1 + (w-1)*0.022 + Math.max(0,w-15)*0.018
  };
}
class BaseEnemy{
  constructor(x,y,opts={}){
    this.id=_eid++;this.x=x;this.y=y;
    this.r=opts.r??12;
    // Apply global wave difficulty scaling on top of each enemy's base values
    const _w=(typeof Spawner!=='undefined')?Spawner.wave:1;
    const _D=_waveDifficulty(_w);
    const _hp=Math.round((opts.hp??3)*_D.hp);
    this.hp=_hp;this.maxHp=_hp;
    this.alive=true;this.isEnemy=true;this.kind=opts.kind??'jello';
    this.speed=(opts.speed??70)*_D.speed;
    this.wobble=Math.random()*Math.PI*2;this.wobSpd=opts.wobSpd??3;
    this.contactCD=Math.random()*0.4;
    this.contactDmg=Math.round((opts.contactDmg??1)*_D.dmg*10)/10;
    this.contactInterval=opts.contactInterval??0.7;
    this.flashT=0;this.color=opts.color??'#ff64b4';this.xpDrop=opts.xpDrop??1;
    this.poisonTimer=0;this.poisonTickT=0;this.poisonDmg=0;
    this.slowTimer=0;this.slowFactor=1;this.stunTimer=0;
    this.moveAngle=0;this.moveDx=0;this.moveDy=0;
    this.marked=false;this.chained=false;
  }
  get effectiveSpeed(){return this.speed*(this.slowTimer>0?this.slowFactor:1);}
  takeDamage(amount){if(!this.alive)return;this.hp-=amount;this.flashT=0.15;if(Settings.bloodOn&&amount>=5){Particles.spawn(this.x,this.y,{vx:(Math.random()-.5)*80,vy:-20-Math.random()*60,life:0.3+Math.random()*0.2,r:2+Math.random()*1.5,color:'#aa0000'});}if(this.hp<=0)this._die();}
  applyPoison(dmg,dur){this.poisonTimer=Math.max(this.poisonTimer,dur);this.poisonTickT=1.0;this.poisonDmg=Math.max(this.poisonDmg,dmg);}
  applySlow(factor,dur){this.slowFactor=factor;this.slowTimer=dur;}
  applyStun(dur){this.stunTimer=dur;this.flashT=0.15;}
  applyBurn(dmg,dur){this.burnTimer=Math.max(this.burnTimer||0,dur);this.burnTickT=this.burnTickT||1.0;this.burnDmg=Math.max(this.burnDmg||0,dmg);}
  _die(){
    this.alive=false;
    XpOrbs.spawn(this.x,this.y,this.xpDrop);
    Particles.burst(this.x,this.y,8,{color:this.color,speed:80,life:0.4,r:3});
    Particles.burst(this.x,this.y,4,{color:'#fff',speed:50,life:0.25,r:2});
    if(Settings.bloodOn){for(let _i=0;_i<8;_i++){const _a=Math.random()*Math.PI*2,_s=50+Math.random()*120;Particles.spawn(this.x,this.y,{vx:Math.cos(_a)*_s,vy:Math.sin(_a)*_s,life:0.5+Math.random()*0.4,r:2.5+Math.random()*2.5,color:'#aa0000'});}}
    // ELITE on-death effects
    if(this.elite){
      if(this.eliteType==='burning'){
        // explode aoe
        for(const e of Game.enemies){if(!e.alive||e===this)continue;const dx=e.x-this.x,dy=e.y-this.y;if(dx*dx+dy*dy<120*120)e.takeDamage(15);}
        if(Game.player&&Game.player.alive){const dx=Game.player.x-this.x,dy=Game.player.y-this.y;if(dx*dx+dy*dy<120*120)Game.player.takeDamage(8,-2);}
        if(Game.player2&&Game.player2.alive){const dx=Game.player2.x-this.x,dy=Game.player2.y-this.y;if(dx*dx+dy*dy<120*120)Game.player2.takeDamage(8,-2);}
        Particles.burst(this.x,this.y,28,{color:'#ff5500',speed:200,life:0.7,r:5});Camera.shake(4,0.3);AudioManager.play('explosion');
      } else if(this.eliteType==='poison'){
        Effects.add({x:this.x,y:this.y,r:80,life:5,maxLife:5,_t:0,update(dt){this._t+=dt;if(this._t>0.5){this._t=0;for(const e2 of [Game.player,Game.player2].filter(Boolean)){if(!e2.alive)continue;const dx=e2.x-this.x,dy=e2.y-this.y;if(dx*dx+dy*dy<this.r*this.r)e2.takeDamage(3,-2);}}},draw(){const sx=Camera.sx(this.x),sy=Camera.sy(this.y),f=this.life/this.maxLife;ctx.globalAlpha=f*0.3;ctx.fillStyle='#88cc22';ctx.beginPath();ctx.arc(sx,sy,this.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}});
      }
    }
    // MINI-BOSS drops chest
    if(this.kind==='miniboss'){
      Chests.spawn(this.x,this.y);
      UI.announce('☠ MINI-BOSS DOWN · CHEST DROPPED ☠',2.5,'#ff8844');
      Save.addBirds(2);UI.announce('+2 🐦 KIWI BIRDS',1.8,'#ffdd66');
    }
  }
  update(dt,player,target){
    if(!this.alive)return;
    this.wobble+=dt*this.wobSpd;if(this.flashT>0)this.flashT-=dt;
    if(this.stunTimer>0){this.stunTimer-=dt;return;}
    if(this.slowTimer>0)this.slowTimer-=dt;
    if(this.poisonTimer>0){
      this.poisonTimer-=dt;this.poisonTickT-=dt;
      if(this.poisonTickT<=0&&this.alive){this.poisonTickT=1.0;this.hp-=this.poisonDmg;
        Particles.spawn(this.x,this.y,{vx:(Math.random()-.5)*20,vy:-35,life:0.4,r:2,color:'#aaff44'});
        if(this.hp<=0){this._die();return;}}
    }
    if(this.burnTimer>0){
      this.burnTimer-=dt;this.burnTickT=(this.burnTickT||1)-dt;
      if(this.burnTickT<=0&&this.alive){this.burnTickT=1.0;this.hp-=this.burnDmg;
        Particles.spawn(this.x,this.y,{vx:(Math.random()-.5)*25,vy:-40,life:0.35,r:3,color:'#ff6600'});
        if(this.hp<=0){this._die();return;}}
    }
    // ELITE auras
    if(this.elite){
      this._eliteAuraT=(this._eliteAuraT||0)-dt;
      if(this._eliteAuraT<=0){
        this._eliteAuraT=0.5;
        if(this._eliteFreezeAura){for(const pl of [Game.player,Game.player2].filter(Boolean)){if(!pl.alive)continue;const ax=pl.x-this.x,ay=pl.y-this.y;if(ax*ax+ay*ay<140*140){pl._slowedByGoo=Math.max(pl._slowedByGoo||0,0.45);}}}
        if(this._elitePoisonTrail){Particles.spawn(this.x+(Math.random()-.5)*30,this.y+(Math.random()-.5)*30,{vx:0,vy:-10,life:1.2,r:5,color:'rgba(136,204,34,0.6)'});}
        if(this._eliteVampire&&this.hp<this.maxHp){this.hp=Math.min(this.maxHp,this.hp+2);Particles.spawn(this.x,this.y,{vx:0,vy:-15,life:0.4,r:2,color:'#cc2244'});}
        if(this._elitePull){for(const pl of [Game.player,Game.player2].filter(Boolean)){if(!pl.alive)continue;const ax=this.x-pl.x,ay=this.y-pl.y,ad=Math.sqrt(ax*ax+ay*ay)||1;if(ad<200&&ad>20){pl.x+=ax/ad*30*dt*60;pl.y+=ay/ad*30*dt*60;}}}
      }
    }
    // target = decoy or player
    const tgt=target||player;
    const dx=tgt.x-this.x,dy=tgt.y-this.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    this.moveAngle=Math.atan2(dy,dx);this.moveDx=dx/dist;this.moveDy=dy/dist;
    if(dist>this.r+PHYS_R+2){
      const nx=this.x+(dx/dist)*this.effectiveSpeed*dt;
      const ny=this.y+(dy/dist)*this.effectiveSpeed*dt;
      // collision with obstacles (push around)
      const obs=collideObstacle(nx,ny,this.r);
      if(!obs){this.x=nx;this.y=ny;}
      else {
        // try sliding
        if(!collideObstacle(this.x,ny,this.r))this.y=ny;
        else if(!collideObstacle(nx,this.y,this.r))this.x=nx;
      }
    }
    const c=clampPoly(this.x,this.y,this.r);this.x=c.x;this.y=c.y;
    this.contactCD-=dt;
    if(player.alive&&!target){
      const pdx=player.x-this.x,pdy=player.y-this.y;
      // damage range is slightly wider than stopping range so contact fires when enemy is parked next to player
      const dmgR=this.r+PHYS_R+6;
      if(pdx*pdx+pdy*pdy<dmgR*dmgR&&this.contactCD<=0){
        player.takeDamage(this.contactDmg,-2);this.contactCD=this.contactInterval;
      }
    }
  }
  draw(){
    if(!this.alive)return;
    const sx=Camera.sx(this.x),sy=Camera.sy(this.y);
    // off-screen cull (enemies far outside viewport skip full draw)
    const margin=this.r*2+40;
    if(sx<-margin||sy<-margin||sx>canvas.width+margin||sy>canvas.height+margin)return;
    // ELITE aura (drop shadowBlur in crowded scenes)
    if(this.elite){
      const mod=ELITE_MODS.find(m=>m.id===this.eliteType);
      if(mod){
        const t=performance.now()/300;const pulse=0.55+Math.sin(t)*0.25;
        const heavy=Game.enemies&&Game.enemies.length>50;
        ctx.globalAlpha=pulse*0.5;ctx.fillStyle=mod.color;

        if(!heavy)ctx.shadowBlur=0;

      }
    }

    if(this.kind==='miniboss'){
      const t=performance.now()/250;const pulse=0.5+Math.sin(t)*0.4;

      ctx.beginPath();ctx.arc(sx,sy,this.r*1.7,0,Math.PI*2);ctx.stroke();
      ctx.globalAlpha=pulse*0.3;ctx.fillStyle='#ff8844';ctx.beginPath();ctx.arc(sx,sy,this.r*1.5,0,Math.PI*2);ctx.fill();
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }

      const hp01=Math.max(0,this.hp)/this.maxHp;

      const eCol=bigBar?'#ff4422':(hp01>.5?'#88ffaa':hp01>.25?'#ffcc44':'#ff4444');
      ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(bx-1,by-1,bw+2,bh+2,3);ctx.fill();
      ctx.fillStyle=eCol;ctx.shadowColor=eCol;ctx.shadowBlur=bigBar?10:(hp01<.3?6:0);
      ctx.beginPath();ctx.roundRect(bx,by,Math.max(2,bw*hp01),bh,2);ctx.fill();ctx.shadowBlur=0;
      ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=bigBar?1.4:0.8;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,2);ctx.stroke();
      if(bigBar){

      }
    }
    if(this.poisonTimer>0){ctx.globalAlpha=0.32;ctx.fillStyle='#aaff44';ctx.beginPath();ctx.arc(sx,sy,this.r*1.35,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    if(this.stunTimer>0){ctx.strokeStyle='#22aaff';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,this.r+5,0,Math.PI*2);ctx.stroke();}
    if(this.marked){ctx.strokeStyle='#ff8844';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,this.r+8,0,Math.PI*2);ctx.stroke();}
  }
  _drawBody(sx,sy){}
}

const JCOLS=['#ff64b4','#64ffb4','#64b4ff','#ffc850','#c864ff','#ff9966'];

class Brute extends BaseEnemy{

// ─── WITCH (throws spell projectiles) ─────────────────────────
class Witch extends BaseEnemy{
  constructor(x,y,wave=1){super(x,y,{kind:'witch',r:14,hp:42+Math.floor(wave*3),speed:60+wave*4,contactDmg:5,contactInterval:0.7,color:'#aa44ff',xpDrop:3,wobSpd:1.5});this.castT=2+Math.random()*1.5;}
  update(dt,player,target){
    if(!this.alive)return;
    // try to keep distance from player (kiting)
    this.wobble+=dt*this.wobSpd;
    if(this.flashT>0)this.flashT-=dt;
    if(this.stunTimer>0){this.stunTimer-=dt;return;}
    if(this.slowTimer>0)this.slowTimer-=dt;
    if(this.poisonTimer>0){this.poisonTimer-=dt;this.poisonTickT-=dt;if(this.poisonTickT<=0&&this.alive){this.poisonTickT=1.0;this.hp-=this.poisonDmg;if(this.hp<=0){this._die();return;}}}
    const tgt=target||player;
    const dx=tgt.x-this.x,dy=tgt.y-this.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    this.moveAngle=Math.atan2(dy,dx);
    const desired=240; // kite distance
    if(dist<desired-30){const nx=this.x-(dx/dist)*this.effectiveSpeed*dt;const ny=this.y-(dy/dist)*this.effectiveSpeed*dt;if(!collideObstacle(nx,ny,this.r)){this.x=nx;this.y=ny;}}
    else if(dist>desired+30){const nx=this.x+(dx/dist)*this.effectiveSpeed*dt;const ny=this.y+(dy/dist)*this.effectiveSpeed*dt;if(!collideObstacle(nx,ny,this.r)){this.x=nx;this.y=ny;}}
    const c=clampPoly(this.x,this.y,this.r);this.x=c.x;this.y=c.y;
    // cast spell
    this.castT-=dt;
    if(this.castT<=0&&player.alive){
      this.castT=2.5+Math.random();
      const ang=Math.atan2(player.y-this.y,player.x-this.x);
      const speed=180;
      Game.witchSpells.push({x:this.x,y:this.y,vx:Math.cos(ang)*speed,vy:Math.sin(ang)*speed,life:3,r:8,dmg:8});
      Particles.burst(this.x,this.y,8,{color:'#aa44ff',speed:90,life:0.4,r:3});
    }
  }
  _drawBody(sx,sy){
    const fl=this.flashT>0;
    // hat
    ctx.fillStyle=fl?'#fff':'#000';
    ctx.beginPath();ctx.moveTo(sx,sy-this.r*1.4);ctx.lineTo(sx-this.r*0.7,sy-this.r*0.55);ctx.lineTo(sx+this.r*0.7,sy-this.r*0.55);ctx.closePath();ctx.fill();
    // hat brim
    ctx.fillRect(sx-this.r*0.85,sy-this.r*0.62,this.r*1.7,4);
    // robe body
    ctx.fillStyle=fl?'#fff':'#220033';
    ctx.beginPath();ctx.moveTo(sx-this.r*0.7,sy-this.r*0.3);ctx.lineTo(sx-this.r*0.85,sy+this.r*0.85);ctx.lineTo(sx+this.r*0.85,sy+this.r*0.85);ctx.lineTo(sx+this.r*0.7,sy-this.r*0.3);ctx.closePath();ctx.fill();
    // accent
    ctx.fillStyle=fl?'#fff':this.color;ctx.shadowColor=this.color;ctx.shadowBlur=fl?0:8;
    ctx.fillRect(sx-this.r*0.4,sy-this.r*0.15,this.r*0.8,4);
    // face (pale)
    ctx.fillStyle=fl?'#fff':'#c9b8aa';
    ctx.beginPath();ctx.arc(sx,sy-this.r*0.45,this.r*0.32,0,Math.PI*2);ctx.fill();
    // glowing eyes
    ctx.fillStyle=fl?'#fff':this.color;ctx.shadowColor=this.color;ctx.shadowBlur=fl?0:8;
    ctx.beginPath();ctx.arc(sx-this.r*0.12,sy-this.r*0.42,1.8,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+this.r*0.12,sy-this.r*0.42,1.8,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // staff with orb
    const swing=Math.sin(this.wobble)*0.2;
    ctx.save();ctx.translate(sx+this.r*0.55,sy+this.r*0.1);ctx.rotate(swing);
    ctx.strokeStyle=fl?'#fff':'#553';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(0,this.r*0.4);ctx.lineTo(0,-this.r*0.8);ctx.stroke();
    ctx.fillStyle=fl?'#fff':this.color;ctx.shadowColor=this.color;ctx.shadowBlur=fl?0:10;
    ctx.beginPath();ctx.arc(0,-this.r*0.85,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
    ctx.restore();
  }
}

// ─── DISCO ZOMBIE - dances, randomly dashes ───────────────────
class DiscoZombie extends BaseEnemy{

// ─── BOSS (every 10 waves) ────────────────────────────────────
class Boss extends BaseEnemy{
  constructor(x,y,wave=10){
    const tier=Math.max(1,Math.floor(wave/10));
    // Boss +100% HP per user request — was 850+tier*500, now 1700+tier*1000
    super(x,y,{kind:'boss',r:48,hp:1700+tier*1000,speed:60+tier*8,contactDmg:48+tier*10,contactInterval:0.6,color:'#cc0066',xpDrop:25+tier*5,wobSpd:1.2});
    this.tier=tier;this.attackT=3;this.dashT=8;this.projT=5;this.maxHp=this.hp;
  }
  update(dt,player,target){
    if(!this.alive)return;
    this.wobble+=dt*this.wobSpd;
    if(this.flashT>0)this.flashT-=dt;
    if(this.stunTimer>0){this.stunTimer-=dt;return;}
    if(this.slowTimer>0)this.slowTimer-=dt;
    if(this.poisonTimer>0){this.poisonTimer-=dt;this.poisonTickT-=dt;if(this.poisonTickT<=0&&this.alive){this.poisonTickT=1.0;this.hp-=this.poisonDmg;if(this.hp<=0){this._die();return;}}}
    const tgt=target||player;
    const dx=tgt.x-this.x,dy=tgt.y-this.y,dist=Math.sqrt(dx*dx+dy*dy)||1;
    this.moveAngle=Math.atan2(dy,dx);
    // dash attack
    this.dashT-=dt;
    if(this.dashT<=0){
      this.dashT=7+Math.random()*3;
      this.dashing=0.5;this.dashVx=Math.cos(this.moveAngle)*620;this.dashVy=Math.sin(this.moveAngle)*620;
      Particles.burst(this.x,this.y,18,{color:this.color,speed:140,life:0.5,r:5});
    }
    if(this.dashing>0){this.dashing-=dt;this.x+=this.dashVx*dt;this.y+=this.dashVy*dt;this.dashVx*=0.93;this.dashVy*=0.93;}
    else if(dist>this.r+P_R+4){this.x+=(dx/dist)*this.effectiveSpeed*dt;this.y+=(dy/dist)*this.effectiveSpeed*dt;}
    const c=clampPoly(this.x,this.y,this.r);this.x=c.x;this.y=c.y;
    // projectile attack
    this.projT-=dt;
    if(this.projT<=0&&player.alive){
      this.projT=4+Math.random()*2;
      for(let i=-1;i<=1;i++){
        const ang=Math.atan2(player.y-this.y,player.x-this.x)+i*0.25;
        Game.witchSpells.push({x:this.x,y:this.y,vx:Math.cos(ang)*240,vy:Math.sin(ang)*240,life:3,r:12,dmg:15+this.tier*3});
      }
      Particles.burst(this.x,this.y,12,{color:this.color,speed:120,life:0.5,r:4});
    }
    // contact
    this.contactCD-=dt;
    if(player.alive){
      const pdx=player.x-this.x,pdy=player.y-this.y;
      if(pdx*pdx+pdy*pdy<(this.r+PHYS_R)**2&&this.contactCD<=0){player.takeDamage(this.contactDmg,-2);this.contactCD=this.contactInterval;}
    }
  }
  _die(){
    this.alive=false;
    XpOrbs.spawn(this.x,this.y,this.xpDrop);
    // big death explosion
    Camera.shake(15,0.6);
    Particles.burst(this.x,this.y,60,{color:this.color,speed:280,life:1.2,r:8});
    Particles.burst(this.x,this.y,30,{color:'#fff',speed:200,life:0.8,r:4});
    // drop care package and health
    CarePackages.list.push({x:this.x,y:this.y,type:CarePackages.TYPES[Math.floor(Math.random()*CarePackages.TYPES.length)],pulse:0,fall:0});
    Game.healthOrbs.push({x:this.x+40,y:this.y,bobT:0,heal:30});
    UI.announce('BOSS DEFEATED!',3,'#ff44aa');
    // === MAP SHIFT on boss kill ===
    if(typeof Themes!=='undefined'){
      const cur=Themes.current;
      const next=Themes.pickRandom(cur);
      // 1-second white flash, then swap
      Effects.add({life:1,maxLife:1,
        draw(){const f=this.life/this.maxLife;
          ctx.fillStyle=`rgba(255,255,255,${(0.85*f).toFixed(2)})`;
          ctx.fillRect(0,0,canvas.width,canvas.height);}});
      Camera.shake(20,0.8);
      setTimeout(()=>{Themes.switchTo(next);UI.announce(`MAP SHIFTED · ${Themes.get().name}`,2.5,Themes.get().borderColor);AudioManager.play('boss_spawn');},500);
    }
  }
  _drawBody(sx,sy){
    const fl=this.flashT>0,wb=Math.sin(this.wobble)*3;
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.ellipse(sx+5,sy+this.r*0.95,this.r*1.2,this.r*0.35,0,0,Math.PI*2);ctx.fill();
    // legs
    ctx.fillStyle=fl?'#fff':'#1a1a26';
    ctx.fillRect(sx-this.r*0.4,sy+this.r*0.3,this.r*0.3,this.r*0.65);
    ctx.fillRect(sx+this.r*0.1,sy+this.r*0.3,this.r*0.3,this.r*0.65);
    // armored chest
    ctx.fillStyle=fl?'#fff':'#220011';
    ctx.beginPath();ctx.roundRect(sx-this.r*0.9,sy-this.r*0.5+wb,this.r*1.8,this.r*1.0,8);ctx.fill();
    // glowing armor plate
    ctx.fillStyle=fl?'#fff':this.color;ctx.shadowColor=this.color;ctx.shadowBlur=fl?0:18;
    ctx.beginPath();ctx.roundRect(sx-this.r*0.75,sy-this.r*0.35+wb,this.r*1.5,this.r*0.55,5);ctx.fill();
    ctx.shadowBlur=0;
    // shoulder spikes (large)
    ctx.fillStyle=fl?'#fff':'#330011';
    for(let i=-1;i<=1;i+=2){
      ctx.beginPath();
      ctx.moveTo(sx+i*this.r*0.9,sy-this.r*0.5+wb);
      ctx.lineTo(sx+i*this.r*1.3,sy-this.r*0.9+wb);
      ctx.lineTo(sx+i*this.r*0.7,sy-this.r*0.4+wb);
      ctx.closePath();ctx.fill();
    }
    // arms with claws
    ctx.fillStyle=fl?'#fff':'#220011';
    ctx.fillRect(sx-this.r*1.1,sy-this.r*0.2+wb,this.r*0.3,this.r*0.7);
    ctx.fillRect(sx+this.r*0.8,sy-this.r*0.2+wb,this.r*0.3,this.r*0.7);
    // claws
    ctx.fillStyle=fl?'#fff':this.color;
    for(let i=-1;i<=1;i+=2){
      const ax=sx+i*this.r*0.95;
      for(let j=-1;j<=1;j++){
        ctx.beginPath();
        ctx.moveTo(ax,sy+this.r*0.5+wb);
        ctx.lineTo(ax+i*this.r*0.15,sy+this.r*0.8+wb+j*4);
        ctx.lineTo(ax-i*this.r*0.05,sy+this.r*0.55+wb);
        ctx.closePath();ctx.fill();
      }
    }
    // head/crown
    ctx.fillStyle=fl?'#fff':'#330011';
    ctx.beginPath();ctx.arc(sx,sy-this.r*0.7+wb,this.r*0.4,0,Math.PI*2);ctx.fill();
    // crown spikes
    ctx.fillStyle=fl?'#fff':this.color;ctx.shadowColor=this.color;ctx.shadowBlur=fl?0:10;
    for(let i=0;i<5;i++){const ix=sx+(i-2)*this.r*0.16;
      ctx.beginPath();ctx.moveTo(ix-3,sy-this.r*1.0+wb);ctx.lineTo(ix,sy-this.r*1.25+wb);ctx.lineTo(ix+3,sy-this.r*1.0+wb);ctx.closePath();ctx.fill();}
    ctx.shadowBlur=0;
    // glowing eyes
    ctx.fillStyle=fl?'#fff':'#ff0044';ctx.shadowColor='#ff0044';ctx.shadowBlur=fl?0:14;
    ctx.beginPath();ctx.arc(sx-this.r*0.14,sy-this.r*0.7+wb,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sx+this.r*0.14,sy-this.r*0.7+wb,4,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
    // mouth
    ctx.fillStyle='#000';ctx.fillRect(sx-this.r*0.16,sy-this.r*0.5+wb,this.r*0.32,this.r*0.12);
    ctx.fillStyle=fl?'#fff':this.color;
    for(let i=0;i<4;i++)ctx.fillRect(sx-this.r*0.13+i*this.r*0.08,sy-this.r*0.5+wb,2,4);
    // BOSS HP bar (huge, fixed at top)
    const bx=canvas.width/2-230,by=64,bw=460,bh=16;
    const hpPct=Math.max(0,this.hp/this.maxHp);
    const t2=performance.now()/1000;
    // label above
    ctx.fillStyle=this.color;ctx.shadowColor=this.color;ctx.shadowBlur=10;
    ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText(`★ BOSS  TIER ${this.tier}  ★`,canvas.width/2,by-8);ctx.shadowBlur=0;
    // bar track
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.beginPath();ctx.roundRect(bx-2,by-2,bw+4,bh+4,6);ctx.fill();
    ctx.fillStyle='#1a0010';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.fill();
    // animated danger pulse at low HP
    const pulse=hpPct<0.3?Math.sin(t2*8)*0.3+0.7:1;
    const barCol=hpPct>0.5?this.color:hpPct>0.25?'#ff8800':'#ff2200';
    ctx.fillStyle=barCol;ctx.shadowColor=barCol;ctx.shadowBlur=hpPct<0.3?12*pulse:8;
    ctx.beginPath();ctx.roundRect(bx,by,bw*hpPct,bh,4);ctx.fill();ctx.shadowBlur=0;
    // HP text inside bar
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 9px monospace';ctx.textAlign='center';
    ctx.fillText(`${Math.ceil(this.hp)} / ${this.maxHp}`,canvas.width/2,by+bh*0.72);
    // border
    ctx.strokeStyle=this.color+'99';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.stroke();
    ctx.textAlign='left';
  }
}

// Tiny helper: darken/lighten a hex color by a 0..1 factor (returns rgba string)
function _shade(hex,amt){
  if(!hex||hex[0]!=='#'||hex.length<7)return hex;
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  if(amt>=0){r=Math.min(255,r+(255-r)*amt);g=Math.min(255,g+(255-g)*amt);b=Math.min(255,b+(255-b)*amt);}
  else {const a=-amt;r=Math.max(0,r*(1-a));g=Math.max(0,g*(1-a));b=Math.max(0,b*(1-a));}
  return `rgb(${r|0},${g|0},${b|0})`;
}
function drawCharacter(sx,sy,bodyAngle,aimAngle,fl,charDef,extraDraw,walkT=0,weaponId='r301',careType=null,recoilT=0){

  const SKDark=fl?'#fff':'#a88a64';
  const CC=fl?'#fff':charDef.color;
  const CCLight=fl?'#fff':_shade(charDef.color,0.35);
  const CCDark=fl?'#fff':_shade(charDef.color,-0.4);
  const AC=fl?'#fff':charDef.accent;
  const ACLight=fl?'#fff':_shade(charDef.accent,0.4);

  const PTLight=fl?'#fff':'#3a3a55';
  // Light direction: top-left (so highlights go top-left, shadows go bottom-right)
  // Rim light intensity factor (0 in flash mode for stark white silhouette)

  // ── DROP SHADOW (softer, longer) ─────────────────────────
  const shadowG=ctx.createRadialGradient(sx+2,sy+R*0.78,R*0.1,sx+2,sy+R*0.78,R*0.85);
  shadowG.addColorStop(0,'rgba(0,0,0,0.55)');

    ctx.beginPath();ctx.roundRect(bx-1,by+bh-3,bw+2,5,2);ctx.fill();
    // upper
    const bootG=ctx.createLinearGradient(bx,by,bx,by+bh);
    bootG.addColorStop(0,fl?'#fff':'#3a3a4a');
    bootG.addColorStop(1,fl?'#fff':'#0a0a12');
    ctx.fillStyle=bootG;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,3);ctx.fill();
    // metal toe cap
    ctx.fillStyle=fl?'#fff':AC;
    ctx.beginPath();ctx.roundRect(bx+bw-R*0.14,by+1,R*0.13,bh-2,2);ctx.fill();
    // boot highlight
    ctx.fillStyle=fl?'#fff':'rgba(255,255,255,0.22)';
    ctx.fillRect(bx+2,by+1,R*0.18,R*0.025);
  }

  // ── BELT (metallic gradient + rivets) ─────────────────────
  const beltY=sy+R*0.08+totalBob;
  const beltG=ctx.createLinearGradient(sx,beltY,sx,beltY+R*0.10);
  beltG.addColorStop(0,ACLight);
  beltG.addColorStop(0.5,AC);
  beltG.addColorStop(1,fl?'#fff':_shade(charDef.accent,-0.3));
  ctx.fillStyle=beltG;
  ctx.beginPath();ctx.roundRect(sx-R*0.46,beltY,R*0.92,R*0.10,3);ctx.fill();
  // rivets
  ctx.fillStyle=fl?'#fff':'rgba(255,255,255,0.4)';
  for(let i=-3;i<=3;i+=2){if(i===0||i===1)continue;ctx.beginPath();ctx.arc(sx+i*R*0.12,beltY+R*0.05,1.2,0,Math.PI*2);ctx.fill();}
  // belt buckle (gold with sheen)
  const buckleX=sx-R*0.08, buckleY=beltY+R*0.01;
  const bkG=ctx.createLinearGradient(buckleX,buckleY,buckleX,buckleY+R*0.08);
  bkG.addColorStop(0,fl?'#fff':'#ffe888');
  bkG.addColorStop(0.5,fl?'#fff':'#ffcc44');
  bkG.addColorStop(1,fl?'#fff':'#aa7711');
  ctx.fillStyle=bkG;
  ctx.shadowColor='#ffcc44';ctx.shadowBlur=fl?0:6;
  ctx.beginPath();ctx.roundRect(buckleX,buckleY,R*0.16,R*0.08,2);ctx.fill();

  // buckle highlight

  // ── TORSO ─────────────────────────────────────────────────
  // undersuit base (dark)

  ctx.beginPath();ctx.roundRect(sx-R*0.50,sy-R*0.35+totalBob,R*1.00,R*0.50,6);ctx.fill();
  // chest plate with vertical gradient
  const torsoX=sx-R*0.43, torsoY=sy-R*0.30+totalBob;
  const torsoW=R*0.86, torsoH=R*0.41;
  const torsoG=ctx.createLinearGradient(torsoX,torsoY,torsoX,torsoY+torsoH);
  torsoG.addColorStop(0,CCLight);
  torsoG.addColorStop(0.5,CC);
  torsoG.addColorStop(1,CCDark);
  ctx.fillStyle=torsoG;
  ctx.shadowColor=charDef.color;ctx.shadowBlur=fl?0:12;
  ctx.beginPath();ctx.roundRect(torsoX,torsoY,torsoW,torsoH,5);ctx.fill();
  ctx.shadowBlur=0;
  // rim light on left edge
  if(RIM){
    ctx.fillStyle='rgba(255,255,255,0.22)';
    ctx.beginPath();ctx.roundRect(torsoX,torsoY,R*0.06,torsoH,3);ctx.fill();
  }
  // chest highlight (top gloss)
  const cg=ctx.createLinearGradient(sx,torsoY,sx,torsoY+R*0.22);
  cg.addColorStop(0,'rgba(255,255,255,0.35)');cg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=cg;
  ctx.beginPath();ctx.roundRect(torsoX+R*0.03,torsoY+1,torsoW-R*0.06,R*0.22,4);ctx.fill();
  // center sternum line (decorative)
  ctx.strokeStyle=fl?'#fff':'rgba(0,0,0,0.35)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(sx,torsoY+R*0.04);ctx.lineTo(sx,torsoY+torsoH-R*0.05);ctx.stroke();
  // chest plate panel lines (two diagonal V-grooves)
  ctx.strokeStyle=fl?'#fff':'rgba(0,0,0,0.28)';ctx.lineWidth=1;
  ctx.beginPath();
  ctx.moveTo(sx-R*0.30,torsoY+R*0.05);ctx.lineTo(sx-R*0.08,torsoY+R*0.18);
  ctx.moveTo(sx+R*0.30,torsoY+R*0.05);ctx.lineTo(sx+R*0.08,torsoY+R*0.18);
  ctx.stroke();
  // chest emblem (more detailed — bordered circle + inner dot)
  const emY=sy-R*0.10+totalBob;
  ctx.fillStyle=fl?'#fff':'rgba(0,0,0,0.4)';
  ctx.beginPath();ctx.arc(sx,emY,R*0.13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=ACLight;ctx.shadowColor=AC;ctx.shadowBlur=fl?0:8;
  ctx.beginPath();ctx.arc(sx,emY,R*0.10,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle=fl?'#fff':'rgba(255,255,255,0.55)';
  ctx.beginPath();ctx.arc(sx-R*0.025,emY-R*0.025,R*0.04,0,Math.PI*2);ctx.fill();

  // ── SHOULDERS (radial gradient pauldrons) ────────────────
  for(let side=-1;side<=1;side+=2){
    const shX=sx+side*R*0.50, shY=sy-R*0.27+totalBob;
    const shG=ctx.createRadialGradient(shX-side*R*0.08,shY-R*0.08,R*0.04,shX,shY,R*0.22);

    // chrome rim

    ctx.beginPath();ctx.arc(shX,shY,R*0.22,Math.PI,Math.PI*2);ctx.stroke();
    // inner shoulder plate (character color)
    const ipG=ctx.createRadialGradient(shX-side*R*0.05,shY-R*0.05,R*0.02,shX,shY,R*0.13);
    ipG.addColorStop(0,CCLight);ipG.addColorStop(1,CC);
    ctx.fillStyle=ipG;
    ctx.beginPath();ctx.arc(shX-side*0.02,shY-R*0.04,R*0.13,0,Math.PI*2);ctx.fill();
  }

  // ── NECK ──────────────────────────────────────────────────
  const neckG=ctx.createLinearGradient(sx-R*0.13,sy-R*0.42+totalBob,sx-R*0.13,sy-R*0.28+totalBob);
  neckG.addColorStop(0,SKDark);neckG.addColorStop(1,SK);
  ctx.fillStyle=neckG;
  ctx.beginPath();ctx.roundRect(sx-R*0.13,sy-R*0.42+totalBob,R*0.26,R*0.14,3);ctx.fill();

  // ── HEAD (radial-light skin) ──────────────────────────────
  const headCX=sx, headCY=sy-R*0.68+totalBob;
  const headG=ctx.createRadialGradient(headCX-R*0.12,headCY-R*0.12,R*0.04,headCX,headCY,R*0.40);
  headG.addColorStop(0,fl?'#fff':'#fdebd2');

  ctx.fillStyle=headG;
  ctx.shadowColor='rgba(0,0,0,0.45)';ctx.shadowBlur=fl?0:7;
  ctx.beginPath();ctx.arc(headCX,headCY,R*0.40,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // cheek blush (very subtle)
  if(!fl){
    ctx.fillStyle='rgba(255,140,120,0.18)';
    ctx.beginPath();ctx.arc(headCX-R*0.18,headCY+R*0.04,R*0.07,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(headCX+R*0.18,headCY+R*0.04,R*0.07,0,Math.PI*2);ctx.fill();
  }
  // chin shadow
  ctx.fillStyle=fl?'#fff':'rgba(0,0,0,0.18)';
  ctx.beginPath();ctx.ellipse(headCX,headCY+R*0.20,R*0.18,R*0.05,0,0,Math.PI*2);ctx.fill();

  // ── HELMET ────────────────────────────────────────────────
  const helmCY=sy-R*0.70+totalBob;
  // dark inner liner
  ctx.fillStyle=fl?'#fff':'#0c0c14';
  ctx.beginPath();ctx.arc(headCX,helmCY,R*0.43,Math.PI*1.02,Math.PI*1.98,false);ctx.fill();
  // outer helmet shell (radial gradient simulating metal sphere)
  const helmG=ctx.createRadialGradient(headCX-R*0.18,helmCY-R*0.20,R*0.04,headCX,helmCY,R*0.42);
  helmG.addColorStop(0,CCLight);
  helmG.addColorStop(0.55,CC);
  helmG.addColorStop(1,CCDark);
  ctx.fillStyle=helmG;
  ctx.shadowColor=charDef.color;ctx.shadowBlur=fl?0:9;
  ctx.beginPath();ctx.arc(headCX,helmCY,R*0.42,Math.PI*1.05,Math.PI*1.95,false);
  ctx.lineTo(headCX-R*0.42*Math.cos(Math.PI*0.05),helmCY-R*0.42*Math.sin(Math.PI*0.05));
  ctx.fill();
  ctx.shadowBlur=0;
  // helmet crest line (top ridge)
  ctx.strokeStyle=ACLight;ctx.lineWidth=2.4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(headCX-R*0.20,helmCY-R*0.36);ctx.lineTo(headCX+R*0.20,helmCY-R*0.36);ctx.stroke();
  // helmet highlight stripe (specular)
  ctx.strokeStyle=fl?'#fff':'rgba(255,255,255,0.45)';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(headCX,helmCY,R*0.37,Math.PI*1.25,Math.PI*1.55,false);ctx.stroke();
  // helmet side plates (more pronounced, beveled)
  for(let side=-1;side<=1;side+=2){
    const spX=sx+side*R*0.37, spY=helmCY-R*0.02;
    const spG=ctx.createLinearGradient(spX,spY,spX,spY+R*0.20);
    spG.addColorStop(0,ACLight);spG.addColorStop(0.5,AC);spG.addColorStop(1,fl?'#fff':_shade(charDef.accent,-0.4));
    ctx.fillStyle=spG;
    ctx.beginPath();ctx.roundRect(spX-R*0.05,spY,R*0.10,R*0.22,3);ctx.fill();
    // side plate highlight
    ctx.fillStyle=fl?'#fff':'rgba(255,255,255,0.3)';
    ctx.fillRect(spX-R*0.045,spY+1,R*0.03,R*0.18);
  }

  // ── VISOR (recessed dark window + glowing eyes + scanline reflection) ──
  const eyeY=sy-R*0.68+totalBob;
  // visor recess (the dark window)
  ctx.fillStyle=fl?'#fff':'rgba(0,0,0,0.9)';
  ctx.beginPath();ctx.roundRect(headCX-R*0.30,eyeY-R*0.08,R*0.60,R*0.13,4);ctx.fill();
  // visor inner gradient (deep)
  if(!fl){
    const vG=ctx.createLinearGradient(headCX,eyeY-R*0.08,headCX,eyeY+R*0.05);
    vG.addColorStop(0,'rgba(0,0,0,0.95)');
    vG.addColorStop(1,_shade(charDef.color,-0.6));
    ctx.fillStyle=vG;
    ctx.beginPath();ctx.roundRect(headCX-R*0.28,eyeY-R*0.07,R*0.56,R*0.11,3);ctx.fill();
  }
  // glowing eyes
  for(let side=-1;side<=1;side+=2){
    const exC=headCX+side*R*0.16, ey=eyeY-R*0.015;
    ctx.fillStyle=CCLight;ctx.shadowColor=charDef.color;ctx.shadowBlur=fl?0:12;
    ctx.beginPath();ctx.roundRect(exC-R*0.07,ey-R*0.025,R*0.14,R*0.055,2);ctx.fill();
    ctx.shadowBlur=0;
    // bright core
    ctx.fillStyle=fl?'#fff':'#ffffff';ctx.globalAlpha=0.85;
    ctx.beginPath();ctx.roundRect(exC-R*0.05,ey-R*0.018,R*0.10,R*0.025,1.5);ctx.fill();
    ctx.globalAlpha=1;
  }
  // visor reflection scanline (diagonal sheen)
  if(!fl){
    ctx.strokeStyle='rgba(255,255,255,0.18)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(headCX-R*0.26,eyeY-R*0.06);ctx.lineTo(headCX-R*0.10,eyeY+R*0.02);ctx.stroke();
  }

  // character-specific detail (receives sx,sy with bob already applied for body position)
  if(charDef.detail)charDef.detail(ctx,sx,sy+totalBob,bodyAngle,fl);

  // ── GUN ARM + WEAPON ──────────────────────────────────────
  const recoilOff=recoilT*R*0.22;
  ctx.save();
  ctx.translate(sx,sy-R*0.08+totalBob);
  ctx.rotate(aimAngle);
  ctx.translate(-recoilOff,0);
  // back arm with gradient
  const baG=ctx.createLinearGradient(0,-4,0,4);
  baG.addColorStop(0,ACLight);baG.addColorStop(1,fl?'#fff':_shade(charDef.accent,-0.3));
  ctx.fillStyle=baG;
  ctx.beginPath();ctx.roundRect(R*0.04,-4,R*0.52,8,4);ctx.fill();
  // back arm bicep ring (accent)
  ctx.fillStyle=fl?'#fff':CC;
  ctx.beginPath();ctx.roundRect(R*0.18,-4.5,R*0.06,9,2);ctx.fill();
  // back hand with subtle glove
  ctx.fillStyle=DK;
  ctx.beginPath();ctx.arc(R*0.55,0,5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=SK;
  ctx.beginPath();ctx.arc(R*0.55,0,3.5,0,Math.PI*2);ctx.fill();
  // WEAPON
  const gunFn=GUN_DRAW[careType]||GUN_DRAW[weaponId]||GUN_DRAW.r301;
  const wDef=careType?CARE_WEAPON_DEFS[careType]:WEAPON_DEFS[weaponId];
  const wCol=wDef?.color||CC;
  gunFn(ctx,fl,wCol,AC,DK,SK);
  // front arm with gradient
  const faG=ctx.createLinearGradient(0,-3.5,0,3.5);
  faG.addColorStop(0,ACLight);faG.addColorStop(1,fl?'#fff':_shade(charDef.accent,-0.3));
  ctx.fillStyle=faG;
  ctx.beginPath();ctx.roundRect(R*0.48,-3.5,R*0.60,6,3);ctx.fill();
  // forearm guard
  ctx.fillStyle=fl?'#fff':AC;
  ctx.beginPath();ctx.roundRect(R*0.78,-4,R*0.18,8,2);ctx.fill();
  ctx.fillStyle=fl?'#fff':'rgba(255,255,255,0.25)';
  ctx.fillRect(R*0.80,-3.5,R*0.14,1.5);
  // front hand with subtle glove
  ctx.fillStyle=DK;
  ctx.beginPath();ctx.arc(R*1.05,0,4.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=SK;
  ctx.beginPath();ctx.arc(R*1.05,0,3,0,Math.PI*2);ctx.fill();
  ctx.restore();

  if(extraDraw)extraDraw();
}

// ─── PLAYER ─────────────────────────────────────────────────
class Player{
  constructor(charId,weaponId){
    this.id=_eid++;
    const c=CHAR_DEFS[charId],w=WEAPON_DEFS[weaponId];
    this.charId=charId;this.charDef=c;this.weaponId=weaponId;
    this.weapon={...w,ammo:w.ammo,maxAmmo:w.maxAmmo,mag:w.magSize,magSize:w.magSize,reloadTime:w.reloadTime};
    this.careWeapon=null;
    this.reloading=false;this.reloadT=0;
    this.x=ARENA/2;this.y=ARENA/2;
    this.angle=0;this.aimAngle=0;
    this.maxHp=c.hp;this.hp=c.hp;
    this.baseSpeed=c.speed;this.speedMult=1;
    this.alive=true;this.respawnT=0;this.flashT=0;this.shootCD=0;
    this.dmgMult=1;this.rofMult=1/1.07;this.bulletDmg=1; // base rofMult divided by 1.07 → +7% fire rate
    this.extraBullets=0;
    // XP
    this.xp=0;this.level=1;this.kills=0;
    // upgrades
    this.upgrades=new Map();
    // character ability
    this.qCD=0;this.qActive=false;this.qDur=0;
    // status effects
    this.bangaloreSpeedT=0;
    // damage interaction
    this.recentMoveX=0;this.recentMoveY=0;
    this.walkT=0;this.moving=false;
    // shield surge
    this.shieldT=0;this.shieldCD=0;
    // wave clear heal tracking
    this.lastWave=1;
    // war machine consec shots
    this.warShots=0;this.warTimer=0;
    // blood frenzy
    this.frenzyStacks=0;
    // combat high
    this.combatHighT=0;this.combatHighStacks=0;
    // nano swarm
    this.nanoTrailT=0;
    // misc autos
    this.bulletStormTimer=0;this.overdriveTimer=0;this.voidTimer=0;
    this.supplyTimer=0;this.droneTimer=0;this.stunGrenTimer=0;this.shieldBatTimer=60;
    this.overdriveActive=0;
    this.overloadTimer=0;
    this.energyDrainTimer=0;
    // last stand
    this.lastStandActive=false;
    // level 10 ult
    this.apexUlt=null;this.ultCD=0;
    this.ultBoostT=0;this.ultInvT=0;this.ultDmgBoost=0;this.ultPierceT=0;
  }
  get effectiveSpeed(){
    let mult=this.speedMult;
    if(this.qActive&&this.charId==='octane')mult*=1.60;
    if(this.bangaloreSpeedT>0&&this.charId==='bangalore')mult*=1.25;
    if(this.killDashT>0)mult*=1+(this.killDashBonus??0);
    if(this.overdriveActive>0)mult*=2;
    if(this.combatHighT>0)mult*=1+this.combatHighStacks*(this.combatHigh??0);
    if(this.lastStandActive)mult*=this.lastStandMult??1;
    if(this.ultBoostT>0)mult*=2;
    if(this._slowedByGoo&&this._slowedByGoo>0)mult*=this._slowedByGoo;
    if(this._ben10Form){if(this._ben10Form==='xlr8')mult*=2.0;else if(this._ben10Form==='wildmutt')mult*=1.6;else mult*=1.25;}
    return this.baseSpeed*mult;
  }
  _activateUlt(){
    if(!this.apexUlt||this.ultCD>0||!this.alive)return;
    const cdMult=1-(this.cdReduction??0);
    this.ultCD=this.apexUlt.cd*cdMult;
    this.apexUlt.activate(this);
    UI.announce(this.apexUlt.name+'!',2.5,this.apexUlt.color);
    AudioManager.play('ult_activate');
    VoiceManager.play(this.charId,'ultimate');
    if(this.playerSlot!=null)Gamepads.vibrate(this.playerSlot,400,0.9,0.7);
  }
  equipUlt(){
    this.apexUlt=ULT_DEFS[this.charId];
    this.ultCD=0;
  }
  getStacks(id){return this.upgrades.get(id)??0;}
  applyUpgrade(id){
    const upg=UPGRADES.find(u=>u.id===id);if(!upg)return;
    const cur=this.upgrades.get(id)??0;
    if(cur>=upg.maxStacks)return;
    this.upgrades.set(id,cur+1);
    upg.apply(this,cur+1);
  }
  pickupAmmo(){
    // Care weapons are one-time pickups — ammo boxes do NOT refill them.
    // The ammo always goes into the player's DEFAULT weapon.
    const w=this.weapon;
    const add=Math.floor(WEAPON_DEFS[this.weaponId].pickAmmo*(this.ammoScavBonus??1));
    w.ammo=Math.min(w.maxAmmo,w.ammo+add);
    if(this.ammoHeal>0){this.hp=Math.min(this.maxHp,this.hp+this.ammoHeal);}
    UI.announce(this.careWeapon?'+AMMO (DEFAULT WEAPON)':'+AMMO',1.0,'#ffaa33');
  }
  pickupCarePackage(type){
    // Care package weapons can be CARE-PKG-only or legendary main weapons
    const def=CARE_WEAPON_DEFS[type]||WEAPON_DEFS[type];
    if(!def){return;}
    // care weapons = SINGLE MAGAZINE - no reserve, disappears when empty
    this.careWeapon={...def,ammo:0,mag:def.magSize,type,maxAmmo:0};
    this.reloading=false;this.reloadT=0;
    UI.announce(`${def.name} ACQUIRED`,2.5,'#ffdd00');
  }
  collectXp(v=1){
    this.xp+=v+(this.xpBonus??0);
    const need=this.xpForNextLevel();
    if(this.xp>=need){this.xp-=need;this.level++;Game.triggerLevelUp();}
  }
  // Aggressive progression: L2=5, L3=7, L4=10, L5=15, L6=22, L7=30, L8=39, L10=63 …
  xpForNextLevel(){const L=this.level-1;return Math.floor(5+L*1.5+L*L*0.7);}
  takeDamage(amount,attackerId){
    if(!this.alive)return;
    if(this.qActive&&(this.charId==='revenant'||this.charId==='wraith'))return;
    if(this.shieldT>0||this.ultInvT>0)return;
    let actual=Math.max(1,Math.round(amount*(1-Math.min(0.6,this.damageResist??0))));
    actual=Math.max(1,actual-(this.damageReduction??0));
    this.hp=Math.max(0,this.hp-actual);this.flashT=0.12;
    AudioManager.play('player_hurt');
    if(Game)Game._waveDamageTaken=true;
    if(this.playerSlot!=null)Gamepads.vibrate(this.playerSlot,180,0.7,0.4);
    // Blood spray
    if(Settings.bloodOn){
      for(let _bi=0;_bi<6;_bi++){const _ba=Math.random()*Math.PI*2,_bs=70+Math.random()*110;Particles.spawn(this.x,this.y,{vx:Math.cos(_ba)*_bs,vy:Math.sin(_ba)*_bs,life:0.4+Math.random()*0.3,r:2+Math.random()*2,color:'#cc1111'});}
    }
    // Low HP voice trigger
    if(this.hp>0&&this.hp<this.maxHp*0.25&&!this._lowHpVoiced){this._lowHpVoiced=true;VoiceManager.play(this.charId,'lowHp');}
    if(this.hp>=this.maxHp*0.5)this._lowHpVoiced=false;
    // bangalore passive
    if(this.charId==='bangalore')this.bangaloreSpeedT=3;
    // shield surge
    if(this.hasShield&&this.shieldCD<=0){this.shieldT=this.shieldDur;this.shieldCD=this.shieldCDMax;}
    // wraith auto-phase at low HP
    if(this.charId==='wraith'&&this.hp<this.maxHp*0.25&&this.qCD<=0){this._activateQ();}
    // thorn damage
    if(this.thornDmg>0&&attackerId>=0){
      const att=Game.enemies.find(e=>e.id===attackerId);
      if(att&&att.alive)att.takeDamage(Math.max(1,Math.round(amount*this.thornDmg)));
    }
    if(this.hp<=0){
      // death wish
      if(this.deathWish>0&&!this.deathWishUsed){
        this.deathWishUsed=true;
        this.hp=Math.floor(this.maxHp*0.4*this.deathWish);
        this.shieldT=1.5;

    const isMiniBoss=enemy?.kind==='miniboss';
    const isSpecialBoss=enemy?.kind==='specialboss';

  handleInput(dt){

      return;
    }
    // Input source:
    //   • P2 (slot 1): always controller
    //   • P1 (slot 0) in 1P mode: keyboard/mouse + controller if slot 0 has one
    //   • P1 (slot 0) in 2P mode: keyboard/mouse ONLY (controller belongs to P2)
    const slot=this.playerSlot||0;
    const is2P=(typeof Game!=='undefined'&&Game.numPlayers===2);
    const useGamepad=(slot===1)||(slot===0&&!is2P&&Gamepads.isConnected(0))||this.useGamepad;
    let dx=0,dy=0;
    if(useGamepad){
      dx=Gamepads.axis(slot,0);dy=Gamepads.axis(slot,1);
      // D-pad fallback
      if(Gamepads.btn(slot,14))dx=-1;
      if(Gamepads.btn(slot,15))dx=1;
      if(Gamepads.btn(slot,12))dy=-1;
      if(Gamepads.btn(slot,13))dy=1;
    }
    // P1 keyboard always works for slot 0 (in addition to controller)
    if(slot===0){
      if(Input.keys['KeyW']||Input.keys['ArrowUp'])dy=-1;
      if(Input.keys['KeyS']||Input.keys['ArrowDown'])dy=1;
      if(Input.keys['KeyA']||Input.keys['ArrowLeft'])dx=-1;
      if(Input.keys['KeyD']||Input.keys['ArrowRight'])dx=1;
    }
    this.moving=!!(dx||dy);
    if(dx||dy){
      const len=Math.sqrt(dx*dx+dy*dy);
      dx/=len;dy/=len;
      this.recentMoveX=dx;this.recentMoveY=dy;
      // footstep dust
      this._stepT=(this._stepT??0)-dt;
      if(this._stepT<=0){
        this._stepT=0.18;
        Particles.spawn(this.x-dx*P_R*0.4,this.y+P_R*0.8,{vx:(Math.random()-.5)*20,vy:-10-Math.random()*15,life:0.5,r:2.5,color:'rgba(180,180,220,0.5)'});
      }
      const nx=this.x+dx*this.effectiveSpeed*dt;
      const ny=this.y+dy*this.effectiveSpeed*dt;
      const obs=collideObstacle(nx,ny,PHYS_R);
      if(!obs){this.x=nx;this.y=ny;}
      else {
        if(!collideObstacle(this.x,ny,PHYS_R))this.y=ny;
        else if(!collideObstacle(nx,this.y,PHYS_R))this.x=nx;

    if(slot===1){

      }
    }
    const w=this.careWeapon||this.weapon;

      if(this.regenTimer<=0){this.regenTimer=this.regenInterval;if(this.hp<this.maxHp){this.hp=Math.min(this.maxHp,this.hp+(this.regenAmt||1));Particles.spawn(this.x,this.y-P_R-6,{vx:0,vy:-40,life:0.5,r:3,color:'#3399ff'});}}
    }
    // ── shield battery ──
    if(this.shieldBat){
      this.shieldBatTimer-=dt;
      if(this.shieldBatTimer<=0){this.shieldBatTimer=60;this.hp=Math.min(this.maxHp,this.hp+this.shieldBatAmount);
        Particles.burst(this.x,this.y,12,{color:'#4488ff',speed:90,life:0.5,r:4});UI.announce(`+${this.shieldBatAmount} HP`,1.2,'#4488ff');}
    }
    // ── bullet storm ──
    if(this.bulletStorm){
      this.bulletStormTimer-=dt;
      if(this.bulletStormTimer<=0){
        this.bulletStormTimer=this.bulletStormInterval;
        // fire at nearest enemy
        let near=null,bestD=Infinity;
        for(const e of Game.enemies){if(!e.alive)continue;const dxx=e.x-this.x,dyy=e.y-this.y,d2=dxx*dxx+dyy*dyy;if(d2<bestD){bestD=d2;near=e;}}
        const ang=near?Math.atan2(near.y-this.y,near.x-this.x):Math.random()*Math.PI*2;
        Bullets.fire(this.x,this.y,ang,this.id,'#ffbb00',Math.round(this.weapon.dmg*0.7*this.dmgMult),{});
      }
    }
    // ── overload ──
    if(this.overload){
      this.overloadTimer-=dt;
      if(this.overloadTimer<=0){
        this.overloadTimer=this.overloadInterval;
        for(let i=0;i<5;i++){
          const ang=Math.random()*Math.PI*2;
          Bullets.fire(this.x,this.y,ang,this.id,'#ff6600',Math.round(this.weapon.dmg*0.6*this.dmgMult),{explosive:false});
        }
      }
    }
    // ── overdrive ──
    if(this.overdrive){
      this.overdriveTimer-=dt;
      if(this.overdriveTimer<=0){
        this.overdriveTimer=this.overdriveInterval;
        this.overdriveActive=2;
        Particles.burst(this.x,this.y,14,{color:'#ffee00',speed:100,life:0.5,r:4});
        UI.announce('OVERDRIVE!',1.2,'#ffee00');
      }
    }
    // ── void shift ──
    if(this.voidShift){
      this.voidTimer-=dt;
      if(this.voidTimer<=0){
        this.voidTimer=this.voidInterval;
        const dist=150;
        const dx=this.recentMoveX||Math.cos(this.aimAngle),dy=this.recentMoveY||Math.sin(this.aimAngle);
        const nx=this.x+dx*dist,ny=this.y+dy*dist;
        const c=clampPoly(nx,ny,P_R);
        Particles.burst(this.x,this.y,10,{color:'#cc44ff',speed:90,life:0.4,r:3});
        this.x=c.x;this.y=c.y;
        Particles.burst(this.x,this.y,10,{color:'#cc44ff',speed:90,life:0.4,r:3});
        this.shieldT=0.3;
      }
    }
    // ── supply drop ──
    if(this.supplyDrop){
      this.supplyTimer-=dt;
      if(this.supplyTimer<=0){
        this.supplyTimer=this.supplyInterval;
        const ang=Math.random()*Math.PI*2,dist=80;
        const cx=this.x+Math.cos(ang)*dist,cy=this.y+Math.sin(ang)*dist;
        const c=clampPoly(cx,cy,16);
        AmmoCrates.list.push({x:c.x,y:c.y,pulse:0});
      }
    }
    // ── drone support ──
    if(this.droneSupport){
      this.droneTimer-=dt;
      if(this.droneTimer<=0){
        this.droneTimer=this.droneInterval;
        // 3 artillery strikes at random enemies
        const alive=Game.enemies.filter(e=>e.alive);
        for(let i=0;i<3;i++){
          let x,y;
          if(alive.length){const t=alive[Math.floor(Math.random()*alive.length)];x=t.x+(Math.random()-.5)*60;y=t.y+(Math.random()-.5)*60;}
          else{x=this.x+(Math.random()-.5)*400;y=this.y+(Math.random()-.5)*400;}
          setTimeout(()=>{
            if(Game.state!=='playing')return;
            Particles.burst(x,y,16,{color:'#ff6600',speed:130,life:0.55,r:5});
            for(const e of Game.enemies){if(!e.alive)continue;const dx2=e.x-x,dy2=e.y-y;if(dx2*dx2+dy2*dy2<70*70)e.takeDamage(5);}
            Camera.shake(3,0.15);
          },200+i*250);
        }
        UI.announce('DRONE STRIKE',1.5,'#44aaff');
      }
    }
    // ── stun grenade ──
    if(this.stunGrenade){
      this.stunGrenTimer-=dt;
      if(this.stunGrenTimer<=0){
        this.stunGrenTimer=this.stunGrenInterval;
        for(const e of Game.enemies){if(!e.alive)continue;const dx2=e.x-this.x,dy2=e.y-this.y;if(dx2*dx2+dy2*dy2<400*400)e.applyStun(2);}
        Effects.add({x:this.x,y:this.y,r:0,life:0.6,maxLife:0.6,
          draw(){const ssx=Camera.sx(this.x),ssy=Camera.sy(this.y),prog=1-this.life/this.maxLife;ctx.globalAlpha=(1-prog)*0.6;ctx.strokeStyle='#22aaff';ctx.lineWidth=3;ctx.beginPath();ctx.arc(ssx,ssy,400*prog,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}});
        UI.announce('STUN GRENADE!',1.2,'#22aaff');
      }
    }
    // ── nano swarm ──
    if(this.nanoSwarm){
      this.nanoTrailT-=dt;
      if(this.nanoTrailT<=0){
        this.nanoTrailT=0.6;
        Effects.add({x:this.x,y:this.y,r:34,life:3,maxLife:3,owner:this,
          update(dt){for(const e of Game.enemies){if(!e.alive)continue;const dxx=e.x-this.x,dyy=e.y-this.y;if(dxx*dxx+dyy*dyy<this.r*this.r)e.applyPoison(this.owner.nanoPower,1);}},
          draw(){const ssx=Camera.sx(this.x),ssy=Camera.sy(this.y),f=this.life/this.maxLife;ctx.globalAlpha=f*0.25;ctx.fillStyle='#88cc22';ctx.beginPath();ctx.arc(ssx,ssy,this.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}});
      }
    }
    // ── energy drain ──
    if(this.energyDrain){
      this.energyDrainTimer-=dt;
      if(this.energyDrainTimer<=0){
        this.energyDrainTimer=1;
        for(const e of Game.enemies){if(!e.alive)continue;const dxx=e.x-this.x,dyy=e.y-this.y;if(dxx*dxx+dyy*dyy<160*160){e.takeDamage(this.energyDrain);if(this.hp<this.maxHp)this.hp=Math.min(this.maxHp,this.hp+0.5);}}
      }
    }
    // turret indicator (aim follows mouse)
  }
  draw(){
    if(!this.alive)return;
    const sx=Camera.sx(this.x),sy=Camera.sy(this.y);
    const fl=this.flashT>0;
    // SWING WEB ROPE - draw before character
    if(this.swinging){
      const sw=this.swinging;
      const ax=Camera.sx(sw.anchorX),ay=Camera.sy(sw.anchorY);
      // anchor sparkle
      ctx.fillStyle='#fff';ctx.shadowColor='#fff';ctx.shadowBlur=10;
      ctx.beginPath();ctx.arc(ax,ay,3.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      // rope (taut white line with subtle glow)
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.shadowColor='#aaccff';ctx.shadowBlur=6;
      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(sx,sy-P_R*0.3);ctx.stroke();
      ctx.shadowBlur=0;
      // little web tip strands at character's hand
      ctx.strokeStyle='rgba(255,255,255,0.55)';ctx.lineWidth=1;
      for(let i=-1;i<=1;i++){const t=Math.atan2(ay-(sy-P_R*0.3),ax-sx)+i*0.18;
        ctx.beginPath();ctx.moveTo(sx,sy-P_R*0.3);ctx.lineTo(sx+Math.cos(t)*6,sy-P_R*0.3+Math.sin(t)*6);ctx.stroke();}
    }
    // Ground shadow ellipse (drawn first so it's beneath the character)
    ctx.save();
    ctx.globalAlpha=0.28;
    const shadowGrad=ctx.createRadialGradient(sx,sy+P_R*0.85,0,sx,sy+P_R*0.85,P_R*0.7);
    shadowGrad.addColorStop(0,'rgba(0,0,0,0.8)');shadowGrad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shadowGrad;
    ctx.beginPath();ctx.ellipse(sx,sy+P_R*0.85,P_R*0.7,P_R*0.22,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    drawCharacter(sx,sy,this.angle,this.aimAngle,fl,this.charDef,null,this.walkT,this.weaponId,this.careWeapon?.type,Math.max(0,this._recoilT||0));
    // hp bar (wider to match larger character)
    const bw=62,bh=6,bx=sx-31,by=sy-P_R-16,p=this.hp/this.maxHp;
    const barColor=p>.5?'#44ee44':p>.25?'#ffaa00':'#ff3333';
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(bx-1,by-1,bw+2,bh+2,3);ctx.fill();
    ctx.fillStyle=barColor;ctx.shadowColor=barColor;ctx.shadowBlur=p<.25?8:0;
    ctx.beginPath();ctx.roundRect(bx,by,Math.max(2,bw*p),bh,2);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,2);ctx.stroke();
    // q active aura
    if(this.qActive&&(this.charId==='revenant')){
      ctx.globalAlpha=0.25+Math.sin(Date.now()*.01)*.15;ctx.fillStyle='#cc0000';ctx.shadowColor='#ff0000';ctx.shadowBlur=20;ctx.beginPath();ctx.arc(sx,sy,P_R*2.2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
    if(this.qActive&&(this.charId==='wraith')){
      ctx.globalAlpha=0.35;ctx.fillStyle='#bb44ff';ctx.shadowColor='#bb44ff';ctx.shadowBlur=18;ctx.beginPath();ctx.arc(sx,sy,P_R*1.7,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
    if(this.shieldT>0){ctx.globalAlpha=Math.min(1,this.shieldT*4)*0.6;ctx.strokeStyle='#6688ff';ctx.lineWidth=2.5;ctx.shadowColor='#6688ff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(sx,sy,P_R+5,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;}
    if(this.overdriveActive>0){ctx.globalAlpha=0.5;ctx.strokeStyle='#ffee00';ctx.lineWidth=2;ctx.beginPath();ctx.arc(sx,sy,P_R+3,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;}
    // cursor
    const mx=Input.mouse.x,my=Input.mouse.y,sz=10,gap=4;
    ctx.strokeStyle=`rgba(${this.careWeapon?'255,221,0':'68,255,136'},0.85)`;ctx.lineWidth=1.5;ctx.shadowColor=this.careWeapon?'#ffdd00':'#44ff88';ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(mx-sz-gap,my);ctx.lineTo(mx-gap,my);ctx.moveTo(mx+gap,my);ctx.lineTo(mx+sz+gap,my);
    ctx.moveTo(mx,my-sz-gap);ctx.lineTo(mx,my-gap);ctx.moveTo(mx,my+gap);ctx.lineTo(mx,my+sz+gap);ctx.stroke();
    ctx.beginPath();ctx.arc(mx,my,2.5,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
  }
}

// ─── SPAWNER ──────────────────────────────────────────────────
const Spawner={
  wave:1,waveTimer:22,spawnTimer:0,waveActive:true,
  get maxEnemies(){
    let mult=(typeof Game!=='undefined'&&Game.numPlayers===2)?2:1;
    // ONLINE: +50% per additional player (1p=1.0, 2p=1.5, 3p=2.0, 4p=2.5)
    if(typeof Game!=='undefined'&&Game.online&&Game.onlineRoster&&Game.onlineRoster.length>1){
      mult=1+0.5*(Game.onlineRoster.length-1);
    }
    const w=this.wave;
    // Steeper difficulty curve: more enemies per wave + bigger jumps past w10/20/30
    let base=26+(w-1)*10;        // was 22+(w-1)*7
    if(w>=10)base+=(w-10)*6;     // was *4
    if(w>=20)base+=(w-20)*9;     // was *6
    if(w>=30)base+=(w-30)*14;    // was *10
    if(w>=40)base+=(w-40)*18;    // NEW: brutal endgame
    return Math.min(650,Math.floor(base*mult*1.15));  // cap was 420, mult was *1.10
  },
  // Faster spawns: floor dropped from 0.25 → 0.15, ramps faster
  get spawnInterval(){return Math.max(0.15,1.6-(this.wave-1)*0.17);},
  _typeWeights(wave){
    // [Jello, Brute, Speeder, Crusher, Splitter, Phantom, Witch, Tomato, Slug, Disco, Pepper]
    if(wave<=1)return[80,0,10,0,0,0,0,10,0,0,0];
    if(wave===2)return[55,10,12,0,0,0,5,10,8,0,0];
    if(wave===3)return[40,15,12,0,5,0,8,10,5,5,0];
    if(wave===4)return[35,15,12,5,5,0,10,8,5,5,0];
    if(wave===5)return[25,12,12,7,7,0,10,8,8,6,5];
    if(wave===6)return[22,12,11,8,7,4,10,8,7,6,5];
    if(wave===7)return[20,11,11,9,8,5,10,7,7,6,6];
    if(wave<=9)return[18,11,11,10,9,6,10,6,6,6,7];
    return[15,10,10,11,10,8,10,5,5,8,8];
  },
  _pick(wave){
    const w=this._typeWeights(wave);const total=w.reduce((a,b)=>a+b,0);
    let r=Math.random()*total;
    const types=[Jello,Brute,Speeder,Crusher,Splitter,Phantom,Witch,Tomato,BananaSlug,DiscoZombie,GhostPepper];
    for(let i=0;i<types.length;i++){r-=w[i];if(r<=0)return types[i];}
    return Jello;
  },
  update(dt,enemies,player){
    this.waveTimer-=dt;
    if(this.waveTimer<=0){
      this.wave++;this.waveTimer=Math.max(12,22-Math.floor(this.wave/3));  // shorter breaks as waves progress
      // BOSS WAVE every 10
      // Perfect-wave bonus check: if previous wave had no damage, award 1 bird
      if(Game._lastWaveCounted&&Game._lastWaveCounted<this.wave&&!Game._waveDamageTaken){
        Save.addBirds(1);UI.announce('★ PERFECT WAVE · +1 BIRD 🐦',2.5,'#ffdd66');AudioManager.play('ult_ready');
      }
      Game._waveDamageTaken=false;Game._lastWaveCounted=this.wave;
      Save.setMaxStat('highestWave',this.wave);
      if(this.wave%10===0){
        // Unique boss every 10th wave — variants cycle and stack at higher waves
        const variants=[
          {id:'queen',name:'PINK QUEEN',color:'#cc0066',accent:'#ff44aa',hpMult:1.0,dmgMult:1.0,speedMult:1.0},
          {id:'void',name:'VOID HUNTER',color:'#6622aa',accent:'#aa44ff',hpMult:1.15,dmgMult:1.10,speedMult:1.25,teleport:true},
          {id:'inferno',name:'INFERNAL TITAN',color:'#cc3300',accent:'#ff8822',hpMult:1.35,dmgMult:1.25,speedMult:0.85,burnTrail:true},
          {id:'frost',name:'ICE WARDEN',color:'#3388cc',accent:'#88ddff',hpMult:1.20,dmgMult:1.15,speedMult:0.95,slowAura:true},
          {id:'storm',name:'STORMCALLER',color:'#ddaa22',accent:'#ffee44',hpMult:1.25,dmgMult:1.20,speedMult:1.10,lightning:true},
        ];
        const variant=variants[Math.floor(this.wave/10-1)%variants.length];
        UI.announce(`★ ${variant.name} · WAVE ${this.wave} ★`,4,variant.accent);
        Camera.shake(10,0.7);
        AudioManager.play('boss_spawn');
        const a=Math.random()*Math.PI*2,d=380;
        let bx=player.x+Math.cos(a)*d,by=player.y+Math.sin(a)*d;
        const c=clampPoly(bx,by,50);
        const boss=new Boss(c.x,c.y,this.wave);
        boss._spawnT=performance.now()/1000;
        // Apply variant
        boss.variant=variant;
        boss.color=variant.color;
        boss.maxHp=Math.floor(boss.maxHp*variant.hpMult*(1+Math.floor(this.wave/50)*0.5));
        boss.hp=boss.maxHp;
        boss.contactDmg=Math.floor(boss.contactDmg*variant.dmgMult);
        boss.speed=Math.floor(boss.speed*variant.speedMult);
        // Apply post-wave-30 boss evolution modifiers
        BossEvo.apply(boss,this.wave);
        enemies.push(boss);
        // BOSS-ONLY WAVE — block other spawns until boss dies
        this.bossWaveActive=true;
        this.activeBoss=boss;
      } else if(this.wave%5===0){
        // MINI-BOSS WAVE (every 5th, but not 10th — those are full bosses)
        UI.announce(`☠ MINI-BOSS WAVE ${this.wave} ☠`,3.5,'#ff8844');
        Camera.shake(5,0.4);AudioManager.play('boss_spawn');
        const a=Math.random()*Math.PI*2,d=320;
        let mx=player.x+Math.cos(a)*d,my=player.y+Math.sin(a)*d;
        const c=clampPoly(mx,my,40);
        // Pick a random normal enemy type and apply mini-boss modifiers
        const C=this._pick(this.wave);
        const mini=new C(c.x,c.y,this.wave);
        MiniBoss.apply(mini,this.wave);
        enemies.push(mini);
        // Maybe trigger random event between waves (15% chance)
        const ev=RandomEvents.maybeRoll();if(ev)setTimeout(()=>{if(Game.state==='playing')RandomEvents.triggerEvent(ev);},800);
      } else {
        // Difficulty tag — gets scarier with wave
        const _D=_waveDifficulty(this.wave);
        const _dPct=Math.round((_D.hp*_D.dmg-1)*100);
        const _tag=this.wave<5?'':this.wave<10?` · +${_dPct}% TOUGHER`:this.wave<20?` · ⚠ +${_dPct}%`:this.wave<30?` · ☠ +${_dPct}%`:` · 💀 +${_dPct}%`;
        const _col=this.wave<10?'#44ffff':this.wave<20?'#ffaa44':this.wave<30?'#ff6644':'#ff2244';
        UI.announce(`WAVE ${this.wave}${_tag}`,2.5,_col);
        AudioManager.play('wave_start');
        // Maybe trigger random event
        const ev=RandomEvents.maybeRoll();if(ev)setTimeout(()=>{if(Game.state==='playing')RandomEvents.triggerEvent(ev);},800);
        // Perfect wave count for achievement
        if(!Game._waveDamageTaken)Save.bumpStat('perfectWaves',1);
      }
      // spawn health orb every wave
      if(this.wave>Game.lastHealWave){
        Game.lastHealWave=this.wave;
        let hx,hy,tries=0;
        do{hx=300+Math.random()*(ARENA-600);hy=300+Math.random()*(ARENA-600);tries++;}
        while((!polyContains(hx,hy)||collideObstacle(hx,hy,16))&&tries<25);
        Game.healthOrbs.push({x:hx,y:hy,bobT:0,heal:25});
      }
      if(player.waveHeal>0){player.hp=Math.min(player.maxHp,player.hp+player.waveHeal);Particles.burst(player.x,player.y,12,{color:'#44ffcc',speed:80,life:0.5,r:3});}
      player.frenzyStacks=0;
      const _coopMult=(Game.numPlayers===2)?2:1;
      // per-wave extras — +10% on top of previous
      let extraBase=this.wave%10===0?0:Math.floor(this.wave/2)+5;
      if(this.wave>=20)extraBase+=Math.floor((this.wave-20)/2);
      if(this.wave>=30)extraBase+=Math.floor((this.wave-30)*0.9);
      const extra=Math.floor(extraBase*1.375)*_coopMult;
      // Boss waves: skip all extras (boss-only fight)
      if(!this.bossWaveActive){
        for(let i=0;i<extra;i++)this._doSpawn(enemies,player);
      }
    }
    // Clear boss-wave flag when the boss dies
    if(this.bossWaveActive&&this.activeBoss&&!this.activeBoss.alive){
      this.bossWaveActive=false;this.activeBoss=null;
    }
    const alive=enemies.filter(e=>e.alive).length;
    // Boss-only waves: prevent any regular spawns
    if(!this.bossWaveActive&&alive<this.maxEnemies){
      this.spawnTimer-=dt;
      if(this.spawnTimer<=0){this.spawnTimer=this.spawnInterval;this._doSpawn(enemies,player);}
    }
  },
  _doSpawn(enemies,player){
    let x,y,tries=0;
    do{
      const side=Math.floor(Math.random()*4),m=80;
      if(side===0){x=m+Math.random()*(ARENA-m*2);y=m;}
      else if(side===1){x=m+Math.random()*(ARENA-m*2);y=ARENA-m;}
      else if(side===2){x=m;y=m+Math.random()*(ARENA-m*2);}
      else{x=ARENA-m;y=m+Math.random()*(ARENA-m*2);}
      tries++;
    }while((!polyContains(x,y)||(player.x-x)**2+(player.y-y)**2<260*260||collideObstacle(x,y,30))&&tries<15);
    const C=this._pick(this.wave);
    // spawn warning effect
    Effects.add({x,y,r:30,life:0.5,maxLife:0.5,_C:C,_wave:this.wave,
      draw(){const sx=Camera.sx(this.x),sy=Camera.sy(this.y),f=1-this.life/this.maxLife;
        ctx.globalAlpha=(1-f)*0.7;ctx.strokeStyle='#ff4444';ctx.lineWidth=2;ctx.shadowColor='#ff4444';ctx.shadowBlur=10;
        ctx.beginPath();ctx.arc(sx,sy,this.r*(1+f*0.5),0,Math.PI*2);ctx.stroke();
        ctx.beginPath();ctx.arc(sx,sy,this.r*0.4,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;},
      onExpire(){const e=new this._C(this.x,this.y,this._wave);Elites.maybeApply(e);Game.enemies.push(e);}});
  },
  reset(){this.wave=1;this.waveTimer=22;this.spawnTimer=0;this.bossWaveActive=false;this.activeBoss=null;}
};

const Themes={
  current:'default',
  list(){return ['jungle','ice','cyber','volcano','space'];},
  pickRandom(exclude){
    // pick random theme, optionally excluding one (used when boss changes map)
    let opts=this.list();
    if(exclude)opts=opts.filter(t=>t!==exclude);
    return opts[Math.floor(Math.random()*opts.length)];
  },
  pickForRun(){
    const opts=this.list();
    this.current=opts[Math.floor(Math.random()*opts.length)];
    // reset all decor caches so it draws fresh
    window._stars=null;window._jungleDecor=null;window._iceDecor=null;window._snowflakes=null;window._cyberLines=null;window._volcanoDecor=null;window._lavaParticles=null;window._spaceDecor=null;window._spaceNebula=null;window._shootingStars=null;window._decals=null;
    return this.current;
  },
  // Switch theme mid-run (e.g., after boss kill)
  switchTo(newTheme){
    if(!THEMES[newTheme])return;
    this.current=newTheme;
    window._stars=null;window._jungleDecor=null;window._iceDecor=null;window._snowflakes=null;window._cyberLines=null;window._volcanoDecor=null;window._lavaParticles=null;window._spaceDecor=null;window._spaceNebula=null;window._shootingStars=null;window._decals=null;

  get(){return THEMES[this.current]||THEMES.default;}
};

function drawArena(){
  const TH=Themes.get();
  // bg gradient (vignette)
  const bg=ctx.createRadialGradient(canvas.width/2,canvas.height/2,200,canvas.width/2,canvas.height/2,Math.max(canvas.width,canvas.height));
  bg.addColorStop(0,TH.bgInner);bg.addColorStop(1,TH.bgOuter);

  // very faint outside grid
  ctx.strokeStyle=TH.gridFaint;ctx.lineWidth=1;
  const ox=(-Camera.x)%GRID,oy=(-Camera.y)%GRID;
  for(let x=ox;x<canvas.width;x+=GRID){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}

  // polygon clip
  ctx.save();
  ctx.beginPath();
  POLY.forEach(([x,y],i)=>{const sx=x-Camera.x,sy=y-Camera.y;if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);});
  ctx.closePath();
  // floor gradient
  const cx=Camera.sx(ARENA/2),cy=Camera.sy(ARENA/2);
  const fg=ctx.createRadialGradient(cx,cy,200,cx,cy,1600);
  fg.addColorStop(0,TH.floorInner);fg.addColorStop(0.5,TH.floorMid);fg.addColorStop(1,TH.floorOuter);
  ctx.fillStyle=fg;ctx.fill();
  ctx.clip();
  // theme decor inside clip
  _drawThemeDecor(TH);
  // inner grid
  ctx.strokeStyle=TH.gridInner;ctx.lineWidth=1;
  for(let x=ox;x<canvas.width;x+=GRID){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvas.height);ctx.stroke();}
  for(let y=oy;y<canvas.height;y+=GRID){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvas.width,y);ctx.stroke();}
  // major grid lines (every 4)
  ctx.strokeStyle=TH.gridMajor;ctx.lineWidth=1.5;
  const bigGrid=GRID*4;

  // center pad glow
  const padG=ctx.createRadialGradient(cx,cy,40,cx,cy,360);

  // center hexagon marker
  ctx.strokeStyle='rgba(120,100,220,0.20)';ctx.lineWidth=2;ctx.beginPath();
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2;const px=cx+Math.cos(a)*50,py=cy+Math.sin(a)*50;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);}
  ctx.closePath();ctx.stroke();
  // obstacles
  OBSTACLES.forEach(o=>{
    const sx=Camera.sx(o.x),sy=Camera.sy(o.y);
    if(sx<-100||sx>canvas.width+100||sy<-100||sy>canvas.height+100)return;
    // Long soft drop shadow
    const shG=ctx.createRadialGradient(sx+3,sy+7,o.w*0.2,sx+3,sy+7,o.w*0.9);
    shG.addColorStop(0,'rgba(0,0,0,0.55)');shG.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=shG;
    ctx.beginPath();ctx.roundRect(sx-o.w/2+3,sy-o.h/2+7,o.w,o.h,3);ctx.fill();
    if(o.kind==='crate'){
      // base wood with vertical gradient (top light → bottom dark)
      const wG=ctx.createLinearGradient(sx,sy-o.h/2,sx,sy+o.h/2);
      wG.addColorStop(0,'#5a3e1c');
      wG.addColorStop(0.5,'#3e2a14');
      wG.addColorStop(1,'#1f140a');
      ctx.fillStyle=wG;
      ctx.beginPath();ctx.roundRect(sx-o.w/2,sy-o.h/2,o.w,o.h,3);ctx.fill();
      // wood plank seams (horizontal)
      ctx.strokeStyle='rgba(20,12,5,0.7)';ctx.lineWidth=1.2;
      const gr=o.h/4;
      for(let gi=1;gi<4;gi++){const gy=sy-o.h/2+gi*gr;ctx.beginPath();ctx.moveTo(sx-o.w/2+3,gy);ctx.lineTo(sx+o.w/2-3,gy);ctx.stroke();}
      // wood grain highlights (subtle horizontal scratches)
      ctx.strokeStyle='rgba(140,95,40,0.22)';ctx.lineWidth=0.8;
      for(let gi=0;gi<4;gi++){
        const gy=sy-o.h/2+gi*gr+gr*0.4;
        ctx.beginPath();ctx.moveTo(sx-o.w/2+4,gy);ctx.lineTo(sx-o.w/2+o.w*0.5,gy);ctx.stroke();
      }
      // top-edge highlight (light catches top)
      const topG=ctx.createLinearGradient(sx,sy-o.h/2,sx,sy-o.h/2+5);
      topG.addColorStop(0,'rgba(200,150,80,0.45)');topG.addColorStop(1,'rgba(200,150,80,0)');
      ctx.fillStyle=topG;ctx.beginPath();ctx.roundRect(sx-o.w/2+1,sy-o.h/2,o.w-2,5,2);ctx.fill();
      // metal banding (top and bottom)
      const bandG=ctx.createLinearGradient(sx,0,sx,4);
      ctx.strokeStyle='#a08040';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.roundRect(sx-o.w/2,sy-o.h/2,o.w,o.h,3);ctx.stroke();
      // corner rivets (4 small bright dots)
      ctx.fillStyle='#ffd060';ctx.shadowColor='#ffd060';ctx.shadowBlur=4;
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([dx,dy])=>{
        ctx.beginPath();ctx.arc(sx+dx*(o.w/2-5),sy+dy*(o.h/2-5),1.6,0,Math.PI*2);ctx.fill();
      });
      ctx.shadowBlur=0;
      // center cross-strap
      ctx.strokeStyle='rgba(100,75,20,0.7)';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(sx-o.w/2,sy);ctx.lineTo(sx+o.w/2,sy);ctx.moveTo(sx,sy-o.h/2);ctx.lineTo(sx,sy+o.h/2);ctx.stroke();
    } else {
      // concrete barrier with vertical gradient
      const cgG=ctx.createLinearGradient(sx,sy-o.h/2,sx,sy+o.h/2);
      cgG.addColorStop(0,'#3a3a52');
      cgG.addColorStop(0.5,'#252535');
      cgG.addColorStop(1,'#15151f');
      ctx.fillStyle=cgG;
      ctx.beginPath();ctx.roundRect(sx-o.w/2,sy-o.h/2,o.w,o.h,4);ctx.fill();
      // hazard diagonal stripes (clipped to shape)
      ctx.save();ctx.beginPath();ctx.roundRect(sx-o.w/2+1,sy-o.h/2+1,o.w-2,o.h-2,3);ctx.clip();
      ctx.strokeStyle='rgba(255,165,20,0.28)';ctx.lineWidth=6;
      for(let si=-o.w;si<o.w+o.h;si+=14){ctx.beginPath();ctx.moveTo(sx-o.w/2+si,sy-o.h/2);ctx.lineTo(sx-o.w/2+si-o.h,sy+o.h/2);ctx.stroke();}
      ctx.restore();
      // warning stripe band (bright orange with sheen)
      const wsG=ctx.createLinearGradient(sx,sy-3,sx,sy+2);
      wsG.addColorStop(0,'rgba(255,200,80,0.85)');
      wsG.addColorStop(0.5,'rgba(255,160,20,0.85)');
      wsG.addColorStop(1,'rgba(180,90,10,0.85)');
      ctx.fillStyle=wsG;ctx.beginPath();ctx.roundRect(sx-o.w/2,sy-3,o.w,5,2);ctx.fill();
      // top edge specular
      const tsG=ctx.createLinearGradient(sx,sy-o.h/2,sx,sy-o.h/2+4);
      tsG.addColorStop(0,'rgba(255,255,255,0.30)');tsG.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=tsG;ctx.beginPath();ctx.roundRect(sx-o.w/2+1,sy-o.h/2,o.w-2,4,3);ctx.fill();
      // bolt heads at corners
      ctx.fillStyle='#1a1a26';
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([dx,dy])=>{
        ctx.beginPath();ctx.arc(sx+dx*(o.w/2-5),sy+dy*(o.h/2-5),2.2,0,Math.PI*2);ctx.fill();
      });
      ctx.fillStyle='rgba(255,255,255,0.25)';
      [[-1,-1],[1,-1],[-1,1],[1,1]].forEach(([dx,dy])=>{
        ctx.beginPath();ctx.arc(sx+dx*(o.w/2-5)-0.6,sy+dy*(o.h/2-5)-0.6,0.9,0,Math.PI*2);ctx.fill();
      });
      ctx.strokeStyle='#3a3a50';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(sx-o.w/2,sy-o.h/2,o.w,o.h,4);ctx.stroke();
    }
  });
  ctx.restore();
  // polygon border - layered glow
  ctx.beginPath();
  POLY.forEach(([x,y],i)=>{const sx=x-Camera.x,sy=y-Camera.y;if(i===0)ctx.moveTo(sx,sy);else ctx.lineTo(sx,sy);});
  ctx.closePath();
  ctx.strokeStyle=TH.borderGlow;ctx.lineWidth=10;ctx.stroke();
  ctx.strokeStyle=TH.borderColor;ctx.lineWidth=3.5;ctx.shadowColor=TH.borderColor;ctx.shadowBlur=14;ctx.stroke();
  ctx.strokeStyle='#ccddff';ctx.lineWidth=1;ctx.shadowBlur=0;ctx.stroke();
  // corner accents
  POLY.forEach(([x,y])=>{
    const sx=x-Camera.x,sy=y-Camera.y;
    if(sx<-30||sx>canvas.width+30||sy<-30||sy>canvas.height+30)return;
    ctx.fillStyle=TH.cornerColor;ctx.shadowColor=TH.borderColor;ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(sx,sy,4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
  });
  // floor decorations (cracks, scorch marks - generated once, persistent)
  if(!window._decals){window._decals=[];
    for(let i=0;i<32;i++){
      let x,y,tries=0;
      do{x=Math.random()*ARENA;y=Math.random()*ARENA;tries++;}while(!polyContains(x,y)&&tries<10);
      window._decals.push({x,y,type:Math.random()<0.5?'crack':'scorch',rot:Math.random()*Math.PI*2,sz:8+Math.random()*14});
    }}
  window._decals.forEach(d=>{
    const sx=Camera.sx(d.x),sy=Camera.sy(d.y);
    if(sx<-30||sx>canvas.width+30||sy<-30||sy>canvas.height+30)return;
    ctx.save();ctx.translate(sx,sy);ctx.rotate(d.rot);
    if(d.type==='crack'){ctx.strokeStyle='rgba(40,40,80,0.6)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(-d.sz,0);ctx.lineTo(d.sz*0.3,d.sz*0.2);ctx.lineTo(d.sz*0.5,-d.sz*0.4);ctx.lineTo(d.sz,d.sz*0.1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(d.sz*0.2,d.sz*0.7);ctx.stroke();
    } else {
      ctx.fillStyle='rgba(20,20,40,0.6)';ctx.beginPath();ctx.ellipse(0,0,d.sz,d.sz*0.7,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(40,15,5,0.5)';ctx.beginPath();ctx.ellipse(0,0,d.sz*0.7,d.sz*0.5,0,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
  // ambient floating dust motes with twinkle
  if(!window._dust){window._dust=[];for(let i=0;i<32;i++)window._dust.push({x:Math.random()*ARENA,y:Math.random()*ARENA,vx:(Math.random()-.5)*10,vy:(Math.random()-.5)*10,a:0.1+Math.random()*0.2,t:Math.random()*10});}
  window._dust.forEach(d=>{d.x+=d.vx*0.016;d.y+=d.vy*0.016;d.t+=0.05;if(d.x<0)d.x+=ARENA;if(d.x>ARENA)d.x-=ARENA;if(d.y<0)d.y+=ARENA;if(d.y>ARENA)d.y-=ARENA;const sx=Camera.sx(d.x),sy=Camera.sy(d.y);if(sx<-20||sx>canvas.width+20||sy<-20||sy>canvas.height+20)return;if(!polyContains(d.x,d.y))return;const tw=0.5+Math.sin(d.t)*0.5;ctx.fillStyle=`rgba(140,180,255,${d.a*tw})`;ctx.beginPath();ctx.arc(sx,sy,1.4,0,Math.PI*2);ctx.fill();});
  // distant background sparkles (stars)
  if(!window._stars){window._stars=[];const sc=TH.starColors;for(let i=0;i<40;i++)window._stars.push({x:Math.random()*ARENA,y:Math.random()*ARENA,c:Math.random()<0.7?sc[0]:sc[1],t:Math.random()*Math.PI*2});}
  window._stars.forEach(s=>{s.t+=0.03;const sx=Camera.sx(s.x),sy=Camera.sy(s.y);if(sx<-10||sx>canvas.width+10||sy<-10||sy>canvas.height+10)return;if(!polyContains(s.x,s.y))return;const a=0.3+Math.sin(s.t)*0.3;ctx.globalAlpha=a;ctx.fillStyle=s.c;ctx.shadowColor=s.c;ctx.shadowBlur=4;ctx.beginPath();ctx.arc(sx,sy,1.2,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;ctx.globalAlpha=1;});
  // vignette overlay
