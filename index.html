  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,0.55)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,canvas.width,canvas.height);
}

// Theme-specific scenery decor inside the arena clip
function _drawThemeDecor(TH){
  if(TH.decor==='jungle'){
    if(!window._jungleDecor){window._jungleDecor=[];
      for(let i=0;i<30;i++){const x=Math.random()*ARENA,y=Math.random()*ARENA;if(polyContains(x,y))window._jungleDecor.push({x,y,type:Math.random()<0.6?'fern':'leaf',rot:Math.random()*Math.PI*2,sz:14+Math.random()*18});}
    }
    for(const d of window._jungleDecor){const sx=Camera.sx(d.x),sy=Camera.sy(d.y);
      if(sx<-40||sx>canvas.width+40||sy<-40||sy>canvas.height+40)continue;
      ctx.save();ctx.translate(sx,sy);ctx.rotate(d.rot);
      if(d.type==='fern'){
        ctx.strokeStyle='rgba(50,140,50,0.4)';ctx.lineWidth=2.5;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(0,d.sz);ctx.lineTo(0,-d.sz);ctx.stroke();
        for(let k=-1;k<=1;k+=2){for(let s=0;s<5;s++){const py=-d.sz+s*d.sz/2.5;
          ctx.beginPath();ctx.moveTo(0,py);ctx.quadraticCurveTo(k*d.sz*0.4,py-2,k*d.sz*0.6,py-d.sz*0.2);ctx.stroke();}}
      } else {
        ctx.fillStyle='rgba(60,160,60,0.35)';ctx.shadowColor='rgba(40,100,40,0.4)';ctx.shadowBlur=4;
        ctx.beginPath();ctx.ellipse(0,0,d.sz*0.6,d.sz,0,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
        ctx.strokeStyle='rgba(30,80,30,0.5)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(0,-d.sz);ctx.lineTo(0,d.sz);ctx.stroke();
      }
      ctx.restore();
    }
  } else if(TH.decor==='ice'){
    if(!window._iceDecor){window._iceDecor=[];
      for(let i=0;i<28;i++){const x=Math.random()*ARENA,y=Math.random()*ARENA;if(polyContains(x,y))window._iceDecor.push({x,y,type:Math.random()<0.5?'flake':'shard',rot:Math.random()*Math.PI*2,sz:10+Math.random()*14});}
      // falling snow particles (global, persistent positions)
      window._snowflakes=[];for(let i=0;i<40;i++)window._snowflakes.push({x:Math.random()*ARENA,y:Math.random()*ARENA,vx:(Math.random()-.5)*8,vy:10+Math.random()*15,t:Math.random()*Math.PI*2});
    }
    // ice shards / snowflakes static
    for(const d of window._iceDecor){const sx=Camera.sx(d.x),sy=Camera.sy(d.y);
      if(sx<-40||sx>canvas.width+40||sy<-40||sy>canvas.height+40)continue;
      ctx.save();ctx.translate(sx,sy);ctx.rotate(d.rot);
      if(d.type==='shard'){
        ctx.fillStyle='rgba(180,220,240,0.30)';ctx.shadowColor='#aaddff';ctx.shadowBlur=6;
        ctx.beginPath();ctx.moveTo(0,-d.sz);ctx.lineTo(d.sz*0.35,d.sz*0.4);ctx.lineTo(-d.sz*0.35,d.sz*0.4);ctx.closePath();ctx.fill();
        ctx.strokeStyle='rgba(220,240,255,0.6)';ctx.lineWidth=1;ctx.stroke();
        ctx.shadowBlur=0;
      } else {
        // snowflake symbol
        ctx.strokeStyle='rgba(220,240,255,0.35)';ctx.lineWidth=1;
        for(let k=0;k<6;k++){const a=k*Math.PI/3;
          ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*d.sz*0.7,Math.sin(a)*d.sz*0.7);ctx.stroke();}
      }
      ctx.restore();
    }
    // animated falling snow
    const now=performance.now()/1000;
    for(const f of window._snowflakes){
      f.y+=f.vy*0.016;f.x+=f.vx*0.016+Math.sin(now+f.t)*0.3;
      if(f.y>ARENA)f.y=0;
      const sx=Camera.sx(f.x),sy=Camera.sy(f.y);
      if(sx<0||sx>canvas.width||sy<0||sy>canvas.height)continue;
      ctx.globalAlpha=0.7;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(sx,sy,1.6,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
  } else if(TH.decor==='cyber'){
    // neon parallel lines (circuit board feel)
    if(!window._cyberLines){window._cyberLines=[];
      for(let i=0;i<14;i++)window._cyberLines.push({x:Math.random()*ARENA,y:Math.random()*ARENA,len:80+Math.random()*200,vertical:Math.random()<0.5,c:Math.random()<0.5?'#ff44dd':'#44ddff'});}
    for(const l of window._cyberLines){const sx=Camera.sx(l.x),sy=Camera.sy(l.y);
      if(sx<-200||sx>canvas.width+200||sy<-200||sy>canvas.height+200)continue;
      ctx.strokeStyle=l.c;ctx.globalAlpha=0.18;ctx.lineWidth=1.5;ctx.shadowColor=l.c;ctx.shadowBlur=6;
      ctx.beginPath();
      if(l.vertical){ctx.moveTo(sx,sy);ctx.lineTo(sx,sy+l.len);}
      else {ctx.moveTo(sx,sy);ctx.lineTo(sx+l.len,sy);}
      ctx.stroke();
      // small node dots
      ctx.fillStyle=l.c;ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();
      if(l.vertical){ctx.beginPath();ctx.arc(sx,sy+l.len,2,0,Math.PI*2);ctx.fill();}
      else {ctx.beginPath();ctx.arc(sx+l.len,sy,2,0,Math.PI*2);ctx.fill();}
      ctx.shadowBlur=0;ctx.globalAlpha=1;
    }
    // scanline sweep
    const t=performance.now()/40;
    const scY=((t)%(canvas.height*1.5))-canvas.height*0.25;
    const grad=ctx.createLinearGradient(0,scY-20,0,scY+20);
    grad.addColorStop(0,'rgba(255,68,221,0)');grad.addColorStop(0.5,'rgba(255,68,221,0.10)');grad.addColorStop(1,'rgba(255,68,221,0)');
    ctx.fillStyle=grad;ctx.fillRect(0,scY-20,canvas.width,40);
  } else if(TH.decor==='volcano'){
    // Static cracks + lava pools + drifting embers
    if(!window._volcanoDecor){window._volcanoDecor=[];
      for(let i=0;i<22;i++){const x=Math.random()*ARENA,y=Math.random()*ARENA;if(polyContains(x,y))window._volcanoDecor.push({x,y,type:Math.random()<0.4?'pool':'crack',rot:Math.random()*Math.PI*2,sz:18+Math.random()*22});}
      window._lavaParticles=[];for(let i=0;i<35;i++)window._lavaParticles.push({x:Math.random()*ARENA,y:Math.random()*ARENA,vy:-(10+Math.random()*30),life:Math.random()*4,sz:1.5+Math.random()*2});
    }
    // lava cracks + pools (static)
    for(const d of window._volcanoDecor){const sx=Camera.sx(d.x),sy=Camera.sy(d.y);
      if(sx<-60||sx>canvas.width+60||sy<-60||sy>canvas.height+60)continue;
      ctx.save();ctx.translate(sx,sy);ctx.rotate(d.rot);
      if(d.type==='pool'){
        const t=performance.now()/600;
        ctx.shadowColor='#ff4400';ctx.shadowBlur=14;
        ctx.fillStyle=`rgba(255,${100+Math.sin(t)*40},20,0.50)`;
        ctx.beginPath();ctx.ellipse(0,0,d.sz*0.9,d.sz*0.55,0,0,Math.PI*2);ctx.fill();
        ctx.fillStyle='#ffaa44';ctx.shadowBlur=8;
        ctx.beginPath();ctx.ellipse(0,0,d.sz*0.4,d.sz*0.22,0,0,Math.PI*2);ctx.fill();
        ctx.shadowBlur=0;
      } else {
        // glowing crack
        ctx.strokeStyle='rgba(255,80,20,0.55)';ctx.lineWidth=2.5;ctx.shadowColor='#ff3300';ctx.shadowBlur=10;
        ctx.beginPath();ctx.moveTo(-d.sz,0);ctx.quadraticCurveTo(0,(Math.random()-.5)*d.sz*0.4,d.sz,0);ctx.stroke();
        ctx.strokeStyle='rgba(255,180,40,0.8)';ctx.lineWidth=1;
        ctx.beginPath();ctx.moveTo(-d.sz,0);ctx.lineTo(d.sz,0);ctx.stroke();
        ctx.shadowBlur=0;
      }
      ctx.restore();
    }
    // rising ember particles
    for(const e of window._lavaParticles){
      e.y+=e.vy*0.016;e.life-=0.016;
      if(e.life<=0||e.y<0){e.y=ARENA-50;e.life=2+Math.random()*3;e.x=Math.random()*ARENA;}
      const sx=Camera.sx(e.x),sy=Camera.sy(e.y);
      if(sx<0||sx>canvas.width||sy<0||sy>canvas.height)continue;
      ctx.globalAlpha=Math.min(1,e.life)*0.85;ctx.fillStyle='#ff6611';ctx.shadowColor='#ff4400';ctx.shadowBlur=8;
      ctx.beginPath();ctx.arc(sx,sy,e.sz,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
  } else if(TH.decor==='space'){
    // dense star field + nebula clouds + shooting stars
    if(!window._spaceDecor){window._spaceDecor=[];
      for(let i=0;i<120;i++){const x=Math.random()*ARENA,y=Math.random()*ARENA;if(polyContains(x,y))window._spaceDecor.push({x,y,sz:0.8+Math.random()*1.8,t:Math.random()*Math.PI*2,c:Math.random()<0.7?'#ffffff':(Math.random()<0.5?'#aaeeff':'#ffccff')});}
      window._spaceNebula=[];for(let i=0;i<6;i++){const x=Math.random()*ARENA,y=Math.random()*ARENA;if(polyContains(x,y))window._spaceNebula.push({x,y,sz:120+Math.random()*180,c:['rgba(150,100,255,0.10)','rgba(255,100,200,0.08)','rgba(100,200,255,0.10)'][Math.floor(Math.random()*3)]});}
      window._shootingStars=[];for(let i=0;i<3;i++)window._shootingStars.push({x:Math.random()*ARENA,y:Math.random()*ARENA,vx:200+Math.random()*100,vy:50+Math.random()*30,life:Math.random()*5,len:60});
    }
    // nebula clouds (bottom layer)
    for(const n of window._spaceNebula){const sx=Camera.sx(n.x),sy=Camera.sy(n.y);
      if(sx<-n.sz||sx>canvas.width+n.sz||sy<-n.sz||sy>canvas.height+n.sz)continue;
      const grad=ctx.createRadialGradient(sx,sy,0,sx,sy,n.sz);
      grad.addColorStop(0,n.c);grad.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=grad;ctx.fillRect(sx-n.sz,sy-n.sz,n.sz*2,n.sz*2);
    }
    // twinkling stars
    for(const s of window._spaceDecor){s.t+=0.03;
      const sx=Camera.sx(s.x),sy=Camera.sy(s.y);
      if(sx<0||sx>canvas.width||sy<0||sy>canvas.height)continue;
      const a=0.5+Math.sin(s.t)*0.4;
      ctx.globalAlpha=a;ctx.fillStyle=s.c;ctx.shadowColor=s.c;ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(sx,sy,s.sz,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;ctx.shadowBlur=0;
    }
    // shooting stars
    for(const ss of window._shootingStars){
      ss.x+=ss.vx*0.016;ss.y+=ss.vy*0.016;ss.life-=0.016;
      if(ss.life<=0||ss.x>ARENA){ss.x=-100;ss.y=Math.random()*ARENA;ss.life=2+Math.random()*4;}
      if(ss.life<3){
        const sx=Camera.sx(ss.x),sy=Camera.sy(ss.y);
        if(sx>-100&&sx<canvas.width+100&&sy>-100&&sy<canvas.height+100){
          ctx.save();ctx.globalCompositeOperation='lighter';
          ctx.strokeStyle='rgba(255,255,255,0.8)';ctx.lineWidth=2;ctx.shadowColor='#fff';ctx.shadowBlur=10;
          ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx-ss.vx*0.15,sy-ss.vy*0.15);ctx.stroke();
          ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,2,0,Math.PI*2);ctx.fill();
          ctx.restore();ctx.shadowBlur=0;
        }
      }
    }
  }
}

// ─── UI ──────────────────────────────────────────────────────
const UI={
  _killFeed:[],_announce:null,_charHover:-1,_weapHover:-1,_cheatInput:'',_cheatFocus:false,
  _drawCheatBar(){
    const bx=24,by=108,bw=200,bh=32;
    this.panel(bx,by,bw,bh,8);
    ctx.fillStyle='#666';ctx.font='9px monospace';ctx.textAlign='left';
    ctx.fillText('CHEAT CODE',bx+8,by+12);
    ctx.fillStyle=this._cheatFocus?'#88ff44':'#aaa';ctx.font='bold 14px monospace';
    const txt=this._cheatInput||(this._cheatFocus?'_':'click to type...');
    ctx.fillText(txt,bx+8,by+28);
    // outline if focused
    if(this._cheatFocus){ctx.strokeStyle='#88ff44';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,8);ctx.stroke();}
  },
  hitCheatBar(mx,my){const bx=24,by=108,bw=200,bh=32;return mx>=bx&&mx<=bx+bw&&my>=by&&my<=by+bh;},
  tryCheat(code){
    if(code==='772'){
      // unlock everything: chars, weapons, ALL pets, currencies
      Object.keys(CHAR_DEFS).forEach(id=>Save.unlockChar(id));
      Object.keys(WEAPON_DEFS).forEach(id=>Save.unlockWeapon(id));
      // Pets
      if(!Save.data.pets)Save.data.pets={unlocked:{},selected:null};
      if(!Save.data.pets.unlocked)Save.data.pets.unlocked={};
      COMPANION_DEFS.forEach(p=>{Save.data.pets.unlocked[p.id]=true;});
      Save.data.kiwis+=50000;
      Save.data.birds=9999999;
      Save.save();
      this.announce('🎉 ALL UNLOCKED · 9.99M 🐦 · 50K 🥝 🎉',4,'#ffee44');
      return true;
    }
    if(code==='773'){
      // undo 772: full reset (chars, weapons, pets, currencies)
      Save.reset();
      this.announce('⟳ FULL PROGRESS RESET ⟳',3,'#ff8844');
      return true;
    }
    this.announce('INVALID CODE',1.5,'#ff4444');
    return false;
  },
  update(dt){this._killFeed.forEach(k=>k.t-=dt);this._killFeed=this._killFeed.filter(k=>k.t>0);if(this._announce){this._announce.t-=dt;if(this._announce.t<=0)this._announce=null;}},
  announce(text,dur=2.5,color='#44ffff'){this._announce={text,t:dur,maxT:dur,color};},
  // ── TOP-CENTER WAVE BANNER ──────────────────────────────────
  // Shows current wave + countdown to next, with extra warning before boss waves.
  _drawWaveBanner(wave){
    const t=(typeof Spawner!=='undefined'?Math.max(0,Spawner.waveTimer):0);
    const bossWave=(wave%10===0);
    const nextIsBoss=((wave+1)%10===0);
    const bossActive=(typeof Spawner!=='undefined'&&Spawner.bossWaveActive);
    const w=240,h=58,cx=canvas.width/2,cy=14;
    const x=cx-w/2,y=cy;
    // Pulsing color: pink during boss wave, red if next is boss imminent, cyan otherwise
    let col=bossActive?'#ff44aa':(nextIsBoss&&t<8?'#ff6644':'#44ffff');
    const pulse=0.5+0.5*Math.sin(performance.now()/350);
    // Drop shadow
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath();ctx.roundRect(x+2,y+4,w,h,10);ctx.fill();
    // Body gradient
    const bg=ctx.createLinearGradient(0,y,0,y+h);
    bg.addColorStop(0,'rgba(28,32,58,0.92)');
    bg.addColorStop(1,'rgba(8,10,22,0.92)');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.roundRect(x,y,w,h,10);ctx.fill();
    // Border (color tinted)
    ctx.strokeStyle=col;ctx.lineWidth=bossActive?2.5:1.5;
    ctx.shadowColor=col;ctx.shadowBlur=bossActive?14+pulse*8:6;
    ctx.beginPath();ctx.roundRect(x,y,w,h,10);ctx.stroke();
    ctx.shadowBlur=0;
    // Top sheen
    const sh=ctx.createLinearGradient(0,y,0,y+10);
    sh.addColorStop(0,'rgba(255,255,255,0.18)');sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sh;ctx.beginPath();ctx.roundRect(x+2,y+1,w-4,9,8);ctx.fill();
    // WAVE label + number (left half)
    ctx.fillStyle='rgba(180,210,255,0.75)';ctx.font='bold 10px monospace';ctx.textAlign='center';
    ctx.fillText('WAVE',x+w*0.25,y+18);
    ctx.fillStyle=col;ctx.font='bold 28px monospace';
    ctx.shadowColor=col;ctx.shadowBlur=bossActive?12:6;
    ctx.fillText(`${wave}`,x+w*0.25,y+44);
    ctx.shadowBlur=0;
    // Divider
    ctx.strokeStyle='rgba(255,255,255,0.12)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,y+10);ctx.lineTo(cx,y+h-10);ctx.stroke();
    // TIMER (right half)
    if(bossActive){
      ctx.fillStyle='#ff44aa';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText('BOSS FIGHT',x+w*0.75,y+18);
      ctx.shadowColor='#ff44aa';ctx.shadowBlur=10;
      ctx.font='bold 24px monospace';ctx.fillText('☠',x+w*0.75,y+44);
      ctx.shadowBlur=0;
    } else {
      ctx.fillStyle='rgba(180,210,255,0.75)';ctx.font='bold 10px monospace';ctx.textAlign='center';
      ctx.fillText(nextIsBoss?'BOSS IN':'NEXT IN',x+w*0.75,y+18);
      const tCol=nextIsBoss&&t<8?'#ff6644':(t<5?'#ffaa44':'#ffffff');
      ctx.fillStyle=tCol;ctx.font='bold 28px monospace';
      if(t<5){ctx.shadowColor=tCol;ctx.shadowBlur=8+pulse*4;}
      ctx.fillText(`${Math.ceil(t)}s`,x+w*0.75,y+44);
      ctx.shadowBlur=0;
    }
    ctx.textAlign='left';
  },
  panel(x,y,w,h,r=8,fillA=0.78){
    // Drop shadow (soft, offset down/right)
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.beginPath();ctx.roundRect(x+3,y+5,w,h,r);ctx.fill();
    // Multi-stop gradient body — deep navy with subtle violet shift
    const g=ctx.createLinearGradient(x,y,x,y+h);
    g.addColorStop(0,`rgba(28,32,58,${fillA})`);
    g.addColorStop(0.45,`rgba(16,18,40,${fillA})`);
    g.addColorStop(1,`rgba(6,6,18,${fillA})`);
    ctx.fillStyle=g;
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();
    // Inner glass tint (subtle radial highlight from upper-left)
    const rg=ctx.createRadialGradient(x+w*0.25,y+h*0.15,r,x+w*0.25,y+h*0.15,Math.max(w,h)*0.7);
    rg.addColorStop(0,'rgba(120,160,230,0.10)');
    rg.addColorStop(1,'rgba(120,160,230,0)');
    ctx.fillStyle=rg;
    ctx.beginPath();ctx.roundRect(x,y,w,h,r);ctx.fill();
    // Outer border (two layers for depth)
    ctx.strokeStyle='rgba(140,170,230,0.30)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.roundRect(x+0.5,y+0.5,w-1,h-1,r);ctx.stroke();
    ctx.strokeStyle='rgba(0,0,0,0.5)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(x-0.5,y-0.5,w+1,h+1,r+1);ctx.stroke();
    // Top specular highlight (the "glass shine")
    const sh=ctx.createLinearGradient(x,y,x,y+Math.min(20,h*0.4));
    sh.addColorStop(0,'rgba(180,200,255,0.22)');
    sh.addColorStop(1,'rgba(180,200,255,0)');
    ctx.fillStyle=sh;
    ctx.beginPath();ctx.roundRect(x+2,y+1,w-4,Math.min(18,h*0.35),r-1);ctx.fill();
    // Bright top-edge line
    ctx.strokeStyle='rgba(180,210,255,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x+r+2,y+1);ctx.lineTo(x+w-r-2,y+1);ctx.stroke();
    // Corner accent ticks (sci-fi UI corner brackets)
    ctx.strokeStyle='rgba(160,200,255,0.35)';ctx.lineWidth=1.5;ctx.lineCap='round';
    const tk=Math.min(8,r+3);
    ctx.beginPath();
    // top-left
    ctx.moveTo(x+r,y+r-tk*0.3);ctx.lineTo(x+r-tk*0.3,y+r);
    // top-right
    ctx.moveTo(x+w-r,y+r-tk*0.3);ctx.lineTo(x+w-r+tk*0.3,y+r);
    // bottom-left
    ctx.moveTo(x+r,y+h-r+tk*0.3);ctx.lineTo(x+r-tk*0.3,y+h-r);
    // bottom-right
    ctx.moveTo(x+w-r,y+h-r+tk*0.3);ctx.lineTo(x+w-r+tk*0.3,y+h-r);
    ctx.stroke();
  },

    const cols=6,cw=180,gap=12;

    const mx=Input.mouse.x,my=Input.mouse.y;
    this._weapHover=-1;

      const w=WEAPON_DEFS[id];

      const hover=mx>=x&&mx<=x+cw&&my>=y&&my<=y+h;
      if(hover)this._weapHover=i;
      const rarity=w.rarity?RARITY[w.rarity]:RARITY.common;
      const unlocked=Save.isWeaponUnlocked(id);
      const cost=RARITY_COST[w.rarity||'common'];
      const canAfford=Save.data.kiwis>=cost;
      ctx.fillStyle=hover?'rgba(40,40,60,0.95)':'rgba(15,15,25,0.92)';
      ctx.strokeStyle=hover?w.color:rarity.color;
      ctx.lineWidth=hover?2.5:2;
      if(hover||rarity.glow>0){ctx.shadowColor=rarity.color;ctx.shadowBlur=hover?18:rarity.glow;}
      ctx.beginPath();ctx.roundRect(x,y,cw,h,10);ctx.fill();ctx.stroke();ctx.shadowBlur=0;

      ctx.fillStyle=rarity.color;ctx.font='bold 8px monospace';ctx.textAlign='center';

      ctx.fillText(w.class,x+cw/2,y+24);

      if(!unlocked){
        // weapon name
        ctx.fillStyle=hover?'#fff':w.color;ctx.font='bold 12px monospace';
        ctx.fillText(w.name,x+cw/2,y+44);

        ctx.globalAlpha=0.7;
        ctx.save();ctx.translate(x+cw/2,y+74);ctx.scale(0.35,0.35);ctx.translate(-30,0);
        const drawFn=GUN_DRAW[id]||GUN_DRAW.r301;
        if(drawFn)drawFn(ctx,false,w.color,'#5a4a2a','#222230','#e6c8a4');
        ctx.restore();
        ctx.globalAlpha=1;
        // small description
        ctx.fillStyle='#999';ctx.font='9px monospace';
        const desc=w.desc.split('·')[0].trim();
        ctx.fillText(desc.length>22?desc.slice(0,22)+'...':desc,x+cw/2,y+118);
        // cost banner
        ctx.fillStyle='rgba(0,0,0,0.75)';
        ctx.beginPath();ctx.roundRect(x,y+h-46,cw,46,{lowerLeft:10,lowerRight:10,upperLeft:0,upperRight:0});ctx.fill();
        ctx.fillStyle='#888';ctx.font='10px monospace';
        ctx.fillText('🔒 LOCKED',x+cw/2,y+h-28);
        ctx.fillStyle=canAfford?'#88ff44':'#ff6666';ctx.font='bold 16px monospace';

      // weapon name
      ctx.fillStyle='#fff';ctx.font='bold 14px monospace';
      ctx.fillText(w.name,x+cw/2,y+44);
      // actual gun preview shape (scaled down to fit card)

      ctx.save();ctx.translate(x+cw/2,py);ctx.scale(0.35,0.35);ctx.translate(-30,0);
      const drawFn=GUN_DRAW[id]||GUN_DRAW.r301;
      if(drawFn)drawFn(ctx,false,w.color,'#5a4a2a','#222230','#e6c8a4');
      ctx.restore();
      // stats bars
      const stats=[
        ['DMG',Math.min(1,w.dmg/70),w.dmg],
        ['ROF',Math.min(1,w.rof/18),w.rof.toFixed(1)],
        ['AMMO',Math.min(1,w.maxAmmo/360),w.maxAmmo],
        ['ACC',1-Math.min(1,w.spread/0.4),Math.round((1-w.spread/0.4)*100)+'%'],
      ];
      stats.forEach((s,si)=>{
        const by=y+118+si*22;
        ctx.fillStyle='#aaa';ctx.font='9px monospace';ctx.textAlign='left';
        ctx.fillText(s[0],x+18,by+8);
        ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(x+50,by+2,130,8,4);ctx.fill();
        ctx.fillStyle=w.color;ctx.beginPath();ctx.roundRect(x+50,by+2,Math.max(4,130*s[1]),8,4);ctx.fill();
        ctx.fillStyle='#ccc';ctx.font='9px monospace';ctx.textAlign='right';
        ctx.fillText(s[2],x+cw-18,by+8);
      });
      // desc
      ctx.fillStyle='#bbb';ctx.font='10px monospace';ctx.textAlign='center';
      const words=w.desc.split(' ');
      let line='',ly=y+220;
      words.forEach(wd=>{
        if((line+wd).length>26){ctx.fillText(line,x+cw/2,ly);ly+=14;line=wd+' ';}
        else line+=wd+' ';
      });
      ctx.fillText(line,x+cw/2,ly);
    });
    // weapon hover tooltip (compact, positioned to fit canvas)
    if(this._weapHover>=0){
      const w=WEAPON_DEFS[WEAPON_ORDER[this._weapHover]];
      const rarity=w.rarity?RARITY[w.rarity]:RARITY.common;
      const phh=70,pw=900;

      this.panel(px2,py,pw,phh,10);
      ctx.shadowBlur=0;
      ctx.strokeStyle=rarity.color;ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(px2,py,pw,phh,10);ctx.stroke();
      // gun preview far right (scaled)
      ctx.save();ctx.translate(px2+pw-160,py+34);ctx.scale(0.5,0.5);ctx.translate(-30,0);
      const drawFn=GUN_DRAW[WEAPON_ORDER[this._weapHover]]||GUN_DRAW.r301;
      if(drawFn)drawFn(ctx,false,w.color,'#5a4a2a','#222230','#e6c8a4');
      ctx.restore();
      // header line: rarity · class · name
      ctx.fillStyle=rarity.color;ctx.font='bold 10px monospace';ctx.textAlign='left';
      ctx.fillText(rarity.name+'  ·  '+w.class,px2+18,py+18);
      ctx.fillStyle=w.color;ctx.font='bold 18px monospace';ctx.shadowColor=w.color;ctx.shadowBlur=6;
      ctx.fillText(w.name,px2+18,py+40);ctx.shadowBlur=0;
      // description below name
      ctx.fillStyle='#dde';ctx.font='11px monospace';
      ctx.fillText(w.desc,px2+18,py+56);
      // stats line at bottom
      const dps=Math.round(w.dmg*w.rof*w.pellets);
      ctx.fillStyle='#88ccff';ctx.font='10px monospace';
      ctx.fillText(`DMG ${w.dmg} · ROF ${w.rof.toFixed(1)}/s · ${w.pellets} pellet${w.pellets>1?'s':''} · DPS ~${dps} · MAG ${w.magSize} · RELOAD ${w.reloadTime.toFixed(1)}s`,px2+pw-360,py+18);
    }
    if(this._weapHover<0){
      ctx.fillStyle='rgba(180,180,180,0.55)';ctx.font='11px monospace';ctx.textAlign='center';
      ctx.fillText('Click a weapon to begin · hover for details',canvas.width/2,canvas.height-18);

    ctx.textAlign='left';
    // ← BACK button
    const wbkx=18,wbky=canvas.height-52;
    ctx.fillStyle='rgba(20,20,40,0.85)';ctx.strokeStyle='rgba(120,140,200,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(wbkx,wbky,120,34,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#aabbdd';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText('← CHARACTERS',wbkx+60,wbky+22);ctx.textAlign='left';

  },

  // ── HUD DURING GAME ──
  drawHUD(player,wave){
    // ── TOP CENTER: WAVE + TIMER ──
    this._drawWaveBanner(wave);
    // ── player panel (top left)
    const px=14,py=14;
    const hasUlt=!!player.apexUlt;
    this.panel(px-10,py-10,272,hasUlt?278:246);
    ctx.fillStyle=player.charDef.color;ctx.font='bold 14px monospace';
    ctx.fillText(`LVL ${player.level}  ${player.charDef.name}`,px,py+13);
    ctx.fillStyle='#5577aa';ctx.font='10px monospace';
    ctx.fillText(`Wave ${wave}  ·  Kills ${player.kills}`,px,py+28);
    // hp bar
    ctx.fillStyle='#888';ctx.font='10px monospace';
    ctx.fillText(`HP  ${Math.ceil(player.hp)} / ${player.maxHp}`,px,py+46);
    const bw=242,bh=12,bx=px,by=py+50,pct=player.hp/player.maxHp;
    const hpCol=pct>.5?'#3de84e':pct>.25?'#ffaa00':'#ff3333';
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.fill();
    ctx.fillStyle=hpCol;ctx.shadowColor=hpCol;ctx.shadowBlur=pct<.25?10:0;
    ctx.beginPath();ctx.roundRect(bx,by,Math.max(4,bw*pct),bh,4);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.1)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,by,bw,bh,4);ctx.stroke();
    // xp bar
    const need=player.xpForNextLevel(),xpPct=player.xp/need;
    ctx.fillStyle='#446655';ctx.font='9px monospace';
    ctx.fillText(`XP  ${player.xp} / ${need}`,px,py+77);
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(bx,by+22,bw,6,3);ctx.fill();
    ctx.fillStyle='#44ffff';ctx.shadowColor='#44ffff';ctx.shadowBlur=4;
    ctx.beginPath();ctx.roundRect(bx,by+22,Math.max(4,bw*Math.min(1,xpPct)),6,3);ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(68,255,255,0.25)';ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(bx,by+22,bw,6,3);ctx.stroke();
    // Q ability
    const qReady=player.qCD<=0;
    const qProg=qReady?1:1-(player.qCD/14);
    this._drawAbilitySlot(px,py+102,'Q',player.charDef.qName,qReady?'READY':player.qCD.toFixed(1)+'s',player.charDef.color,qProg,player.qActive,false,false,player._qReadyFlash);
    // Weapon — mag / reserve display
    const w=player.careWeapon||player.weapon;
    const magPct=w.mag/w.magSize;
    let status;
    if(player.reloading){
      const rp=1-(player.reloadT/w.reloadTime);
      status=`RELOADING ${Math.round(rp*100)}%`;
    } else {
      status=`${w.mag}/${w.magSize}  ·  ${w.ammo}`;
    }
    this._drawAbilitySlot(px,py+140,player.careWeapon?'★':'•',w.name,status,player.reloading?'#ffaa33':w.color,player.reloading?1-(player.reloadT/w.reloadTime):magPct,false,true,player.careWeapon);
    // F ult slot
    if(hasUlt){
      const u=player.apexUlt;
      const uReady=player.ultCD<=0,uProg=uReady?1:1-(player.ultCD/u.cd);
      this._drawAbilitySlot(px,py+176,'F',u.name,uReady?'READY':player.ultCD.toFixed(1)+'s',u.color,uProg,uReady,false,false,player._ultReadyFlash);
    }
    // upgrade count
    let totalStacks=0;player.upgrades.forEach(v=>totalStacks+=v);
    ctx.fillStyle='#888';ctx.font='9px monospace';
    ctx.fillText(`UPGRADES: ${totalStacks} stacks (${player.upgrades.size} unique)`,px,py+(hasUlt?226:200));
    if(player.careWeapon){
      ctx.fillStyle='#ffdd00';ctx.font='bold 9px monospace';
      ctx.fillText('[R] RELOAD  ·  [G] DROP CARE',px,py+(hasUlt?242:216));
    } else {
      ctx.fillStyle='#aaa';ctx.font='9px monospace';
      ctx.fillText('[R] RELOAD',px,py+(hasUlt?242:216));
    }
    // reload prompt when mag is low
    if(!player.reloading&&w.mag===0&&w.ammo>0){
      ctx.fillStyle='#ff4444';ctx.font='bold 11px monospace';ctx.textAlign='center';
      ctx.fillText('[R] RELOAD',canvas.width/2,canvas.height/2+P_R+30);ctx.textAlign='left';
    }
    // reloading bar above player
    if(player.reloading){
      const sx=Camera.sx(player.x),sy=Camera.sy(player.y)-P_R-22;
      const bw=52,bh=5,rp=1-(player.reloadT/w.reloadTime);
      ctx.fillStyle='rgba(0,0,0,0.6)';ctx.beginPath();ctx.roundRect(sx-bw/2-1,sy-1,bw+2,bh+2,3);ctx.fill();
      ctx.fillStyle='#ffaa33';ctx.shadowColor='#ffaa33';ctx.shadowBlur=6;
      ctx.beginPath();ctx.roundRect(sx-bw/2,sy,Math.max(3,bw*rp),bh,2);ctx.fill();ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,255,255,0.85)';ctx.font='bold 8px monospace';ctx.textAlign='center';
      ctx.fillText('RELOADING',sx,sy-3);ctx.textAlign='left';
    }
    if(!hasUlt){
      ctx.fillStyle='#666';ctx.font='9px monospace';
      ctx.fillText(`ULT UNLOCKS AT LEVEL 5 (${player.level}/5)`,px,py+216);
    }
    // ── Controller diagnostic strip (visible in-game so user can confirm pad works)
    if(Gamepads.anyConnected()){
      // Show live state of controller for active player slot
      const slot=player.playerSlot||0;
      const g=Gamepads.get(slot);
      if(g){
        const lx=Gamepads.axis(slot,0).toFixed(2),ly=Gamepads.axis(slot,1).toFixed(2);
        const rx=Gamepads.axis(slot,2).toFixed(2),ry=Gamepads.axis(slot,3).toFixed(2);
        const btnState=[0,1,2,3,4,5,6,7,9].map(b=>Gamepads.btn(slot,b)?'●':'○').join(' ');
        ctx.fillStyle='rgba(140,255,140,0.65)';ctx.font='9px monospace';ctx.textAlign='left';
        ctx.fillText(`🎮 P${slot+1}  L(${lx},${ly}) R(${rx},${ry})`,px,py+(hasUlt?258:232));
        ctx.fillText(`X O □ △ L1 R1 L2 R2 OPT: ${btnState}`,px,py+(hasUlt?270:244));
      }
    } else {
      ctx.fillStyle='rgba(255,180,140,0.7)';ctx.font='9px monospace';ctx.textAlign='left';
      ctx.fillText('🎮 NO PAD · press any DualSense button to wake it',px,py+(hasUlt?258:232));
    }
    // ── low HP vignette / heartbeat
    const hpFrac=player.hp/player.maxHp;
    if(hpFrac<0.25&&player.alive){
      const pulse=0.5+0.5*Math.sin((this._hbPhase||0)*Math.PI*2);
      this._hbPhase=(this._hbPhase||0)+0.016;
      const alpha=0.12+0.22*(1-hpFrac/0.25)*pulse;
      const grad=ctx.createRadialGradient(canvas.width/2,canvas.height/2,canvas.height*0.2,canvas.width/2,canvas.height/2,canvas.width*0.8);
      grad.addColorStop(0,'rgba(180,0,0,0)');grad.addColorStop(1,`rgba(200,0,0,${alpha.toFixed(2)})`);
      ctx.fillStyle=grad;ctx.fillRect(0,0,canvas.width,canvas.height);
    } else {this._hbPhase=0;}
    // ── pause button (top-right)
    const pbx=canvas.width-48,pby=14;
    ctx.fillStyle='rgba(0,0,0,0.5)';ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(pbx,pby,36,30,5);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(200,200,220,0.85)';
    ctx.fillRect(pbx+10,pby+8,4,14);ctx.fillRect(pbx+22,pby+8,4,14);
    // ── dual currency + feather progress (top-right under pause button)

    ctx.fillStyle='#aaff44';ctx.font='bold 11px monospace';ctx.textAlign='center';
    ctx.fillText(`🥝 ${kiwis}`,cx-6,pby+54);
    // Kiwi Birds
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(pbx-32,pby+64,80,22,4);ctx.fill();
    ctx.fillStyle='#ffdd66';ctx.font='bold 11px monospace';
    ctx.fillText(`🐦 ${birds}`,cx-6,pby+80);
    // Kiwi Feathers
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(pbx-32,pby+90,80,22,4);ctx.fill();
    ctx.fillStyle='#ffee88';ctx.font='bold 10px monospace';
    ctx.fillText(`🪶 ${feathers}/5`,cx-6,pby+104);
    // feather progress bar
    ctx.fillStyle='rgba(60,60,80,0.6)';ctx.beginPath();ctx.roundRect(pbx-28,pby+108,72,3,2);ctx.fill();
    ctx.fillStyle='#ffee88';ctx.beginPath();ctx.roundRect(pbx-28,pby+108,72*(feathers/5),3,2);ctx.fill();
    ctx.textAlign='left';
    // ── kill feed and announcements
    this._drawKillFeed();
    this._drawMinimap(player);

    if(!player.alive)this._drawDeathScreen(player);
  },

    const qProg=qReady?1:1-(player.qCD/14);
    this._drawAbilitySlot(px,py+102,'Q/□',player.charDef.qName,qReady?'READY':player.qCD.toFixed(1)+'s',player.charDef.color,qProg,player.qActive,false,false,player._qReadyFlash);
    // Weapon slot
    const w=player.careWeapon||player.weapon;
    const magPct=w.mag/w.magSize;
    let status;
    if(player.reloading){const rp=1-(player.reloadT/w.reloadTime);status=`RELOADING ${Math.round(rp*100)}%`;}
    else {status=`${w.mag}/${w.magSize}  ·  ${w.ammo}`;}
    this._drawAbilitySlot(px,py+140,player.careWeapon?'★':'•',w.name,status,player.reloading?'#ffaa33':w.color,player.reloading?1-(player.reloadT/w.reloadTime):magPct,false,true,player.careWeapon);
    // ULT slot
    if(hasUlt){
      const u=player.apexUlt;
      const uReady=player.ultCD<=0,uProg=uReady?1:1-(player.ultCD/u.cd);
      this._drawAbilitySlot(px,py+176,'F/△',u.name,uReady?'READY':player.ultCD.toFixed(1)+'s',u.color,uProg,uReady,false,false,player._ultReadyFlash);
    }
    // upgrades count
    let totalStacks=0;player.upgrades.forEach(v=>totalStacks+=v);
    ctx.fillStyle='#888';ctx.font='9px monospace';ctx.textAlign='right';
    ctx.fillText(`UPGRADES: ${totalStacks} stacks (${player.upgrades.size} unique)`,px+pw,py+(hasUlt?226:200));
    if(!hasUlt){
      ctx.fillStyle='#666';ctx.font='9px monospace';
      ctx.fillText(`ULT @ LVL 5 (${player.level}/5)`,px+pw,py+216);
    }
    ctx.fillStyle='#aaa';ctx.font='9px monospace';
    ctx.fillText('[X] RELOAD  ·  [R2] SHOOT  ·  [L Stick] MOVE',px+pw,py+(hasUlt?242:216));
    ctx.textAlign='left';
    // P2 down indicator: dim the right panel only + floating label is drawn near corpse by _drawDeathScreen
    if(!player.alive){
      ctx.fillStyle='rgba(0,0,0,0.30)';ctx.beginPath();ctx.roundRect(px-2,py-10,pw+12,ph,8);ctx.fill();
      // floating label near body
      this._drawDeathScreen(player);
    }
  },
  _drawUpgradeList(player){

      ctx.shadowColor=upg.color;ctx.shadowBlur=4;

      const fillCol=stacks>=upg.maxStacks?'#fff':upg.color;
      ctx.fillStyle=fillCol;ctx.beginPath();ctx.roundRect(x+2,y+iconSz-5,Math.max(2,barW*(stacks/upg.maxStacks)),barH,1.5);ctx.fill();
      // stack badge
      if(stacks>1||stacks>=upg.maxStacks){

  _drawAbilitySlot(x,y,key,name,status,color,progress,active,isAmmo,isCare,readyFlash){
    // When an ability/ult slot has fully recharged (progress=1 and not ammo),
    // pulse + flash + sonar-ring + bright fill so it can't be missed.
    const isReady=!isAmmo&&progress>=1;
    const pulse=isReady?(0.5+0.5*Math.sin(performance.now()*0.007)):0;
    const flash=Math.max(0,Math.min(1,(readyFlash||0)/1.6));
    // Expanding outer sonar ring when ready
    if(isReady){
      const t=(performance.now()%1100)/1100;
      ctx.save();
      ctx.globalAlpha=(1-t)*0.65;
      ctx.strokeStyle=color;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(x+12,y+12,12+t*16,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    // Slot fills with the ability color when ready (bright background, not dark)
    if(isReady){ctx.fillStyle=color;}
    else {ctx.fillStyle=active?color:'#1c1c2e';}
    ctx.strokeStyle=isReady?'#ffffff':color;
    ctx.lineWidth=isCare?2.5:(isReady?3:1.5);
    if(isCare){ctx.shadowColor=color;ctx.shadowBlur=10;}
    else if(isReady){
      ctx.shadowColor=color;ctx.shadowBlur=14+10*pulse+30*flash;
    }
    ctx.beginPath();ctx.roundRect(x,y,24,24,4);ctx.fill();ctx.stroke();ctx.shadowBlur=0;
    ctx.fillStyle=(active||isReady)?'#000':color;ctx.font=isReady?'bold 14px monospace':'bold 12px monospace';ctx.textAlign='center';
    ctx.fillText(key,x+12,y+17);ctx.textAlign='left';
    if(progress<1&&progress>0&&!isAmmo){
      ctx.strokeStyle=color;ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(x+12,y+12,12,-Math.PI/2,-Math.PI/2+Math.PI*2*progress);ctx.stroke();
    }
    ctx.fillStyle='#ccc';ctx.font='10px monospace';
    ctx.fillText(name,x+32,y+9);
    if(isReady){
      ctx.fillStyle='#fff';ctx.shadowColor=color;ctx.shadowBlur=8+6*pulse;
      ctx.font='bold 12px monospace';
      ctx.fillText(status,x+32,y+22);ctx.shadowBlur=0;
    } else {
      ctx.fillStyle=color;ctx.font='bold 11px monospace';
      ctx.fillText(status,x+32,y+22);
    }
    if(isAmmo){
      const bw=210,aw=bw-32,ah=4;
      ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(x+32,y+26,aw,ah,2);ctx.fill();
      ctx.fillStyle=color;ctx.shadowColor=color;ctx.shadowBlur=progress<0.25?6:0;
      ctx.beginPath();ctx.roundRect(x+32,y+26,Math.max(3,aw*progress),ah,2);ctx.fill();ctx.shadowBlur=0;
    }
  },

  _drawMinimap(player){
    const mSz=130,mx=canvas.width-mSz-14,my=14,sc=mSz/ARENA;

    // arena polygon
    ctx.save();ctx.beginPath();
    POLY.forEach(([x,y],i)=>{if(i===0)ctx.moveTo(mx+x*sc,my+y*sc);else ctx.lineTo(mx+x*sc,my+y*sc);});
    ctx.closePath();ctx.fillStyle='#16162a';ctx.fill();
    ctx.strokeStyle='#2280cc';ctx.lineWidth=1.5;ctx.stroke();
    ctx.clip();
    // obstacles
    ctx.fillStyle='#3a3a4a';
    OBSTACLES.forEach(o=>{ctx.fillRect(mx+(o.x-o.w/2)*sc,my+(o.y-o.h/2)*sc,o.w*sc,o.h*sc);});
    ctx.restore();
    // XP orbs
    XpOrbs.list.forEach(o=>{ctx.fillStyle='rgba(68,255,255,0.5)';ctx.beginPath();ctx.arc(mx+o.x*sc,my+o.y*sc,1.4,0,Math.PI*2);ctx.fill();});
    // ammo crates
    AmmoCrates.list.forEach(c=>{ctx.fillStyle='#ffaa33';ctx.beginPath();ctx.arc(mx+c.x*sc,my+c.y*sc,1.8,0,Math.PI*2);ctx.fill();});

    CarePackages.list.forEach(c=>{ctx.fillStyle='#ffdd00';ctx.shadowColor='#ffdd00';ctx.shadowBlur=4;ctx.beginPath();ctx.arc(mx+c.x*sc,my+c.y*sc,2.5,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;});
    // enemies
    Game.enemies.forEach(e=>{

    ctx.fillStyle='rgba(150,150,150,0.4)';ctx.font='8px monospace';ctx.textAlign='center';
    ctx.fillText('MAP',mx+mSz/2,my+mSz+12);ctx.textAlign='left';
  },
  _drawAnnounce(){
    const a=this._announce,cx=canvas.width/2;
    const alpha=Math.min(1,a.t*3,(a.maxT-a.t)*4);
    const progress=1-(a.t/a.maxT); // 0→1 as time elapses
    // slide in from top, hold, fade out
    const slideY=canvas.height*0.22+Math.max(0,(1-Math.min(1,progress*8)))*-40;
    const isBoss=a.text.includes('BOSS');
    const isWave=a.text.startsWith('WAVE');
    const isUlt=a.text.includes('!');
    ctx.save();ctx.globalAlpha=alpha;ctx.translate(cx,slideY);
    // Background pill — set font first so measureText is accurate
    const sz=isBoss?40:isWave?34:28;
    ctx.font=`bold ${sz}px monospace`;
    const tw=ctx.measureText(a.text).width+80;
    const bh=isBoss?64:46;
    if(isBoss){
      // Boss wave: full-width dramatic bar
      ctx.fillStyle='rgba(0,0,0,0.75)';
      ctx.fillRect(-canvas.width/2,-bh/2,canvas.width,bh);
      // Side glow bars
      ctx.fillStyle=a.color;ctx.shadowColor=a.color;ctx.shadowBlur=20;
      ctx.fillRect(-canvas.width/2,-bh/2,6,bh);ctx.fillRect(canvas.width/2-6,-bh/2,6,bh);
      ctx.shadowBlur=0;
      // Animated fill
      const fillW=Math.min(canvas.width,(performance.now()%3000)/3000*canvas.width);
      ctx.fillStyle=a.color+'22';ctx.fillRect(-canvas.width/2,-bh/2,fillW,bh);
    } else {
      // Regular: floating pill
      ctx.fillStyle='rgba(0,0,0,0.65)';
      ctx.beginPath();ctx.roundRect(-tw/2,-bh/2,tw,bh,bh/2);ctx.fill();
      ctx.strokeStyle=a.color+'88';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(-tw/2,-bh/2,tw,bh,bh/2);ctx.stroke();
    }
    // Text
    ctx.shadowColor=a.color;ctx.shadowBlur=isBoss?30:16;
    ctx.fillStyle=a.color;ctx.textAlign='center';
    ctx.fillText(a.text,0,sz*0.35);
    ctx.shadowBlur=0;
    // Sub-text for boss waves
    if(isBoss){
      ctx.fillStyle='rgba(255,255,255,0.5)';ctx.font='13px monospace';
      ctx.fillText('PREPARE FOR IMPACT',0,sz*0.35+20);
    }
    ctx.restore();ctx.textAlign='left';ctx.globalAlpha=1;
  },
  _drawDeathScreen(player){
    // Compact respawn label floating above where the player went down.
    // In 1P or 2P this never blocks the whole screen — only a small badge.
    const t=performance.now()/1000;
    const sx=Camera.sx(player.x),sy=Camera.sy(player.y);
    const tag=(player.playerSlot===1)?'P2':'P1';
    const name=player.charDef?.name||tag;
    const secs=Math.max(0,player.respawnT);
    const label=`${tag} · ${name} — RESPAWN ${secs.toFixed(1)}s`;
    ctx.font='bold 13px monospace';const tw=ctx.measureText(label).width;
    const bw=tw+24,bh=28;
    const bx=sx-bw/2,by=sy-P_R-44;
    // backdrop
    ctx.fillStyle='rgba(20,8,12,0.88)';ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.fill();
    ctx.strokeStyle=`rgba(255,80,80,${0.6+Math.sin(t*5)*0.3})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(bx,by,bw,bh,6);ctx.stroke();
    // skull icon
    ctx.fillStyle='#ff4466';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText(label,sx,by+18);
    // tiny progress bar under it
    const pct=Math.max(0,1-(player.respawnT/Math.max(0.001,RESP_T)));
    const pbw=bw-12,pbh=3,pbx=sx-pbw/2,pby=by+bh+3;
    ctx.fillStyle='rgba(255,255,255,0.10)';ctx.beginPath();ctx.roundRect(pbx,pby,pbw,pbh,2);ctx.fill();
    ctx.fillStyle='#ff4444';ctx.beginPath();ctx.roundRect(pbx,pby,pbw*pct,pbh,2);ctx.fill();
    ctx.textAlign='left';
  },

  // ── LEVEL UP ──
  drawLevelUp(choices,hoverIdx,player,lastUpgrade){
    const pulseT=performance.now()/1000;
    // heavy dark overlay + particle-like noise
    ctx.fillStyle='rgba(0,0,10,0.88)';ctx.fillRect(0,0,canvas.width,canvas.height);
    // dramatic radial glow at center-top
    const cg=ctx.createRadialGradient(canvas.width/2,canvas.height*0.28,40,canvas.width/2,canvas.height*0.28,500);
    cg.addColorStop(0,'rgba(68,255,255,0.18)');cg.addColorStop(0.5,'rgba(0,40,80,0.10)');cg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=cg;ctx.fillRect(0,0,canvas.width,canvas.height);
    // sweeping light rays
    ctx.save();ctx.translate(canvas.width/2,canvas.height*0.22);
    for(let i=0;i<10;i++){
      const a=i*Math.PI/5+pulseT*0.18;
      const w=0.06+Math.sin(pulseT*1.5+i*1.3)*0.04;
      ctx.globalAlpha=w;
      const rg=ctx.createLinearGradient(0,0,0,-700);
      rg.addColorStop(0,'rgba(68,255,255,0.9)');rg.addColorStop(1,'rgba(68,255,255,0)');
      ctx.fillStyle=rg;
      ctx.save();ctx.rotate(a);ctx.fillRect(-18,-700,36,700);ctx.restore();
    }
    ctx.globalAlpha=1;ctx.restore();
    // LEVEL UP title — big, bold, pulsing
    const scl=1+Math.sin(pulseT*5)*0.03;
    ctx.save();ctx.translate(canvas.width/2,canvas.height*0.20);ctx.scale(scl,scl);
    ctx.shadowColor='#44ffff';ctx.shadowBlur=50;
    ctx.fillStyle='#44ffff';ctx.font='bold 60px monospace';ctx.textAlign='center';
    ctx.fillText('LEVEL UP!',0,0);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.font='bold 60px monospace';
    ctx.fillText('LEVEL UP!',0,0);
    ctx.restore();
    // subtitle
    ctx.fillStyle='rgba(180,240,255,0.75)';ctx.font='bold 15px monospace';ctx.textAlign='center';
    ctx.fillText(`— LEVEL ${player.level} —   CHOOSE AN UPGRADE`,canvas.width/2,canvas.height*0.30);
    ctx.textAlign='left';
    const cw=270,ch=310,gap=28;
    const totalW=choices.length*(cw+gap)-gap;
    const startX=canvas.width/2-totalW/2;
    const startY=canvas.height*0.34;
    choices.forEach((up,i)=>{
      const cx=startX+i*(cw+gap);
      const cy=startY;
      const hover=i===hoverIdx;
      const stacks=player.upgrades.get(up.id)??0;
      const newStacks=stacks+1;
      const isUpgrade=up.id===lastUpgrade;
      const rarity=up.rarity?RARITY[up.rarity]:RARITY.common;
      // CARD BACKGROUND with rarity gradient
      const hoverLift=hover?-6:0;
      const cBg=ctx.createLinearGradient(cx,cy+hoverLift,cx,cy+ch+hoverLift);
      if(hover){
        cBg.addColorStop(0,'rgba(30,30,60,0.98)');
        cBg.addColorStop(1,'rgba(8,8,24,0.98)');
      } else {
        cBg.addColorStop(0,'rgba(16,16,36,0.96)');
        cBg.addColorStop(1,'rgba(6,6,18,0.96)');
      }
      ctx.fillStyle=cBg;
      ctx.shadowColor=rarity.color;
      ctx.shadowBlur=hover?32:rarity.glow*1.2;
      ctx.strokeStyle=hover?'#fff':rarity.color;
      ctx.lineWidth=hover?3:2;
      ctx.beginPath();ctx.roundRect(cx,cy+hoverLift,cw,ch,14);ctx.fill();ctx.stroke();
      ctx.shadowBlur=0;
      // rarity banner at top of card
      const bannerG=ctx.createLinearGradient(cx,cy+hoverLift,cx+cw,cy+hoverLift);
      bannerG.addColorStop(0,'rgba(0,0,0,0)');
      bannerG.addColorStop(0.3,rarity.color+'55');
      bannerG.addColorStop(0.7,rarity.color+'55');
      bannerG.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=bannerG;
      ctx.beginPath();ctx.roundRect(cx,cy+hoverLift,cw,26,{upperLeft:14,upperRight:14,lowerLeft:0,lowerRight:0});ctx.fill();
      ctx.fillStyle=rarity.color;ctx.font='bold 9px monospace';ctx.textAlign='center';
      ctx.fillText(rarity.name+(isUpgrade?' · LAST PICK':''),cx+cw/2,cy+16+hoverLift);
      // BIG ICON BLOCK
      const iconY=cy+34+hoverLift;
      const iconBg=ctx.createRadialGradient(cx+cw/2,iconY+36,4,cx+cw/2,iconY+36,52);
      iconBg.addColorStop(0,up.color+'cc');iconBg.addColorStop(1,up.color+'33');
      ctx.fillStyle=iconBg;ctx.shadowColor=up.color;ctx.shadowBlur=hover?20:10;
      ctx.beginPath();ctx.roundRect(cx+cw/2-46,iconY,92,72,12);ctx.fill();ctx.shadowBlur=0;
      // icon border
      ctx.strokeStyle=up.color;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.roundRect(cx+cw/2-46,iconY,92,72,12);ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 28px monospace';ctx.textAlign='center';
      ctx.shadowColor=up.color;ctx.shadowBlur=8;
      ctx.fillText(up.icon,cx+cw/2,iconY+50);ctx.shadowBlur=0;
      // UPGRADE NAME
      ctx.fillStyle=hover?'#fff':up.color;ctx.font='bold 14px monospace';
      ctx.shadowColor=up.color;ctx.shadowBlur=hover?10:0;
      ctx.fillText(up.name,cx+cw/2,cy+124+hoverLift);ctx.shadowBlur=0;
      // stack progress bar
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.beginPath();ctx.roundRect(cx+20,cy+132+hoverLift,cw-40,6,3);ctx.fill();
      ctx.fillStyle=up.color;ctx.shadowColor=up.color;ctx.shadowBlur=6;
      ctx.beginPath();ctx.roundRect(cx+20,cy+132+hoverLift,(cw-40)*(newStacks/up.maxStacks),6,3);ctx.fill();
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(200,200,200,0.6)';ctx.font='9px monospace';
      ctx.fillText(`${newStacks} / ${up.maxStacks}  stacks`,cx+cw/2,cy+148+hoverLift);
      // DESCRIPTION — word wrapped
      ctx.fillStyle=hover?'rgba(255,255,255,0.9)':'rgba(210,220,235,0.80)';
      ctx.font='11px monospace';
      const words=up.desc(newStacks).split(' ');
      let line='',ly=cy+164+hoverLift;
      words.forEach(wd=>{
        if((line+wd).length>26){ctx.fillText(line,cx+cw/2,ly);ly+=15;line=wd+' ';}
        else line+=wd+' ';
      });
      ctx.fillText(line,cx+cw/2,ly);
      // CLICK CTA
      if(hover){
        const ctaY=cy+ch-18+hoverLift;
        ctx.fillStyle=up.color;ctx.shadowColor=up.color;ctx.shadowBlur=12;

  getLevelUpClick(mx,my,n){

  // ── GAME OVER ──
  drawGameOver(player,wave){
    const cx=canvas.width/2,cy=canvas.height/2;
    const t=performance.now()/1000;
    // Deep dark overlay
    ctx.fillStyle='rgba(0,0,0,0.93)';ctx.fillRect(0,0,canvas.width,canvas.height);
    // Red vignette (death feel)
    const vig=ctx.createRadialGradient(cx,cy,100,cx,cy,canvas.width*0.7);
    vig.addColorStop(0,'rgba(0,0,0,0)');vig.addColorStop(1,'rgba(180,0,0,0.4)');
    ctx.fillStyle=vig;ctx.fillRect(0,0,canvas.width,canvas.height);
    // Scanline flicker
    ctx.fillStyle='rgba(255,0,0,0.03)';
    for(let y=0;y<canvas.height;y+=4)ctx.fillRect(0,y,canvas.width,2);
    // ── TITLE
    const blink=Math.sin(t*3)*0.15+0.85;
    ctx.save();
    ctx.translate(cx,cy-130);ctx.scale(1+Math.sin(t*0.8)*0.012,1);
    ctx.shadowColor='#ff1111';ctx.shadowBlur=50;
    ctx.fillStyle=`rgba(255,${30+Math.sin(t*2)*20},${30+Math.sin(t*2)*20},${blink})`;
    ctx.font='bold 72px monospace';ctx.textAlign='center';

    ctx.shadowBlur=0;ctx.restore();
    // Divider line
    ctx.strokeStyle='rgba(255,50,50,0.4)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-220,cy-80);ctx.lineTo(cx+220,cy-80);ctx.stroke();
    // ── STAT CARDS ──
    const stats=[
      {label:'WAVE',val:wave,icon:'🌊',color:'#44ffff'},
      {label:'KILLS',val:player.kills,icon:'💀',color:'#ff6644'},
      {label:'LEVEL',val:player.level,icon:'⬆',color:'#ffee44'},
      {label:'KIWIS',val:Game.sessionKiwis||0,icon:'🥝',color:'#88ff44'},
    ];
    const cardW=140,cardH=90,cardGap=18;
    const totalW=stats.length*(cardW+cardGap)-cardGap;
    const startX=cx-totalW/2;
    stats.forEach((s,i)=>{

      // Card background
      ctx.fillStyle='rgba(255,255,255,0.05)';ctx.beginPath();ctx.roundRect(bx,cy-65,cardW,cardH,8);ctx.fill();
      ctx.strokeStyle=s.color+'66';ctx.lineWidth=1.5;ctx.beginPath();ctx.roundRect(bx,cy-65,cardW,cardH,8);ctx.stroke();
      // Value
      ctx.fillStyle=s.color;ctx.shadowColor=s.color;ctx.shadowBlur=10;
      ctx.font='bold 34px monospace';ctx.textAlign='center';
      ctx.fillText(s.val,bx+cardW/2,cy-20);ctx.shadowBlur=0;
      // Label
      ctx.fillStyle='rgba(200,200,200,0.7)';ctx.font='12px monospace';
      ctx.fillText(s.label,bx+cardW/2,cy+10);
    });
    ctx.textAlign='left';
    // ── CHARACTER PORTRAIT ──
    ctx.save();
    ctx.translate(cx,cy+70);ctx.scale(0.55,0.55);
    ctx.globalAlpha=0.55;
    drawCharacter(0,0,0,0,false,player.charDef,null,0,player.weaponId,player.careWeapon?.type||null);
    ctx.restore();
    // ── UPGRADE RECAP ──
    const upgList=[...player.upgrades.entries()].slice(0,6);
    if(upgList.length>0){
      ctx.fillStyle='rgba(200,200,200,0.4)';ctx.font='11px monospace';ctx.textAlign='center';

      upgList.forEach(([id,stacks],i)=>{
        const upg=UPGRADES.find(u=>u.id===id);if(!upg)return;

        ctx.fillStyle=upg.color||'#88aaff';ctx.shadowColor=upg.color||'#88aaff';ctx.shadowBlur=6;
        ctx.font='bold 11px monospace';ctx.textAlign='center';
        ctx.fillText(upg.icon||'●',ix,cy+152);
        ctx.shadowBlur=0;
        ctx.fillStyle='rgba(150,150,150,0.7)';ctx.font='9px monospace';
        ctx.fillText('×'+stacks,ix,cy+164);
      });

    // ── CTA BUTTON ──
    const btnPulse=Math.sin(t*2)*0.2+0.8;
    const btnY=cy+195;
    ctx.fillStyle=`rgba(68,255,255,${btnPulse*0.15})`;
    ctx.beginPath();ctx.roundRect(cx-140,btnY-24,280,36,8);ctx.fill();
    ctx.strokeStyle=`rgba(68,255,255,${btnPulse*0.8})`;ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(cx-140,btnY-24,280,36,8);ctx.stroke();
    ctx.fillStyle=`rgba(68,255,255,${btnPulse})`;ctx.shadowColor='#44ffff';ctx.shadowBlur=10*btnPulse;
    ctx.font='bold 18px monospace';ctx.textAlign='center';

  // ── ONLINE LOBBY ──
  drawOnlineMenu(click,subState){
    const cx=canvas.width/2,cy=canvas.height/2,t=performance.now()/1000;
    const bg=ctx.createRadialGradient(cx,cy,100,cx,cy,canvas.width*0.9);
    bg.addColorStop(0,'#0a1a2a');bg.addColorStop(1,'#020512');
    ctx.fillStyle=bg;ctx.fillRect(0,0,canvas.width,canvas.height);
    // title
    ctx.fillStyle='#44ffff';ctx.shadowColor='#44ffff';ctx.shadowBlur=20;
    ctx.font='bold 64px monospace';ctx.textAlign='center';
    ctx.fillText('🌐 ONLINE',cx,140);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(180,220,255,0.55)';ctx.font='13px monospace';
    ctx.fillText('PEER-TO-PEER COOPERATIVE · UP TO 4 PLAYERS',cx,170);

    // Network ready check
    if(!Net.ready()){
      ctx.fillStyle='#ff6666';ctx.font='bold 18px monospace';
      ctx.fillText('⚠  NETWORK LIBRARY FAILED TO LOAD',cx,cy);
      ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='11px monospace';
      ctx.fillText('Try reloading the page — Trystero may be blocked',cx,cy+22);
      // back btn
      this._drawMenuBtn(cx,cy+80,260,40,'← BACK','#ff6666',click);
      return;
    }

    // Sub-state: 'choose' (host/join), 'host' (waiting), 'join' (enter code), 'lobby' (in room)
    if(subState==='choose'){
      this._drawMenuBtn(cx,cy-30,300,52,'🪐  HOST A ROOM','#44ffff',click);
      this._drawMenuBtn(cx,cy+40,300,52,'🔗  JOIN A ROOM','#ffaa44',click);
      this._drawMenuBtn(cx,cy+150,260,40,'← BACK','#aaaaaa',click);
    } else if(subState==='join_input'){
      // Code entry box
      ctx.fillStyle='rgba(180,220,255,0.8)';ctx.font='14px monospace';
      ctx.fillText('ENTER ROOM CODE',cx,cy-90);
      const boxW=380,boxH=70,boxX=cx-boxW/2,boxY=cy-50;
      // panel
      this.panel(boxX,boxY,boxW,boxH,10,0.85);
      ctx.fillStyle='#ffffff';ctx.shadowColor='#44ffff';ctx.shadowBlur=14;
      ctx.font='bold 38px monospace';ctx.textAlign='center';
      const code=(Game._onlineJoinCode||'').padEnd(6,'_');
      ctx.fillText(code,cx,boxY+48);ctx.shadowBlur=0;
      ctx.fillStyle='rgba(180,220,255,0.5)';ctx.font='11px monospace';
      ctx.fillText('Tap to open keyboard, type the 6-char code',cx,boxY+boxH+16);
      // store hit area for keyboard focus
      this._codeBoxRect={x:boxX,y:boxY,w:boxW,h:boxH};
      // connect btn
      const canConnect=(Game._onlineJoinCode||'').length===6;
      this._drawMenuBtn(cx,cy+70,260,46,'▶  CONNECT',canConnect?'#44ff88':'#666666',click,!canConnect);
      this._drawMenuBtn(cx,cy+140,260,40,'← BACK','#aaaaaa',click);
    } else if(subState==='lobby'){
      // Room code display
      ctx.fillStyle='rgba(180,220,255,0.7)';ctx.font='14px monospace';
      ctx.fillText(Net.isHost?'YOUR ROOM CODE — SHARE TO INVITE':'JOINED ROOM',cx,cy-170);
      const codeW=380,codeH=64,codeX=cx-codeW/2,codeY=cy-150;
      this.panel(codeX,codeY,codeW,codeH,10,0.85);
      ctx.fillStyle='#ffffff';ctx.shadowColor='#44ffff';ctx.shadowBlur=18;
      ctx.font='bold 46px monospace';ctx.textAlign='center';
      ctx.fillText(Net.roomCode,cx,codeY+47);ctx.shadowBlur=0;
      // Player roster

      ctx.fillText(`PLAYERS  ${count} / 4`,cx,codeY+codeH+24);

        const sx=startX+i*(slotW+gap), sy=slotY;

        // Slot panel
        ctx.fillStyle=p?'rgba(30,40,70,0.9)':'rgba(10,15,30,0.6)';
        ctx.strokeStyle=p?(p.isHost?'#44ffff':'#88ccff'):'rgba(80,100,140,0.4)';
        ctx.lineWidth=p?2:1;
        ctx.beginPath();ctx.roundRect(sx,sy,slotW,slotH,8);ctx.fill();ctx.stroke();
        if(p){
          const charDef=CHAR_DEFS[p.charId]||CHAR_DEFS.octane;
          // Char color stripe
          ctx.fillStyle=charDef.color;ctx.globalAlpha=0.25;
          ctx.beginPath();ctx.roundRect(sx,sy,slotW,8,3);ctx.fill();ctx.globalAlpha=1;

          ctx.fillText(charDef.name,sx+slotW/2,sy+32);
          // Slot number / host tag

          ctx.fillText(p.isHost?'🪐 HOST':`P${i+1}`,sx+slotW/2,sy+50);
          // Weapon name
          const wDef=WEAPON_DEFS[p.weaponId];
          if(wDef){
            ctx.fillStyle='rgba(220,220,220,0.7)';ctx.font='10px monospace';
            ctx.fillText(wDef.name,sx+slotW/2,sy+slotH-26);

          // "YOU" badge
          if(p.peerId===Net.selfId){
            ctx.fillStyle='#88ff88';ctx.font='bold 10px monospace';
            ctx.fillText('● YOU',sx+slotW/2,sy+slotH-10);
          }
        } else {
          ctx.fillStyle='rgba(140,160,200,0.4)';ctx.font='13px monospace';ctx.textAlign='center';
          ctx.fillText('WAITING',sx+slotW/2,sy+slotH/2+5);
        }

      const enemiesMult=1+0.5*(count-1);
      ctx.fillStyle='rgba(180,220,255,0.55)';ctx.font='11px monospace';
      ctx.fillText(`Wave enemies × ${enemiesMult.toFixed(1)}  ·  No friendly fire`,cx,slotY+slotH+24);
      // Buttons
      this._drawMenuBtn(cx-150,slotY+slotH+62,260,42,'🎭  PICK CHARACTER','#ffaa44',click);
      if(Net.isHost){
        const canStart=count>=1;
        this._drawMenuBtn(cx+150,slotY+slotH+62,260,42,canStart?'▶  START GAME':'WAITING…','#44ff88',click,!canStart);
      } else {
        ctx.fillStyle='rgba(180,220,255,0.5)';ctx.font='11px monospace';
        ctx.fillText('Waiting for host to start…',cx+150,slotY+slotH+62+5);
      }
      this._drawMenuBtn(cx,slotY+slotH+118,200,38,'← LEAVE','#ff6666',click);
      // Status line
      if(Net.status){
        ctx.fillStyle='rgba(180,220,255,0.45)';ctx.font='10px monospace';
        ctx.fillText(Net.status,cx,canvas.height-20);
      }
    }
  },
  _drawMenuBtn(cx,cy,bw,bh,label,color,click,disabled){
    const mx=Input.mouse.x,my=Input.mouse.y;
    const hover=!disabled&&(mx>=cx-bw/2&&mx<=cx+bw/2&&my>=cy-bh/2&&my<=cy+bh/2);
    // shadow
    ctx.fillStyle='rgba(0,0,0,0.55)';
    ctx.beginPath();ctx.roundRect(cx-bw/2+2,cy-bh/2+4,bw,bh,10);ctx.fill();
    // body
    const bgr=ctx.createLinearGradient(cx,cy-bh/2,cx,cy+bh/2);
    if(disabled){
      bgr.addColorStop(0,'rgba(40,40,55,0.7)');bgr.addColorStop(1,'rgba(20,20,30,0.7)');
    } else if(hover){
      bgr.addColorStop(0,`${color}55`);bgr.addColorStop(0.5,`${color}33`);bgr.addColorStop(1,`${color}18`);
    } else {
      bgr.addColorStop(0,'rgba(36,40,70,0.85)');bgr.addColorStop(0.5,'rgba(20,22,46,0.85)');bgr.addColorStop(1,'rgba(10,12,28,0.85)');
    }
    if(hover){ctx.shadowColor=color;ctx.shadowBlur=20;}
    ctx.fillStyle=bgr;
    ctx.beginPath();ctx.roundRect(cx-bw/2,cy-bh/2,bw,bh,10);ctx.fill();
    ctx.shadowBlur=0;
    // top sheen
    const sh=ctx.createLinearGradient(cx,cy-bh/2,cx,cy-bh/2+8);
    sh.addColorStop(0,'rgba(255,255,255,0.20)');sh.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=sh;
    ctx.beginPath();ctx.roundRect(cx-bw/2+2,cy-bh/2+1,bw-4,8,8);ctx.fill();
    ctx.strokeStyle=disabled?'rgba(80,80,100,0.6)':color;
    ctx.lineWidth=hover?2.5:1.5;
    ctx.beginPath();ctx.roundRect(cx-bw/2,cy-bh/2,bw,bh,10);ctx.stroke();
    // label
    ctx.shadowColor='rgba(0,0,0,0.6)';ctx.shadowBlur=hover?6:3;
    ctx.fillStyle=disabled?'rgba(150,150,160,0.7)':(hover?'#fff':color);
    ctx.font=`bold ${hover?17:15}px monospace`;ctx.textAlign='center';
    ctx.fillText(label,cx,cy+6);ctx.shadowBlur=0;
    // Click hit (caller checks the same area)
  },

  // ── EVOLUTION TREE ──
  _treeHover:null,
  drawTree(click){
    const g=ctx.createLinearGradient(0,0,0,canvas.height);
    g.addColorStop(0,'#0a0a1a');g.addColorStop(1,'#0a1a2a');
    ctx.fillStyle=g;ctx.fillRect(0,0,canvas.width,canvas.height);
    // Title
    const t=performance.now()/600;
    ctx.shadowColor='#ffdd66';ctx.shadowBlur=24+Math.sin(t)*8;
    ctx.fillStyle='#ffdd66';ctx.font='bold 38px monospace';ctx.textAlign='center';
    ctx.fillText('KIWI EVOLUTION TREE',canvas.width/2,58);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(220,200,140,0.5)';ctx.font='12px monospace';
    ctx.fillText('PERMANENT PROGRESSION · SPEND 🐦 KIWI BIRDS',canvas.width/2,80);
    // Bird counter (top right)
    this.panel(canvas.width-244,18,224,42,8);
    ctx.fillStyle='#ffdd66';ctx.font='bold 22px monospace';ctx.shadowColor='#ffaa22';ctx.shadowBlur=10;ctx.textAlign='center';
    ctx.fillText(`🐦 ${Save.data.birds}`,canvas.width-200,46);ctx.shadowBlur=0;
    ctx.fillStyle='rgba(230,200,140,0.7)';ctx.font='11px monospace';
    ctx.fillText(`Feathers ${Save.data.feathers}/5`,canvas.width-110,46);ctx.textAlign='left';
    // 5 paths laid out horizontally; nodes go vertically
    const paths=KiwiTree.paths,nP=paths.length;
    const colW=Math.min(220,(canvas.width-80)/nP);
    const startX=canvas.width/2-(nP*colW)/2;
    const topY=110,nodeR=24,nodeGap=52;
    this._treeHover=null;
    const mx=Input.mouse.x,my=Input.mouse.y;
    paths.forEach((path,pi)=>{
      const cx=startX+pi*colW+colW/2;
      // Path header
      ctx.fillStyle='rgba(20,20,40,0.65)';ctx.strokeStyle=path.color;ctx.lineWidth=2;
      ctx.beginPath();ctx.roundRect(cx-colW/2+6,topY-4,colW-12,52,8);ctx.fill();ctx.stroke();
      ctx.fillStyle=path.color;ctx.font='bold 28px monospace';ctx.shadowColor=path.color;ctx.shadowBlur=14;ctx.textAlign='center';
      ctx.fillText(path.icon,cx,topY+22);ctx.shadowBlur=0;
      ctx.fillStyle=path.color;ctx.font='bold 11px monospace';
      ctx.fillText(path.name,cx,topY+40);
      // Nodes (10 levels)
      const lvl=Save.getTreeLvl(path.id);
      path.nodes.forEach((node,ni)=>{
        const ny=topY+90+ni*nodeGap;
        const isUnlocked=ni<lvl;
        const isNext=ni===lvl;
        const isSpecial=node.special;
        const r=isSpecial?nodeR+5:nodeR;
        const hover=mx>=cx-r&&mx<=cx+r&&my>=ny-r&&my<=ny+r;
        if(hover)this._treeHover={pathId:path.id,nodeIdx:ni};
        // Connection line
        if(ni>0){
          ctx.strokeStyle=isUnlocked?path.color:'rgba(80,90,120,0.4)';
          ctx.lineWidth=isUnlocked?2.5:1.5;ctx.beginPath();
          ctx.moveTo(cx,ny-nodeGap+r);ctx.lineTo(cx,ny-r);ctx.stroke();
        }
        // Node body
        if(isUnlocked){
          ctx.fillStyle=path.color;ctx.shadowColor=path.color;ctx.shadowBlur=isSpecial?16+Math.sin(t*2+ni)*6:8;
        } else if(isNext){
          const canAfford=Save.data.birds>=KiwiTree.cost(ni+1);
          ctx.fillStyle=canAfford?'rgba(40,55,80,0.95)':'rgba(30,30,50,0.85)';
          ctx.shadowColor=canAfford?path.color:'#444';ctx.shadowBlur=hover?20:10;
        } else {
          ctx.fillStyle='rgba(25,28,45,0.85)';ctx.shadowBlur=0;
        }
        ctx.strokeStyle=isUnlocked?'#fff':path.color;ctx.lineWidth=isSpecial?3:2;
        if(isSpecial){
          // Special node: diamond/star shape with pulse
          const pulse=isUnlocked?1:(1+Math.sin(t*2.5+ni)*0.06);
          ctx.beginPath();
          for(let i=0;i<8;i++){const ang=i*Math.PI/4,rr=r*pulse*(i%2===0?1:0.7);ctx.lineTo(cx+Math.cos(ang)*rr,ny+Math.sin(ang)*rr);}
          ctx.closePath();ctx.fill();ctx.stroke();
        } else {
          ctx.beginPath();ctx.arc(cx,ny,r,0,Math.PI*2);ctx.fill();ctx.stroke();
        }
        ctx.shadowBlur=0;
        // Lvl number
        ctx.fillStyle=isUnlocked?'#fff':(isNext?path.color:'#445');
        ctx.font=isSpecial?'bold 14px monospace':'bold 12px monospace';
        ctx.fillText(ni+1,cx,ny+5);
        // Click handler — unlock if next-up and click hit
        if(isNext&&click&&hover){
          if(KiwiTree.tryUnlock(path.id)){
            AudioManager.play('level_up');Particles.burst(cx,ny,12,{color:path.color,speed:60,life:0.5,r:3});
          } else {
            AudioManager.play('click');UI.announce('NOT ENOUGH BIRDS',1.4,'#ff6644');
          }
        }
      });
    });
    // Tooltip for hovered node
    if(this._treeHover){
      const p=KiwiTree.paths.find(x=>x.id===this._treeHover.pathId);
      const node=p.nodes[this._treeHover.nodeIdx];
      const lvl=Save.getTreeLvl(p.id);
      const isUnlocked=this._treeHover.nodeIdx<lvl;
      const isNext=this._treeHover.nodeIdx===lvl;
      const cost=KiwiTree.cost(this._treeHover.nodeIdx+1);
      const tw=380,th=110;
      const tx=Math.min(canvas.width-tw-12,Math.max(12,mx+18));
      const ty=Math.min(canvas.height-th-12,Math.max(12,my+18));
      this.panel(tx,ty,tw,th,8);
      ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(tx,ty,tw,th,8);ctx.stroke();
      ctx.fillStyle=p.color;ctx.font='bold 11px monospace';ctx.textAlign='left';
      ctx.fillText(`${p.name} · LVL ${this._treeHover.nodeIdx+1}${node.special?' ★ SPECIAL':''}`,tx+12,ty+18);
      ctx.fillStyle='#ddd';ctx.font='bold 13px monospace';
      ctx.fillText(node.name,tx+12,ty+40);
      ctx.fillStyle='#88aaff';ctx.font='10px monospace';
      ctx.fillText(node.special?'Unlocks new mechanic':'Statistical bonus',tx+12,ty+58);
      if(isUnlocked){
        ctx.fillStyle='#88ff88';ctx.font='bold 12px monospace';
        ctx.fillText('✓ UNLOCKED',tx+12,ty+82);
      } else if(isNext){
        const canAfford=Save.data.birds>=cost;
        ctx.fillStyle=canAfford?'#ffee44':'#ff6644';ctx.font='bold 12px monospace';
        ctx.fillText(`🐦 ${cost} ${canAfford?'· Click to unlock':'· Not enough'}`,tx+12,ty+82);
      } else {
        ctx.fillStyle='#666';ctx.font='11px monospace';
        ctx.fillText(`Locked · unlock LVL ${this._treeHover.nodeIdx} first`,tx+12,ty+82);
      }
      ctx.fillStyle='#666';ctx.font='9px monospace';
      ctx.fillText(p.desc,tx+12,ty+99);
    }
    // Back button
    const bx=20,by=canvas.height-52;
    ctx.fillStyle='rgba(20,20,40,0.85)';ctx.strokeStyle='rgba(120,140,200,0.4)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(bx,by,120,34,7);ctx.fill();ctx.stroke();
    ctx.fillStyle='#aabbdd';ctx.font='bold 13px monospace';ctx.textAlign='center';
    ctx.fillText('← MAIN MENU',bx+60,by+22);ctx.textAlign='left';
    this._drawCustomCursor();
  },
  getTreeClick(mx,my){
    const bx=20,by=canvas.height-52;
    if(mx>=bx&&mx<=bx+120&&my>=by&&my<=by+34)return 'back';
    return null;
  },

const Game={
  state:'main_menu', // main_menu, char_select, weapon_select, playing, paused, level_up, game_over, settings, tree, stats, online_menu, online_char_select, online_weapon_select
  player:null,enemies:[],decoys:[],witchSpells:[],bees:[],healthOrbs:[],

  _onlineSub:'choose',
  _onlineJoinCode:'',
  init(){
    Input.init();

  },
  // Called when host clicks "START GAME" in online lobby (locally), and when
  // the host's start payload arrives on each client. Begins the run + records
  // the multiplayer roster so the spawner can scale enemies and we know who the remotes are.
  _onlineStart(payload){
    if(!payload||!payload.roster)return;
    this.online=true;
    this.onlineRoster=payload.roster;
    this.onlineHostId=payload.hostId;
    this.onlineSeed=payload.seed;
    // Find OUR entry in the roster
    const me=payload.roster.find(r=>r.peerId===Net.selfId);
    const myChar=me?me.charId:'octane';
    const myWeapon=me?me.weaponId:'r301';
    // Start the local run with our pick
    this.startGame(myChar,myWeapon);
    // Mark online again (startGame may have reset some flags)
    this.online=true;
    this.onlineRoster=payload.roster;
    this.onlineHostId=payload.hostId;
    // Build remote-player "ghost" map (peerId → {x,y,angle,aimAngle,hp,charId,weaponId,alive})
    this.remotePlayers={};
    payload.roster.forEach(r=>{
      if(r.peerId===Net.selfId)return;
      this.remotePlayers[r.peerId]={
        peerId:r.peerId,charId:r.charId,weaponId:r.weaponId,
        x:this.player.x+(Math.random()-0.5)*80,y:this.player.y+(Math.random()-0.5)*80,
        angle:0,aimAngle:0,hp:100,maxHp:100,alive:true,
        walkT:0,moving:false,
        charDef:CHAR_DEFS[r.charId]||CHAR_DEFS.octane
      };
    });
    UI.announce(`🌐 ONLINE — ${payload.roster.length} PLAYER${payload.roster.length>1?'S':''}`,2.5,'#aa88ff');
  },
  startGame(charId,weaponId,p2CharId,p2WeaponId){
    _eid=1000;
    this.state='playing';
    this.numPlayers=p2CharId?2:1;
    // Reset gamepad assignments so the connected pad gets routed correctly for new mode
    if(typeof Gamepads!=='undefined'){Gamepads.pads=[null,null];Gamepads._detectedIds=['',''];}
    this.player=new Player(charId,weaponId);
    this.player.playerSlot=0;
    const c=clampPoly(this.player.x,this.player.y,PHYS_R);this.player.x=c.x;this.player.y=c.y;
    if(this.numPlayers===2){
      this.player2=new Player(p2CharId,p2WeaponId);
      this.player2.playerSlot=1;this.player2.useGamepad=true;

      this.player2.x=this.player.x+80;this.player2.y=this.player.y;

    } else { this.player2=null; }
    this.enemies=[];this.decoys=[];this.witchSpells=[];this.bees=[];this.healthOrbs=[];this.shadowDogs=[];this._pinkArmy=[];this.time=0;this.lastHealWave=0;this.sessionKiwis=0;this.sessionBirds=0;
    // Perfect-wave tracker
    this._waveDamageTaken=false;this._lastWaveCounted=1;
    FeatherPickups.clear();
    // apply tree bonuses
    if(typeof KiwiTree!=='undefined'){KiwiTree.applyToPlayer(this.player);if(this.player2)KiwiTree.applyToPlayer(this.player2);}
    // Auto-equip selected pet
    if(typeof Companions!=='undefined'){Companions.spawnSelected(this.player);if(this.player2)Companions.spawnSelected(this.player2);}
    // Pick a random theme for this run + reset decor positions
    Themes.pickForRun();
    window._stars=null;window._jungleDecor=null;window._iceDecor=null;window._snowflakes=null;window._cyberLines=null;window._decals=null;
    UI.announce(`MAP: ${Themes.get().name}`,1.8,Themes.get().borderColor);
    // daily bonus
    if(Save.tryDailyBonus()){UI.announce('🐦 DAILY +2 KIWI BIRDS',2.5,'#ffdd66');}
    this.lastUpgrade=null;
    Spawner.reset();Effects.clear();Bullets.clear();XpOrbs.clear();Particles.list=[];DmgNumbers.clear();
    CarePackages.clear();AmmoCrates.spawnInit();
    UI._killFeed=[];UI._announce=null;
    Camera.x=this.player.x-canvas.width/2;Camera.y=this.player.y-canvas.height/2;
    UI.announce(this.numPlayers===2?'WAVE 1 · CO-OP MODE':'WAVE 1',2.5,'#44ffff');
    AudioManager.play('game_start');
    VoiceManager.play(charId,'spawn');
    if(this.player2)VoiceManager.play(p2CharId,'spawn');
    const _initCount=this.numPlayers===2?10:5; // +30% initial wave spawn
    for(let i=0;i<_initCount;i++)Spawner._doSpawn(this.enemies,this.player);
  },
  triggerLevelUp(){
    // Level 10: unlock ultimate (no upgrade choice)
    if(this.player.level===5&&!this.player.apexUlt){
      this.player.equipUlt();
      const u=ULT_DEFS[this.player.charId];
      UI.announce(`ULTIMATE UNLOCKED · ${u.name}`,3.5,u.color);
      Camera.shake(10,0.6);
      AudioManager.play('ult_ready');
      VoiceManager.play(this.player.charId,'ultimate');
      Particles.burst(this.player.x,this.player.y,40,{color:u.color,speed:220,life:0.9,r:6});
      Particles.burst(this.player.x,this.player.y,20,{color:'#ffffff',speed:160,life:0.5,r:4});
      return;
    }
    const owned=[...this.player.upgrades.keys()];
    // 6-slot limit: if 6 distinct upgrades all maxed/evolved, skip
    const slotsFilled=owned.length;
    const allMaxed=owned.every(id=>{
      const u=UPGRADES.find(x=>x.id===id);
      return (this.player.upgrades.get(id)??0)>=u.maxStacks;
    });
    if(slotsFilled>=6&&allMaxed){
      UI.announce(`LEVEL ${this.player.level}`,1.5,'#44ffff');
      return; // just bump level, no choice
    }
    AudioManager.play('level_up');
    this.state='level_up';
    const choices=[];
    // 1) Last picked (rank up if room)
    if(this.lastUpgrade){
      const upg=UPGRADES.find(u=>u.id===this.lastUpgrade);
      const stacks=this.player.upgrades.get(this.lastUpgrade)??0;
      if(upg&&stacks<upg.maxStacks)choices.push(upg);
    }
    // 2) Pool - if slots filled, only show OWNED upgrades to stack
    let pool;
    if(slotsFilled>=6){
      pool=UPGRADES.filter(u=>{
        if(choices.find(c=>c.id===u.id))return false;
        return owned.includes(u.id)&&(this.player.upgrades.get(u.id)??0)<u.maxStacks;
      });
    } else {
      pool=UPGRADES.filter(u=>{
        if(choices.find(c=>c.id===u.id))return false;
        return (this.player.upgrades.get(u.id)??0)<u.maxStacks;
      });
    }
    // RARITY-WEIGHTED random pick: common most likely, mythic rarest
    const _rWeight={common:10,rare:5,epic:2.5,legendary:1.2,mythic:0.5};
    const _weight=(u)=>{
      // u.rarity is now a plain string from _RA (common/rare/epic/legendary/mythic)
      const r=typeof u.rarity==='string'?u.rarity.toLowerCase():'common';
      return (_rWeight[r]||5);
    };
    // weighted random pop (without replacement)
    function _weightedPop(arr){
      if(!arr.length)return null;
      let total=0;for(const u of arr)total+=_weight(u);
      let r=Math.random()*total;
      for(let i=0;i<arr.length;i++){r-=_weight(arr[i]);if(r<=0)return arr.splice(i,1)[0];}
      return arr.pop();
    }
    while(choices.length<3&&pool.length){const pick=_weightedPop(pool);if(!pick)break;choices.push(pick);}
    // EVOLUTIONS — if any of the player's maxed abilities qualify and they
    // still have room (max 3 evolutions per run), inject one as a guaranteed slot
    const evoOffers=findEvolutionOffers(this.player);
    if(evoOffers.length>0){
      const evoChoice=evoOffers[Math.floor(Math.random()*evoOffers.length)];
      // Replace the last choice with the evolution (so it always shows up)
      if(choices.length>=3){choices[choices.length-1]=evoChoice;}
      else {choices.push(evoChoice);}
    }
    if(choices.length===0){UI.announce(`LEVEL ${this.player.level}`,1.5,'#44ffff');return;}
    this.levelUpChoices=choices;
    this.levelUpHover=-1;
    Camera.shake(3,0.3);
  },
  applyChoice(idx){
    const c=this.levelUpChoices[idx];if(!c)return;
    if(c.isEvolution){
      // Evolution: run the choice's own apply on the player, big visual feedback
      c.apply(this.player);
      AudioManager.play('ult_ready');
      Camera.shake(6,0.5);
      Particles.burst(this.player.x,this.player.y,40,{color:c.color,speed:240,life:0.9,r:6});
      UI.announce(`★ EVOLVED · ${c.name} ★`,3,c.color);
      this.lastUpgrade=c.originalId;
    } else {
      this.player.applyUpgrade(c.id);
      this.lastUpgrade=c.id;
      UI.announce(c.name+'!',1.8,c.color);
    }
    // Try weapon evolution if upgrade matches the weapon's req tag
    WeaponEvo.tryEvolve(this.player,c.id);
    if(this.player2)WeaponEvo.tryEvolve(this.player2,c.id);
    this.state='playing';
    this.levelUpChoices=null;
  },
  update(dt){
    this.time+=dt;
    this.player.handleInput(dt);
    this.player.update(dt);
    VSEngine.update(dt,this.player);
    if(this.player2){this.player2.handleInput(dt);this.player2.update(dt);VSEngine.update(dt,this.player2);}
    this.decoys.forEach(d=>d.update(dt));
    this.decoys=this.decoys.filter(d=>d.alive);
    const allEntities=this.player2?[this.player,this.player2,...this.enemies]:[this.player,...this.enemies];
    this.enemies.forEach(e=>{
      if(!e.alive)return;
      // pick nearest decoy, P1, or P2 as target
      let tgt=this.player;let bd=(this.player.x-e.x)**2+(this.player.y-e.y)**2;
      if(this.player2&&this.player2.alive){const d2=(this.player2.x-e.x)**2+(this.player2.y-e.y)**2;if(d2<bd){bd=d2;tgt=this.player2;}}
      if(this.decoys.length){for(const d of this.decoys){const dx=d.x-e.x,dy=d.y-e.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;tgt=d;}}}
      // pass the nearest player (for things that need a "player" reference)
      const nearestPlayer=(tgt===this.player||tgt===this.player2)?tgt:this.player;
      e.update(dt,nearestPlayer,tgt===nearestPlayer?null:tgt);
    });
    // cleanup dead (in-place to preserve array reference)
    for(let i=this.enemies.length-1;i>=0;i--){if(!this.enemies[i].alive)this.enemies.splice(i,1);}
    Bullets.update(dt,allEntities);
    // bees - chase nearest enemy
    for(let i=this.bees.length-1;i>=0;i--){
      const bee=this.bees[i];bee.life-=dt;
      if(bee.life<=0){this.bees.splice(i,1);continue;}
      let tgt=bee.target;
      if(!tgt||!tgt.alive){tgt=null;let bd=Infinity;for(const e of this.enemies){if(!e.alive)continue;const dx=e.x-bee.x,dy=e.y-bee.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;tgt=e;}}bee.target=tgt;}
      if(tgt){const dx=tgt.x-bee.x,dy=tgt.y-bee.y,d=Math.sqrt(dx*dx+dy*dy)||1;bee.vx+=(dx/d*200-bee.vx)*dt*2;bee.vy+=(dy/d*200-bee.vy)*dt*2;
        if(d<tgt.r+bee.r){tgt.takeDamage(bee.dmg);DmgNumbers.spawn(tgt.x,tgt.y,bee.dmg,false);Particles.burst(bee.x,bee.y,4,{color:'#ffdd00',speed:60,life:0.3,r:2});this.bees.splice(i,1);continue;}}
      bee.x+=bee.vx*dt;bee.y+=bee.vy*dt;
    }
    // health orbs - pickup by either player
    for(let i=this.healthOrbs.length-1;i>=0;i--){
      const o=this.healthOrbs[i];o.bobT+=dt*3;
      const players=[this.player,this.player2].filter(p=>p&&p.alive);
      let picked=null;
      for(const pl of players){const dx=pl.x-o.x,dy=pl.y-o.y;if(dx*dx+dy*dy<(P_R+18)**2){picked=pl;break;}}
      if(picked){picked.hp=Math.min(picked.maxHp,picked.hp+o.heal);Particles.burst(o.x,o.y,16,{color:'#44ff66',speed:120,life:0.6,r:4});AudioManager.play('pickup_hp');UI.announce(`+${o.heal} HP`,1.4,'#44ff66');this.healthOrbs.splice(i,1);}
    }
    // witch spells
    for(let i=this.witchSpells.length-1;i>=0;i--){
      const s=this.witchSpells[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.life-=dt;
      if(s.life<=0||!polyContains(s.x,s.y)){this.witchSpells.splice(i,1);continue;}
      const dx=this.player.x-s.x,dy=this.player.y-s.y;
      if(dx*dx+dy*dy<(P_R+s.r)**2){this.player.takeDamage(s.dmg,-3);Particles.burst(s.x,s.y,8,{color:'#aa44ff',speed:80,life:0.35,r:3});this.witchSpells.splice(i,1);}
    }
    // shadow dogs (Fushiguro) — Divine Dogs hunt nearest enemy and bite
    if(this.shadowDogs){for(let i=this.shadowDogs.length-1;i>=0;i--){

      let tgt=null,bd=Infinity;for(const e of this.enemies){if(!e.alive)continue;const dx=e.x-ally.x,dy=e.y-ally.y,d2=dx*dx+dy*dy;if(d2<bd){bd=d2;tgt=e;}}
      if(tgt){const dx=tgt.x-ally.x,dy=tgt.y-ally.y,d=Math.sqrt(dx*dx+dy*dy)||1;ally.x+=dx/d*140*dt;ally.y+=dy/d*140*dt;

    // ben10 transform timer
    if(this.player._ben10FormT>0){this.player._ben10FormT-=dt;if(this.player._ben10FormT<=0){this.player._ben10Form=false;this.player._ben10FormT=0;this.player.qActive=false;UI.announce('TRANSFORM ENDED',1.5,'#44cc44');}}
    // negan mark decay on enemies
    for(const e of this.enemies){if(e._markedT>0){e._markedT-=dt;if(e._markedT<=0){e.marked=false;e._markedT=0;e._markedMult=1;}}}
    XpOrbs.update(dt,this.player);
    AmmoCrates.update(dt,this.player);
    FeatherPickups.update(dt,this.player);
    Chests.update(dt,this.player);
    Companions.update(dt,this.player);
    if(this.player2)Companions.update(dt,this.player2);

    this._achT=(this._achT||0)-dt;if(this._achT<=0){this._achT=1;Achievements.check(this.player);}
